<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corrida do Bolão — Copa 2026</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#ffdf00;--green:#009c3b;--green-light:#00c44f;--blue:#003087;--bg:#001a4a;--bg2:#002266;--bg3:#002d80;--card:#00194a;--border:#1a3d7a;--text:#e8f0ff;--muted:#7a9fd4;--white:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,48,135,0.5) 0%,transparent 60%);
    padding-bottom:60px;}
  .wrapper{max-width:1100px;margin:0 auto;padding:0 20px;}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;text-decoration:none;
    margin:20px 0 16px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;}
  .back:hover{color:var(--gold);border-color:var(--gold);}

  /* SELETOR */
  .select-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:20px;}
  .select-wrap label{display:block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
  .input-row{display:flex;gap:10px;}
  .input-row input{flex:1;background:#001a4a;border:1px solid #1a3d7a;border-radius:10px;
    padding:12px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;
    outline:none;text-transform:uppercase;}
  .input-row input:focus{border-color:var(--gold);}
  .btn-buscar{background:var(--gold);color:var(--blue);border:none;border-radius:10px;padding:12px 22px;
    font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;font-weight:900;}
  .btn-buscar:hover{opacity:0.9;}

  /* BARRA DO ADMIN */
  #admin-bar{display:none;margin-bottom:16px;}
  .admin-strip{background:rgba(0,156,59,0.1);border:1px solid rgba(0,196,79,0.3);
    border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .admin-strip-info{font-size:12px;color:var(--muted);line-height:1.5;}
  .admin-strip-info strong{color:var(--green-light);display:block;font-size:13px;margin-bottom:2px;}
  .btn-foto{background:var(--green);color:#fff;border:none;border-radius:10px;
    padding:11px 20px;font-family:'Bebas Neue',sans-serif;font-size:15px;
    letter-spacing:1px;cursor:pointer;font-weight:900;white-space:nowrap;
    display:flex;align-items:center;gap:8px;}
  .btn-foto:hover{background:var(--green-light);}
  .btn-foto:disabled{opacity:0.5;cursor:not-allowed;}

  /* BADGE HOJE */
  .hoje-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,223,0,0.08);
    border:1px solid rgba(255,223,0,0.3);border-radius:20px;padding:5px 14px;
    font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:16px;}
  .hoje-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);
    box-shadow:0 0 6px var(--gold);animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

  /* CARD GRÁFICO */
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:24px 20px 16px;position:relative;overflow:hidden;margin-bottom:20px;}
  .chart-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--blue),var(--green),var(--gold));}
  .chart-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold);margin-bottom:16px;}

  /* LEGENDA */
  .legenda{display:flex;flex-wrap:wrap;gap:8px 18px;margin-bottom:18px;}
  .legenda-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text);font-weight:500;cursor:pointer;user-select:none;}
  .legenda-item.dim{opacity:0.25;}
  .leg-linha-wrap{position:relative;display:inline-flex;align-items:center;width:28px;height:12px;}
  .leg-linha{width:28px;height:3px;border-radius:2px;position:absolute;}
  .leg-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--bg);position:absolute;left:10px;}

  /* TABELA */
  .pos-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  .pos-header{background:var(--bg3);padding:12px 20px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);}
  .pos-row{display:grid;align-items:center;padding:10px 20px;border-bottom:1px solid rgba(26,61,122,0.4);font-size:13px;gap:4px;}
  .pos-row:last-child{border-bottom:none;}
  .pos-row.head{background:rgba(0,45,128,0.5);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:7px 20px;}
  .pos-num{font-family:'Bebas Neue',sans-serif;font-size:16px;text-align:center;}
  .pos-nome{font-weight:600;}
  .pos-pts{text-align:center;font-size:12px;color:var(--muted);}
  .pos-pts.hoje{color:var(--gold);font-weight:700;font-size:14px;}
  .trend{text-align:center;font-size:13px;}

  /* LOADING / EMPTY */
  .msg-area{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}
  .msg-area strong{display:block;font-size:22px;margin-bottom:10px;color:var(--gold);font-family:'Bebas Neue',sans-serif;letter-spacing:2px;}
  .nota{margin-top:14px;padding:10px 14px;background:rgba(122,159,212,0.07);border:1px solid rgba(122,159,212,0.15);border-radius:10px;font-size:11px;color:var(--muted);}

  /* TOAST */
  #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#002266;border:1px solid var(--green-light);border-radius:12px;
    padding:12px 22px;font-size:13px;color:#fff;font-weight:600;
    opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <svg width="100%" viewBox="0 0 680 160" style="display:block;border-radius:16px;overflow:hidden;margin:20px 0 0;">
    <rect x="0" y="0" width="340" height="80" fill="#003087"/>
    <rect x="340" y="0" width="340" height="80" fill="#009c3b"/>
    <rect x="0" y="80" width="340" height="80" fill="#ffdf00"/>
    <rect x="340" y="80" width="340" height="80" fill="#ffffff"/>
    <path d="M-10 80 Q60 80 60 30 Q60 -10 110 -10 L-10 -10 Z" fill="#ffdf00"/>
    <path d="M690 80 Q620 80 620 30 Q620 -10 570 -10 L690 -10 Z" fill="#003087"/>
    <path d="M-10 80 Q60 80 60 130 Q60 170 110 170 L-10 170 Z" fill="#003087"/>
    <path d="M690 80 Q620 80 620 130 Q620 170 570 170 L690 170 Z" fill="#009c3b"/>
    <rect x="100" y="28" width="480" height="104" rx="10" fill="#003087" opacity="0.93"/>
    <rect x="100" y="28" width="480" height="104" rx="10" fill="none" stroke="#ffdf00" stroke-width="1.5"/>
    <text x="340" y="52" text-anchor="middle" font-size="8" fill="#ffdf00">* * * * *</text>
    <text x="340" y="88" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" fill="#fff" letter-spacing="2">CORRIDA DO BOLÃO</text>
    <text x="340" y="108" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="11" font-weight="700" fill="#ffdf00" letter-spacing="4">Copa do Mundo 2026</text>
  </svg>

  <a href="index.html" class="back">← Voltar ao Início</a>

  <!-- BARRA DO ADMIN (só aparece para MDANTAS) -->
  <div id="admin-bar">
    <div class="admin-strip">
      <div class="admin-strip-info">
        <strong>⚙️ Painel do Administrador</strong>
        Selecione o dia e registre o snapshot do ranking no histórico.
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label style="font-size:10px;color:var(--muted);letter-spacing:1px;">DIA DO SNAPSHOT</label>
          <input type="date" id="dataFotoInput"
            style="background:#001a4a;border:1px solid #1a3d7a;border-radius:8px;
            padding:8px 12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;"
            onchange="atualizarBtnFoto()">
        </div>
        <button class="btn-foto" id="btnFoto" onclick="tirarFotoDoDia()">
          📸 TIRAR FOTO
        </button>
      </div>
    </div>
  </div>

  <!-- SELETOR DE BOLÃO -->
  <div class="select-wrap">
    <label>Código do Bolão</label>
    <div class="input-row">
      <input type="text" id="codigoInput" placeholder="Ex: TETEU1234"
        onkeydown="if(event.key==='Enter')buscar()">
      <button class="btn-buscar" onclick="buscar()">BUSCAR</button>
    </div>
  </div>

  <div id="area">
    <div class="msg-area"><strong>📈 CORRIDA DO BOLÃO</strong>Digite o código do bolão para ver a evolução de pontos dia a dia.</div>
  </div>

</div>

<div id="toast"></div>

<script>
var SU = CONFIG.SUPABASE_URL;
var SK = CONFIG.SUPABASE_KEY;
var H  = { 'apikey': SK, 'Authorization': 'Bearer ' + SK };
var ADMIN_APELIDO = 'MDANTAS';

var CORES = [
  '#ffdf00','#00c44f','#ff6b6b','#7eb8ff','#cc88ff',
  '#ffaa44','#44ddcc','#ff88cc','#aaddff','#ffcc88',
  '#88ffaa','#ff8866'
];

var bolaoAtual = null;

window.addEventListener('load', function() {
  // Mostrar barra admin se for MDANTAS
  var u = (typeof AUTH !== 'undefined') ? AUTH.get() : null;
  if (u && u.apelido === ADMIN_APELIDO) {
    document.getElementById('admin-bar').style.display = 'block';
    // Mostrar data de hoje no botão
    var hoje = new Date();
    var d = hoje.getDate().toString().padStart(2,'0');
    var m = (hoje.getMonth()+1).toString().padStart(2,'0');
    var y = hoje.getFullYear();
    var input = document.getElementById('dataFotoInput');
    if (input) {
      input.value = hoje.getFullYear()+'-'+(hoje.getMonth()+1).toString().padStart(2,'0')+'-'+d;
    }
  }
  // Auto-buscar — tentar código do login ou do localStorage
  var codigoSalvo = (u && u.bolao_codigo) ? u.bolao_codigo : '';
  if (!codigoSalvo) { try { codigoSalvo = localStorage.getItem('grafico_bolao_codigo') || ''; } catch(e) {} }
  if (codigoSalvo) {
    document.getElementById('codigoInput').value = codigoSalvo;
    buscar();
  }
});

async function buscar() {
  var codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
  if (!codigo) return;

  document.getElementById('area').innerHTML = '<div class="msg-area"><strong>⏳ CARREGANDO...</strong>Buscando histórico do bolão.</div>';

  var rb = await fetch(SU + '/rest/v1/boloes?codigo=eq.' + encodeURIComponent(codigo) + '&select=id,nome', { headers: H });
  if (!rb.ok) { showErro('Erro ao conectar ao servidor.'); return; }
  var boloes = await rb.json();
  if (!boloes.length) { showErro('Bolão não encontrado. Verifique o código.'); return; }
  bolaoAtual = boloes[0];
  // Salvar código para auto-buscar na próxima visita
  try { localStorage.setItem('grafico_bolao_codigo', codigo); } catch(e) {}

  var rh = await fetch(SU + '/rest/v1/ranking_diario?bolao_id=eq.' + bolaoAtual.id + '&select=apelido,total,dia&order=dia.asc', { headers: H });
  if (!rh.ok) { showErro('Tabela de histórico não encontrada. Execute o setup_completo.sql no Supabase.'); return; }
  var historico = await rh.json();

  if (!historico.length) {
    var u = (typeof AUTH !== 'undefined') ? AUTH.get() : null;
    var dica = (u && u.apelido === ADMIN_APELIDO)
      ? 'Clique em <strong style="color:var(--green-light)">📸 FOTO DO DIA</strong> acima para registrar o primeiro snapshot.'
      : 'Peça ao administrador para registrar o primeiro snapshot do dia.';
    document.getElementById('area').innerHTML = '<div class="msg-area"><strong>📭 SEM HISTÓRICO</strong><span>' + dica + '</span></div>';
    return;
  }

  renderGrafico(bolaoAtual, historico);
}

function showErro(msg) {
  document.getElementById('area').innerHTML = '<div class="msg-area"><strong>⚠️ ATENÇÃO</strong>' + msg + '</div>';
}

function toast(msg, cor) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = cor || 'var(--green-light)';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

function atualizarBtnFoto() {
  // Nada necessário — o input já tem o valor
}

async function tirarFotoDoDia() {
  if (!bolaoAtual) { toast('⚠️ Busque um bolão primeiro.', '#ffaa44'); return; }
  var input = document.getElementById('dataFotoInput');
  var dataFoto = input ? input.value : new Date().toISOString().slice(0,10);
  if (!dataFoto) { toast('⚠️ Selecione uma data.', '#ffaa44'); return; }
  var btn = document.getElementById('btnFoto');
  var dataF = dataFoto.split('-').reverse().join('/');
  btn.disabled=true; btn.textContent='⏳ Calculando...';
  try {
    // Buscar jogos até a data para saber quais rodadas já aconteceram
    var rc=await fetch(SU+'/rest/v1/jogos_calendario?data_jogo=lte.'+dataFoto+'&select=api_id,rodada',{headers:H});
    if(!rc.ok) throw new Error('Erro calendário '+rc.status);
    var jogosAte=await rc.json();
    var temR1=jogosAte.some(function(j){return j.rodada==='R1';});
    var temR2=jogosAte.some(function(j){return j.rodada==='R2';});
    var temR3=jogosAte.some(function(j){return j.rodada==='R3';});

    // Buscar pontuações já calculadas pelo ranking ao vivo (com top 24 aplicado)
    var rp=await fetch(SU+'/rest/v1/pontuacoes?bolao_id=eq.'+bolaoAtual.id+'&select=apelido,total,pts_grupos,pts_zebras,pts_terceiros,pts_placares,pts_placares_r1,pts_placares_r2,pts_placares_r3',{headers:H});
    if(!rp.ok) throw new Error('Erro pontuações '+rp.status);
    var pontuacoes=await rp.json();
    if(!pontuacoes.length){toast('⚠️ Nenhuma pontuação encontrada.','#ffaa44');return;}

    // Calcular total acumulado até a data usando os valores já calculados
    // O pts_placares já tem o top 24 aplicado — mas precisamos saber quanto
    // veio de cada rodada para filtrar por data
    // Solução: usar pts_placares_r1, r2, r3 individuais mas aplicar top24 sobre os disponíveis
    var rr=await fetch(SU+'/rest/v1/resultados?select=api_id,gols_a,gols_b,finalizado',{headers:H});
    var todosRes=rr.ok?await rr.json():[];
    var jIds={};jogosAte.forEach(function(j){jIds[j.api_id]=true;});
    var resMap={};todosRes.filter(function(r){return r.finalizado&&r.gols_a!==null&&jIds[r.api_id];}).forEach(function(r){resMap[r.api_id]=r;});

    var rpf=await fetch(SU+'/rest/v1/palpites_fase1?bolao_id=eq.'+bolaoAtual.id+'&select=apelido,placares',{headers:H});
    var palpitesArr=rpf.ok?await rpf.json():[];
    var pMap={};
    palpitesArr.forEach(function(x){if(!x.apelido)return;if(!pMap[x.apelido])pMap[x.apelido]={};var pl=x.placares||{};if(typeof pl==='string'){try{pl=JSON.parse(pl);}catch(e){pl={};}}Object.assign(pMap[x.apelido],pl||{});});

    function cP(pa,pb,ra,rb){pa=parseInt(pa);pb=parseInt(pb);if(pa===ra&&pb===rb)return 3;var pe=pa===pb,re=ra===rb;if(pe&&re)return 2;if(!pe&&!re){var pv=pa>pb?'A':'B',rv=ra>rb?'A':'B';if(pv===rv)return Math.abs(pa-pb)===Math.abs(ra-rb)?2:1;}return 0;}

    var JD={R1:{A:[['México','África do Sul'],['Coreia do Sul','República Tcheca']],B:[['Canadá','Bósnia e Herzegovina'],['Catar','Suíça']],C:[['Brasil','Marrocos'],['Haiti','Escócia']],D:[['Estados Unidos','Paraguai'],['Austrália','Turquia']],E:[['Alemanha','Curaçao'],['Costa do Marfim','Equador']],F:[['Holanda','Japão'],['Suécia','Tunísia']],G:[['Bélgica','Egito'],['Irã','Nova Zelândia']],H:[['Espanha','Cabo Verde'],['Arábia Saudita','Uruguai']],I:[['França','Senegal'],['Noruega','Iraque']],J:[['Argentina','Argélia'],['Áustria','Jordânia']],K:[['Portugal','RD Congo'],['Uzbequistão','Colômbia']],L:[['Inglaterra','Croácia'],['Gana','Panamá']]},R2:{A:[['México','Coreia do Sul'],['África do Sul','República Tcheca']],B:[['Canadá','Catar'],['Bósnia e Herzegovina','Suíça']],C:[['Brasil','Haiti'],['Marrocos','Escócia']],D:[['Estados Unidos','Austrália'],['Turquia','Paraguai']],E:[['Alemanha','Costa do Marfim'],['Curaçao','Equador']],F:[['Holanda','Suécia'],['Japão','Tunísia']],G:[['Bélgica','Irã'],['Egito','Nova Zelândia']],H:[['Espanha','Arábia Saudita'],['Cabo Verde','Uruguai']],I:[['França','Iraque'],['Noruega','Senegal']],J:[['Argentina','Áustria'],['Argélia','Jordânia']],K:[['Portugal','Uzbequistão'],['Colômbia','RD Congo']],L:[['Inglaterra','Gana'],['Croácia','Panamá']]},R3:{A:[['México','República Tcheca'],['África do Sul','Coreia do Sul']],B:[['Canadá','Suíça'],['Bósnia e Herzegovina','Catar']],C:[['Brasil','Escócia'],['Marrocos','Haiti']],D:[['Estados Unidos','Turquia'],['Paraguai','Austrália']],E:[['Alemanha','Equador'],['Curaçao','Costa do Marfim']],F:[['Holanda','Tunísia'],['Japão','Suécia']],G:[['Bélgica','Nova Zelândia'],['Egito','Irã']],H:[['Espanha','Uruguai'],['Cabo Verde','Arábia Saudita']],I:[['França','Noruega'],['Senegal','Iraque']],J:[['Argentina','Jordânia'],['Argélia','Áustria']],K:[['Portugal','Colômbia'],['RD Congo','Uzbequistão']],L:[['Inglaterra','Panamá'],['Croácia','Gana']]}};
    var JF=[];['R1','R2','R3'].forEach(function(r){Object.keys(JD[r]).forEach(function(g){JD[r][g].forEach(function(j,i){JF.push({r:r,g:g,i:i,a:j[0],b:j[1]});});});});

    var GD={A:['México','África do Sul','Coreia do Sul','República Tcheca'],B:['Canadá','Bósnia e Herzegovina','Catar','Suíça'],C:['Brasil','Marrocos','Haiti','Escócia'],D:['Estados Unidos','Turquia','Paraguai','Austrália'],E:['Alemanha','Curaçao','Costa do Marfim','Equador'],F:['Holanda','Japão','Suécia','Tunísia'],G:['Bélgica','Egito','Irã','Nova Zelândia'],H:['Espanha','Cabo Verde','Arábia Saudita','Uruguai'],I:['França','Senegal','Noruega','Iraque'],J:['Argentina','Argélia','Áustria','Jordânia'],K:['Portugal','RD Congo','Uzbequistão','Colômbia'],L:['Inglaterra','Croácia','Gana','Panamá']};
    function cTab(g){var t={};GD[g].forEach(function(x){t[x]={t:x,p:0,j:0,gf:0,gc:0,sg:0};});JF.filter(function(j){return j.g===g;}).forEach(function(jogo){var k=jogo.r+'_'+jogo.g+'_'+jogo.i,res=resMap[k];if(!res)return;var ga=parseInt(res.gols_a),gb=parseInt(res.gols_b),ta=t[jogo.a],tb=t[jogo.b];if(!ta||!tb)return;ta.j++;tb.j++;ta.gf+=ga;ta.gc+=gb;ta.sg+=ga-gb;tb.gf+=gb;tb.gc+=ga;tb.sg+=gb-ga;if(ga>gb)ta.p+=3;else if(ga<gb)tb.p+=3;else{ta.p++;tb.p++;}});return Object.values(t).sort(function(a,b){if(b.p!==a.p)return b.p-a.p;if(b.sg!==a.sg)return b.sg-a.sg;return b.gf-a.gf;});}

    var terc=[];Object.keys(GD).forEach(function(g){var tab=cTab(g);if(tab[2]&&tab[2].j>0)terc.push(tab[2]);});
    terc.sort(function(a,b){if(b.p!==a.p)return b.p-a.p;if(b.sg!==a.sg)return b.sg-a.sg;return b.gf-a.gf;});
    var oito=terc.slice(0,8).map(function(x){return x.t;});

    var resultados=[];
    pontuacoes.forEach(function(p){
      var ap=p.apelido;
      var pl=pMap[ap]||{};

      // Grupos — recalcular com resultados até a data
      var pg=0;
      Object.keys(GD).forEach(function(g){var tab=cTab(g);if(!tab[0]||tab[0].j===0)return;for(var pos=1;pos<=4;pos++){var tp=pl['g'+g.toLowerCase()+'_'+pos]||pl['g'+g+'_'+pos]||'';if(!tp)continue;var pr=tab.findIndex(function(t){return t.t===tp;});if(pr===-1)continue;if(pr+1===pos)pg+=1;if(pr<2&&pos<=2)pg+=1;}});

      // Placares — recalcular com top 24 sobre jogos até a data
      var pts=[];
      JF.forEach(function(j){var k=j.r+'_'+j.g+'_'+j.i,r=resMap[k];if(!r)return;var pa=pl['placar_'+k+'_a'],pb=pl['placar_'+k+'_b'];if(pa===undefined||pa===null||pb===undefined||pb===null){pts.push(0);return;}pts.push(cP(pa,pb,r.gols_a,r.gols_b));});
      pts.sort(function(a,b){return b-a;});
      var pp=pts.slice(0,24).reduce(function(s,v){return s+v;},0);

      // Zebras
      var pz=0;
      for(var zi=1;zi<=4;zi++){var z=pl['zebra'+zi];if(!z)continue;var gz=null;Object.keys(GD).forEach(function(g){if(GD[g].indexOf(z)>=0)gz=g;});if(!gz)continue;var tz=cTab(gz);if(!tz[0]||tz[0].j===0)continue;var pz2=tz.findIndex(function(t){return t.t===z;});if(pz2===0)pz+=6;else if(pz2===1)pz+=4;else if(pz2===2)pz+=2;}

      // Terceiros
      var pt=0;
      for(var ti=1;ti<=8;ti++){var tp2=pl['t'+ti];if(!tp2)continue;var pr2=oito.indexOf(tp2);if(pr2===-1)continue;pt+=(pr2+1===ti)?2:1;}

      resultados.push({apelido:ap,total:pg+pz+pt+pp});
    });

    if(!confirm('📸 '+dataF+' — '+resultados.length+' participantes, '+Object.keys(resMap).length+' jogos\nTop 24 placares aplicado.\nConfirmar?')){btn.disabled=false;btn.innerHTML='📸 TIRAR FOTO';return;}
    btn.textContent='⏳ Salvando...';
    var erros=0;
    for(var i=0;i<resultados.length;i++){
      var r2=resultados[i];
      await fetch(SU+'/rest/v1/ranking_diario?bolao_id=eq.'+bolaoAtual.id+'&apelido=eq.'+encodeURIComponent(r2.apelido)+'&dia=eq.'+dataFoto,{method:'DELETE',headers:Object.assign({},H,{'Content-Type':'application/json'})});
      var ins=await fetch(SU+'/rest/v1/ranking_diario',{method:'POST',headers:Object.assign({},H,{'Content-Type':'application/json','Prefer':'return=minimal'}),body:JSON.stringify({bolao_id:bolaoAtual.id,apelido:r2.apelido,total:r2.total,dia:dataFoto})});
      if(!ins.ok)erros++;
    }
    if(erros===0){toast('✅ Foto '+dataF+' salva!');buscar();}else{toast('⚠️ '+erros+' erro(s).','#ff6b6b');}
  } catch(e){toast('❌ '+e.message,'#ff6b6b');console.error(e);}
  btn.disabled=false;btn.innerHTML='📸 TIRAR FOTO';
}
