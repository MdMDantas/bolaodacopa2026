<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aglutinador de Palpites — Bolão Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#ffdf00;--green:#009c3b;--green-light:#00c44f;--blue:#003087;--bg:#001a4a;--bg2:#002266;--bg3:#002d80;--card:#00194a;--border:#1a3d7a;--text:#e8f0ff;--muted:#7a9fd4;--white:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,48,135,0.5) 0%,transparent 60%);
    padding-bottom:60px;}
  .wrapper{max-width:800px;margin:0 auto;padding:0 20px;}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;
    text-decoration:none;margin:20px 0 16px;padding:8px 14px;background:var(--card);
    border:1px solid var(--border);border-radius:8px;}
  .back:hover{color:var(--gold);border-color:var(--gold);}

  /* SELETOR */
  .select-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:24px;}
  .select-wrap label{display:block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
  .input-row{display:flex;gap:10px;}
  .input-row input{flex:1;background:#001a4a;border:1px solid #1a3d7a;border-radius:10px;
    padding:12px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;
    outline:none;text-transform:uppercase;}
  .input-row input:focus{border-color:var(--gold);}
  .btn-buscar{background:var(--gold);color:var(--blue);border:none;border-radius:10px;
    padding:12px 22px;font-family:'Bebas Neue',sans-serif;font-size:15px;
    letter-spacing:1px;cursor:pointer;font-weight:900;}
  .btn-buscar:hover{opacity:0.9;}

  /* RODADA */
  .rodada-titulo{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;
    color:var(--muted);margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

  /* JOGO CARD */
  .jogo-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
    margin-bottom:12px;overflow:hidden;}
  .jogo-header{background:var(--bg3);padding:10px 18px;display:flex;align-items:center;
    justify-content:space-between;gap:8px;}
  .jogo-nome{font-size:14px;font-weight:700;color:var(--white);}
  .jogo-sub{font-size:10px;color:var(--muted);margin-top:2px;}
  .jogo-resultado{font-size:12px;color:var(--muted);}
  .jogo-resultado.definido{color:var(--green-light);font-weight:700;}
  .jogo-body{padding:14px 18px;}

  /* BARRA DE CONSENSO */
  .consenso-bar{display:flex;border-radius:6px;overflow:hidden;height:24px;margin-bottom:5px;}
  .consenso-seg{display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap;transition:width 0.5s;}
  .consenso-labels{display:flex;justify-content:space-between;font-size:10px;
    color:var(--muted);margin-bottom:14px;}

  /* ODDS */
  .odds-titulo{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);margin-bottom:10px;}
  .odds-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .odds-item:last-child{margin-bottom:0;}
  .odds-medal{font-size:15px;width:22px;text-align:center;flex-shrink:0;}
  .odds-placar{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;
    color:var(--white);width:58px;flex-shrink:0;line-height:1;}
  .odds-bar-wrap{flex:1;background:rgba(255,255,255,0.06);border-radius:4px;height:10px;overflow:hidden;}
  .odds-bar{height:100%;border-radius:4px;transition:width 0.6s ease;}
  .odds-pct{font-size:13px;font-weight:700;width:38px;text-align:right;flex-shrink:0;}
  .odds-count{font-size:10px;color:var(--muted);flex-shrink:0;width:52px;text-align:right;}
  .acertou-badge{background:rgba(0,196,79,0.2);border:1px solid #00c44f;border-radius:4px;
    font-size:9px;padding:1px 5px;color:#00c44f;font-family:'DM Sans',sans-serif;
    font-weight:700;margin-left:6px;vertical-align:middle;}

  /* RODADA CARDS */
  .rodada-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
  .rodada-card-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background 0.2s;}
  .rodada-card-header:hover{background:rgba(255,223,0,0.04);}
  .rodada-card-header.open{border-bottom:1px solid var(--border);}
  .rodada-card-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);display:flex;align-items:center;gap:10px;}
  .rodada-card-meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .rodada-card-arrow{font-size:14px;color:var(--muted);transition:transform 0.3s;}
  .rodada-card-arrow.open{transform:rotate(180deg);}
  .rodada-card-body{display:none;padding:16px 20px;}
  .rodada-card-body.open{display:block;}

  /* MENSAGENS */
  .msg{text-align:center;padding:50px 20px;color:var(--muted);font-size:14px;}
  .msg strong{display:block;font-size:22px;margin-bottom:8px;color:var(--gold);
    font-family:'Bebas Neue',sans-serif;letter-spacing:2px;}
  .sem-palpites{text-align:center;padding:14px;font-size:12px;color:var(--muted);font-style:italic;}
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <svg width="100%" viewBox="0 0 680 160" style="display:block;border-radius:16px;overflow:hidden;margin:20px 0 0;">
    <rect x="0" y="0" width="340" height="80" fill="#003087"/>
    <rect x="340" y="0" width="340" height="80" fill="#009c3b"/>
    <rect x="0" y="80" width="340" height="80" fill="#ffdf00"/>
    <rect x="340" y="80" width="340" height="80" fill="#ffffff"/>
    <path d="M-10 80 Q60 80 60 30 Q60 -10 110 -10 L-10 -10 Z" fill="#ffdf00"/>
    <path d="M690 80 Q620 80 620 30 Q620 -10 570 -10 L690 -10 Z" fill="#003087"/>
    <path d="M-10 80 Q60 80 60 130 Q60 170 110 170 L-10 170 Z" fill="#003087"/>
    <path d="M690 80 Q620 80 620 130 Q620 170 570 170 L690 170 Z" fill="#009c3b"/>
    <rect x="100" y="28" width="480" height="104" rx="10" fill="#003087" opacity="0.93"/>
    <rect x="100" y="28" width="480" height="104" rx="10" fill="none" stroke="#ffdf00" stroke-width="1.5"/>
    <text x="340" y="52" text-anchor="middle" font-size="8" fill="#ffdf00">* * * * *</text>
    <text x="340" y="84" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#fff" letter-spacing="2">AGLUTINADOR DE PALPITES</text>
    <text x="340" y="108" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="11" font-weight="700" fill="#ffdf00" letter-spacing="4">Copa do Mundo 2026</text>
  </svg>

  <a href="index.html" class="back">← Voltar ao Início</a>

  <!-- SELETOR -->
  <div class="select-wrap">
    <label>Código do Bolão</label>
    <div class="input-row">
      <input type="text" id="codigoInput" placeholder="Ex: TETEU1234"
        onkeydown="if(event.key==='Enter')buscar()">
      <button class="btn-buscar" onclick="buscar()">BUSCAR</button>
    </div>
  </div>

  <div id="area">
    <div class="msg">
      <strong>📊 AGLUTINADOR DE PALPITES</strong>
      Digite o código do bolão para ver o consenso e as odds de cada jogo.
    </div>
  </div>

</div>

<script src="db.js"></script>
<script src="auth.js"></script>
<script>
var SU = SUPABASE_URL, SK = SUPABASE_KEY;
var H = { 'apikey': SK, 'Authorization': 'Bearer ' + SK };
var CORES = ['#ffdf00', '#00c44f', '#7eb8ff'];

var JOGOS_R = {
  R1:{A:[['México','África do Sul'],['Coreia do Sul','República Tcheca']],B:[['Canadá','Bósnia e Herzegovina'],['Catar','Suíça']],C:[['Brasil','Marrocos'],['Haiti','Escócia']],D:[['Estados Unidos','Paraguai'],['Austrália','Turquia']],E:[['Alemanha','Curaçao'],['Costa do Marfim','Equador']],F:[['Holanda','Japão'],['Suécia','Tunísia']],G:[['Bélgica','Egito'],['Irã','Nova Zelândia']],H:[['Espanha','Cabo Verde'],['Arábia Saudita','Uruguai']],I:[['França','Senegal'],['Noruega','Iraque']],J:[['Argentina','Argélia'],['Áustria','Jordânia']],K:[['Portugal','RD Congo'],['Uzbequistão','Colômbia']],L:[['Inglaterra','Croácia'],['Gana','Panamá']]},
  R2:{A:[['México','Coreia do Sul'],['África do Sul','República Tcheca']],B:[['Canadá','Catar'],['Bósnia e Herzegovina','Suíça']],C:[['Brasil','Haiti'],['Marrocos','Escócia']],D:[['Estados Unidos','Austrália'],['Turquia','Paraguai']],E:[['Alemanha','Costa do Marfim'],['Curaçao','Equador']],F:[['Holanda','Suécia'],['Japão','Tunísia']],G:[['Bélgica','Irã'],['Egito','Nova Zelândia']],H:[['Espanha','Arábia Saudita'],['Cabo Verde','Uruguai']],I:[['França','Iraque'],['Noruega','Senegal']],J:[['Argentina','Áustria'],['Argélia','Jordânia']],K:[['Portugal','Uzbequistão'],['Colômbia','RD Congo']],L:[['Inglaterra','Gana'],['Croácia','Panamá']]},
  R3:{A:[['México','República Tcheca'],['África do Sul','Coreia do Sul']],B:[['Canadá','Suíça'],['Bósnia e Herzegovina','Catar']],C:[['Brasil','Escócia'],['Marrocos','Haiti']],D:[['Estados Unidos','Turquia'],['Paraguai','Austrália']],E:[['Alemanha','Equador'],['Curaçao','Costa do Marfim']],F:[['Holanda','Tunísia'],['Japão','Suécia']],G:[['Bélgica','Nova Zelândia'],['Egito','Irã']],H:[['Espanha','Uruguai'],['Cabo Verde','Arábia Saudita']],I:[['França','Noruega'],['Senegal','Iraque']],J:[['Argentina','Jordânia'],['Argélia','Áustria']],K:[['Portugal','Colômbia'],['RD Congo','Uzbequistão']],L:[['Inglaterra','Panamá'],['Croácia','Gana']]}
};

window.onload = function() {
  var u = (typeof AUTH !== 'undefined') ? AUTH.get() : null;
  if (u && u.bolao_codigo) {
    document.getElementById('codigoInput').value = u.bolao_codigo;
    buscar();
  }
};

async function buscar() {
  var codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
  if (!codigo) return;
  document.getElementById('area').innerHTML = '<div class="msg"><strong>⏳ CARREGANDO...</strong>Aglutinando palpites...</div>';

  var rb = await fetch(SU + '/rest/v1/boloes?codigo=eq.' + encodeURIComponent(codigo) + '&select=id,nome', { headers: H });
  var boloes = await rb.json();
  if (!boloes.length) {
    document.getElementById('area').innerHTML = '<div class="msg"><strong>⚠️ ATENÇÃO</strong>Bolão não encontrado.</div>';
    return;
  }
  var bolao = boloes[0];

  var rp = await fetch(SU + '/rest/v1/palpites_fase1?bolao_id=eq.' + bolao.id + '&select=apelido,placares', { headers: H });
  var palpites = await rp.json();

  // Buscar placares mata-mata (fase2) — agregar por apelido
  var rp2 = await fetch(SU + '/rest/v1/palpites_fase2?bolao_id=eq.' + bolao.id + '&select=apelido,fase,placares_mm', { headers: H });
  var palpites2 = rp2.ok ? await rp2.json() : [];
  // Montar mapa apelido -> placares_mm agregados
  var mapaPlacaresMM = {};
  palpites2.forEach(function(row) {
    if (!row.placares_mm) return;
    if (!mapaPlacaresMM[row.apelido]) mapaPlacaresMM[row.apelido] = {};
    Object.assign(mapaPlacaresMM[row.apelido], row.placares_mm);
  });
  // Garantir que participantes do fase2 apareçam mesmo sem fase1
  Object.keys(mapaPlacaresMM).forEach(function(ap) {
    if (!palpites.some(function(p){ return p.apelido === ap; })) {
      palpites.push({ apelido: ap, placares: {} });
    }
  });
  // Injetar placares_mm em cada palpite
  palpites.forEach(function(p) {
    p.placares_mm = mapaPlacaresMM[p.apelido] || {};
  });

  var rr = await fetch(SU + '/rest/v1/resultados?select=*', { headers: H });
  var resultados = await rr.json();

  renderAglutinador(bolao, palpites, resultados);
}

function renderAglutinador(bolao, palpites, resultados) {
  // Mapa de palpites: {jogo_id -> {apelido -> {a, b}}}
  var mapaJogos = {};
  palpites.forEach(function(p) {
    var pl = p.placares || {};
    if (typeof pl === 'string') { try { pl = JSON.parse(pl); } catch(e) { pl = {}; } }
    Object.keys(pl).forEach(function(k) {
      var m = k.match(/^placar_(R\d+_[A-Z]+_\d+)_([ab])$/);
      if (!m) return;
      var jid = m[1], lado = m[2];
      if (!mapaJogos[jid]) mapaJogos[jid] = {};
      if (!mapaJogos[jid][p.apelido]) mapaJogos[jid][p.apelido] = { a: null, b: null };
      mapaJogos[jid][p.apelido][lado] = parseInt(pl[k]);
    });
  });

  // Mapa de resultados
  var mapaRes = {};
  resultados.forEach(function(r) { if (r.api_id) mapaRes[r.api_id] = r; });

  var html = '';
  html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);margin-bottom:16px;">';
  html += '📋 ' + bolao.nome + ' — ' + palpites.length + ' participante(s)</div>';

  ['R1', 'R2', 'R3'].forEach(function(rodada, ri) {
    var rl = rodada === 'R1' ? 'Rodada 1' : rodada === 'R2' ? 'Rodada 2' : 'Rodada 3';
    var rdates = { R1: '11/06 – 17/06', R2: '18/06 – 23/06', R3: '24/06 – 27/06' };
    var njogos = Object.values(JOGOS_R[rodada]).reduce(function(s,v){return s+v.length;},0);
    var isOpen = ri === 0; // primeira aberta por padrão

    html += '<div class="rodada-card">';
    html += '<div class="rodada-card-header' + (isOpen?' open':'') + '" onclick="toggleRodada(this)">';
    html += '<div><div class="rodada-card-title">⚽ ' + rl + '</div>';
    html += '<div class="rodada-card-meta">' + rdates[rodada] + ' · ' + njogos + ' jogos</div></div>';
    html += '<div class="rodada-card-arrow' + (isOpen?' open':'') + '">▼</div>';
    html += '</div>';
    html += '<div class="rodada-card-body' + (isOpen?' open':'') + '">';

    Object.keys(JOGOS_R[rodada]).sort().forEach(function(grupo) {
      JOGOS_R[rodada][grupo].forEach(function(jogo, i) {
        var jid = rodada + '_' + grupo + '_' + i;
        var res = mapaRes[jid];
        var jogoPalpites = mapaJogos[jid] || {};

        // Filtrar só quem tem os dois placares
        var apelidos = Object.keys(jogoPalpites).filter(function(ap) {
          return jogoPalpites[ap].a !== null && jogoPalpites[ap].b !== null;
        });
        var total = apelidos.length;

        var resStr = res && res.gols_a !== null
          ? '<span class="jogo-resultado definido">✓ ' + res.gols_a + ' × ' + res.gols_b + '</span>'
          : '<span class="jogo-resultado">Aguardando</span>';

        html += '<div class="jogo-card">';
        html += '<div class="jogo-header">';
        html += '<div><div class="jogo-nome">⚽ ' + jogo[0] + ' × ' + jogo[1] + '</div>';
        html += '<div class="jogo-sub">Grupo ' + grupo + ' · ' + total + ' palpite(s)</div></div>';
        html += resStr + '</div>';
        html += '<div class="jogo-body">';

        if (total === 0) {
          html += '<div class="sem-palpites">Nenhum palpite registrado para este jogo</div>';
        } else {
          // Calcular consenso de vencedor
          var venc = { A: 0, B: 0, E: 0 };
          var contagem = {};
          apelidos.forEach(function(ap) {
            var pp = jogoPalpites[ap];
            if (pp.a > pp.b) venc.A++;
            else if (pp.b > pp.a) venc.B++;
            else venc.E++;
            var key = pp.a + '×' + pp.b;
            contagem[key] = (contagem[key] || 0) + 1;
          });

          var pctA = Math.round(venc.A / total * 100);
          var pctB = Math.round(venc.B / total * 100);
          var pctE = 100 - pctA - pctB;

          // ── BARRA DE CONSENSO ──
          html += '<div class="consenso-bar">';
          if (pctA > 0) {
            html += '<div class="consenso-seg" style="width:' + pctA + '%;background:#003087;">'
              + (pctA >= 15 ? jogo[0].split(' ')[0] + ' ' + pctA + '%' : pctA >= 8 ? pctA + '%' : '') + '</div>';
          }
          if (pctE > 0) {
            html += '<div class="consenso-seg" style="width:' + pctE + '%;background:#3a5580;">'
              + (pctE >= 8 ? '= ' + pctE + '%' : '') + '</div>';
          }
          if (pctB > 0) {
            html += '<div class="consenso-seg" style="width:' + pctB + '%;background:#009c3b;">'
              + (pctB >= 15 ? jogo[1].split(' ')[0] + ' ' + pctB + '%' : pctB >= 8 ? pctB + '%' : '') + '</div>';
          }
          html += '</div>';
          html += '<div class="consenso-labels">';
          html += '<span>🔵 ' + jogo[0] + ' — ' + pctA + '%</span>';
          html += '<span>🟰 Empate — ' + pctE + '%</span>';
          html += '<span>🟢 ' + jogo[1] + ' — ' + pctB + '%</span>';
          html += '</div>';

          // ── TODOS OS PLACARES COM NOMES ──
          var placaresOrdenados = Object.keys(contagem)
            .sort(function(a, b) { return contagem[b] - contagem[a]; });
          var maxCount = contagem[placaresOrdenados[0]];

          html += '<div class="odds-titulo">🎯 Placares apostados</div>';
          placaresOrdenados.forEach(function(placar, idx) {
            var cnt = contagem[placar];
            var pct = Math.round(cnt / total * 100);
            var barW = Math.round(cnt / maxCount * 100);
            var cor = idx===0?'#ffdf00':idx===1?'#00c44f':idx===2?'#7eb8ff':'var(--muted)';
            var medal = idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'  ';
            var acertou = res && res.gols_a !== null && placar === res.gols_a + '×' + res.gols_b;

            // Quem apostou neste placar
            var quemApostou = apelidos.filter(function(ap) {
              var pp = jogoPalpites[ap];
              return pp.a !== null && pp.b !== null && (pp.a + '×' + pp.b) === placar;
            });

            html += '<div style="margin-bottom:10px;">';
            html += '<div class="odds-item">';
            html += '<div class="odds-medal">' + medal + '</div>';
            html += '<div class="odds-placar">' + placar + (acertou ? '<span class="acertou-badge">✓ ACERTOU</span>' : '') + '</div>';
            html += '<div class="odds-bar-wrap"><div class="odds-bar" style="width:' + barW + '%;background:' + cor + ';"></div></div>';
            html += '<div class="odds-pct" style="color:' + cor + '">' + pct + '%</div>';
            html += '<div class="odds-count">(' + cnt + ')</div>';
            html += '</div>';
            html += '<div style="padding-left:32px;display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">';
            quemApostou.forEach(function(ap) {
              var corNome = acertou ? '#00c44f' : 'var(--muted)';
              html += '<span style="font-size:11px;color:' + corNome + ';background:rgba(255,255,255,0.05);border-radius:4px;padding:2px 8px;">' + ap + '</span>';
            });
            html += '</div></div>';
          });
        }

        html += '</div></div>'; // fim jogo-body e jogo-card
      });
    });

    html += '</div></div>'; // fim rodada-card-body e rodada-card
  });

  // ── MATA-MATA ──
  var FASES_MM = [
    {id:'r16avos', label:'⚔️ 16 Avos de Final', times:[['Alemanha','Paraguai'],['França','Suécia'],['Canadá','África do Sul'],['Holanda','Marrocos'],['Portugal','Croácia'],['Espanha','Áustria'],['Estados Unidos','Bósnia e Herzegovina'],['Bélgica','Senegal'],['Brasil','Japão'],['Costa do Marfim','Noruega'],['México','Equador'],['Inglaterra','RD Congo'],['Argentina','Cabo Verde'],['Austrália','Egito'],['Suíça','Argélia'],['Colômbia','Gana']]},
    {id:'roitavas', label:'⚔️ Oitavas de Final', times:[['Canadá','Marrocos'],['Paraguai','França'],['Brasil','Noruega'],['México','Inglaterra'],['Portugal','Espanha'],['Estados Unidos','Bélgica'],['Argentina','Egito'],['Suíça','Colômbia']]},
    {id:'rquartas', label:'⚔️ Quartas de Final', times:[['França','Marrocos'],['Espanha','Bélgica'],['Noruega','Inglaterra'],['Argentina','Suíça']]},
    {id:'rsemi',   label:'⚔️ Semifinal',         times:[['Venc. Q1','Venc. Q2'],['Venc. Q3','Venc. Q4']]},
    {id:'rfinal',  label:'🏆 3º Lugar e Final',  times:[['3º Lugar','4º Lugar'],['Final','']]}
  ];

  FASES_MM.forEach(function(fase) {
    var temAlgum = palpites.some(function(p) {
      var pm = p.placares_mm || {};
      return fase.times.some(function(_, ji) { return pm[fase.id+'_'+ji+'_A'] !== undefined; });
    });
    if (!temAlgum) return;

    var isOpen = false;
    html += '<div class="rodada-card">';
    html += '<div class="rodada-card-header' + (isOpen?' open':'') + '" onclick="toggleRodada(this)">';
    html += '<div><div class="rodada-card-title">' + fase.label + '</div>';
    html += '<div class="rodada-card-meta">' + fase.times.length + ' jogo(s)</div></div>';
    html += '<div class="rodada-card-arrow' + (isOpen?' open':'') + '">▼</div></div>';
    html += '<div class="rodada-card-body' + (isOpen?' open':'') + '">';

    fase.times.forEach(function(times, ji) {
      var nomeA = times[0], nomeB = times[1] || '';
      var idA = fase.id+'_'+ji+'_A', idB = fase.id+'_'+ji+'_B';

      // Resultados reais (se existirem em mapaRes)
      var resKey = fase.id + '_' + ji;
      var res = mapaRes[resKey];

      // Coletar palpites com placar dos dois lados
      var jogoPalpites = {};
      palpites.forEach(function(p) {
        var pm = p.placares_mm || {};
        if (pm[idA] !== undefined && pm[idB] !== undefined) {
          jogoPalpites[p.apelido] = { a: parseInt(pm[idA]), b: parseInt(pm[idB]) };
        }
      });
      var apelidos = Object.keys(jogoPalpites);
      var total = apelidos.length;

      var resStr = res && res.gols_a !== null
        ? '<span class="jogo-resultado definido">✓ ' + res.gols_a + ' × ' + res.gols_b + '</span>'
        : '<span class="jogo-resultado">Aguardando</span>';

      html += '<div class="jogo-card">';
      html += '<div class="jogo-header">';
      html += '<div><div class="jogo-nome">⚔️ ' + nomeA + (nomeB?' × '+nomeB:'') + '</div>';
      html += '<div class="jogo-sub">' + total + ' palpite(s)</div></div>';
      html += resStr + '</div>';
      html += '<div class="jogo-body">';

      if (total === 0) {
        html += '<div class="sem-palpites">Nenhum palpite registrado para este jogo</div>';
      } else {
        // Consenso de vencedor
        var venc = { A: 0, B: 0, E: 0 };
        var contagem = {};
        apelidos.forEach(function(ap) {
          var pp = jogoPalpites[ap];
          if (pp.a > pp.b) venc.A++;
          else if (pp.b > pp.a) venc.B++;
          else venc.E++;
          var key = pp.a + '×' + pp.b;
          contagem[key] = (contagem[key] || 0) + 1;
        });

        var pctA = Math.round(venc.A / total * 100);
        var pctB = Math.round(venc.B / total * 100);
        var pctE = 100 - pctA - pctB;

        // Barra de consenso — mesmo layout da Rodada 1
        html += '<div class="consenso-bar">';
        if (pctA > 0) html += '<div class="consenso-seg" style="width:'+pctA+'%;background:#003087;">'+(pctA>=15?nomeA.split(' ')[0]+' '+pctA+'%':pctA>=8?pctA+'%':'')+'</div>';
        if (pctE > 0) html += '<div class="consenso-seg" style="width:'+pctE+'%;background:#3a5580;">'+(pctE>=8?'= '+pctE+'%':'')+'</div>';
        if (pctB > 0) html += '<div class="consenso-seg" style="width:'+pctB+'%;background:#009c3b;">'+(pctB>=15?nomeB.split(' ')[0]+' '+pctB+'%':pctB>=8?pctB+'%':'')+'</div>';
        html += '</div>';
        html += '<div class="consenso-labels">';
        html += '<span>🔵 ' + nomeA + ' — ' + pctA + '%</span>';
        html += '<span>⚪ Empate — ' + pctE + '%</span>';
        html += '<span>🟢 ' + (nomeB||'') + ' — ' + pctB + '%</span>';
        html += '</div>';

        // Placares apostados — mesmo layout da Rodada 1
        html += '<div class="odds-titulo">🎯 Placares apostados</div>';
        var placaresOrdenados2 = Object.keys(contagem).sort(function(a,b){ return contagem[b]-contagem[a]; });
        var maxCount2 = contagem[placaresOrdenados2[0]];
        placaresOrdenados2.forEach(function(placar, idx2) {
          var cnt2 = contagem[placar];
          var pct2 = Math.round(cnt2/total*100);
          var barW2 = Math.round(cnt2/maxCount2*100);
          var cor2 = idx2===0?'#ffdf00':idx2===1?'#00c44f':idx2===2?'#7eb8ff':'var(--muted)';
          var medal2 = idx2===0?'🥇':idx2===1?'🥈':idx2===2?'🥉':'  ';
          var acertou2 = res && res.gols_a !== null && placar === res.gols_a+'×'+res.gols_b;
          var quemApostou2 = apelidos.filter(function(ap){ return jogoPalpites[ap].a+'×'+jogoPalpites[ap].b === placar; });
          html += '<div style="margin-bottom:10px;">';
          html += '<div class="odds-item">';
          html += '<div class="odds-medal">'+medal2+'</div>';
          html += '<div class="odds-placar">'+placar+(acertou2?'<span class="acertou-badge">✓ ACERTOU</span>':'')+'</div>';
          html += '<div class="odds-bar-wrap"><div class="odds-bar" style="width:'+barW2+'%;background:'+cor2+';"></div></div>';
          html += '<div class="odds-pct" style="color:'+cor2+'">'+pct2+'%</div>';
          html += '<div class="odds-count">('+cnt2+')</div>';
          html += '</div>';
          html += '<div style="padding-left:32px;display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">';
          quemApostou2.forEach(function(ap) {
            var corNome2 = acertou2 ? '#00c44f' : 'var(--muted)';
            html += '<span style="font-size:11px;color:'+corNome2+';background:rgba(255,255,255,0.05);border-radius:4px;padding:2px 8px;">'+ap+'</span>';
          });
          html += '</div></div>';
        });
      }

      html += '</div></div>'; // fim jogo-body e jogo-card
    });

    html += '</div></div>'; // fim rodada-card
  });

  document.getElementById('area').innerHTML = html;
}

function toggleRodada(header) {
  header.classList.toggle('open');
  var arrow = header.querySelector('.rodada-card-arrow');
  if (arrow) arrow.classList.toggle('open');
  var body = header.nextElementSibling;
  if (body) body.classList.toggle('open');
}
</script>
</body>
</html>
