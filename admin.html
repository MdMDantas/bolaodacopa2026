<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Bolão da Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#ffdf00;--green:#009c3b;--green-light:#00c44f;--blue:#003087;--bg:#001a4a;--bg2:#002266;--bg3:#002d80;--card:#00194a;--border:#1a3d7a;--text:#e8f0ff;--muted:#7a9fd4;--white:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,48,135,0.5) 0%,transparent 60%);}
  .wrapper{max-width:1060px;margin:0 auto;padding:0 20px 80px;}
  .card{background:var(--card);border:1px solid rgba(255,223,0,0.3);border-radius:14px;overflow:hidden;margin-bottom:20px;}
  .card-header{background:var(--bg3);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);}
  .card-body{padding:20px;}
  .btn{background:var(--gold);color:var(--blue);border:none;border-radius:10px;padding:10px 20px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;font-weight:900;}
  .btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:10px;padding:10px 20px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;}
  .btn-verde{background:var(--green);color:#fff;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--bg2);border-radius:10px;padding:16px;text-align:center;}
  .stat-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);}
  .stat-label{font-size:11px;color:var(--muted);margin-top:4px;}
  .participante-row{display:grid;grid-template-columns:140px repeat(11,1fr);gap:0;align-items:center;border-bottom:1px solid rgba(26,61,122,0.3);font-size:12px;min-width:860px;}
  .participante-row > div{padding:10px 4px;text-align:center;}
  .participante-row > div:first-child{padding-left:16px;text-align:left;}
  .participante-row:last-child{border-bottom:none;}
  .participante-row.header{background:var(--bg3);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
  .participante-row.header > div{padding:8px 4px;}
  .participante-row.header > div:first-child{padding-left:16px;}
  .tabela-participantes{overflow-x:auto;}
  .status-ok{color:var(--green-light);}
  .status-no{color:#ff6b6b;}
  .acesso-negado{text-align:center;padding:40px 20px;}
  .acesso-negado .icone{font-size:48px;margin-bottom:16px;}
  .loading{text-align:center;padding:40px;color:var(--muted);}
  .busca-wrap{background:var(--card);border:1px solid rgba(255,223,0,0.3);border-radius:14px;padding:24px;margin-bottom:20px;}
  .busca-wrap label{display:block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
  .busca-row{display:flex;gap:10px;}
  .busca-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;text-transform:uppercase;}
  .busca-row input:focus{border-color:var(--gold);}
</style>
</head>
<body>
<div class="wrapper">
  <svg width="100%" viewBox="0 0 680 160" style="display:block;border-radius:16px;overflow:hidden;margin-bottom:20px;">
    <rect x="0" y="0" width="340" height="80" fill="#003087"/>
    <rect x="340" y="0" width="340" height="80" fill="#009c3b"/>
    <rect x="0" y="80" width="340" height="80" fill="#ffdf00"/>
    <rect x="340" y="80" width="340" height="80" fill="#ffffff"/>
    <path d="M-10 80 Q60 80 60 30 Q60 -10 110 -10 L-10 -10 Z" fill="#ffdf00"/>
    <path d="M690 80 Q620 80 620 30 Q620 -10 570 -10 L690 -10 Z" fill="#003087"/>
    <path d="M-10 80 Q60 80 60 130 Q60 170 110 170 L-10 170 Z" fill="#003087"/>
    <path d="M690 80 Q620 80 620 130 Q620 170 570 170 L690 170 Z" fill="#009c3b"/>
    <rect x="100" y="28" width="480" height="104" rx="10" fill="#003087" opacity="0.93"/>
    <rect x="100" y="28" width="480" height="104" rx="10" fill="none" stroke="#ffdf00" stroke-width="1.5"/>

  </svg>
  <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;color:#7a9fd4;font-size:13px;text-decoration:none;margin:12px 0 16px;padding:8px 14px;background:#00194a;border:1px solid rgba(255,223,0,0.3);border-radius:8px;" onmouseover="this.style.borderColor='#ffdf00'" onmouseout="this.style.borderColor='rgba(255,223,0,0.3)'">&#8592; Voltar ao Início</a>

</div>

<script>
var SU = 'https://myytheficqokbjbkmeiv.supabase.co';
var SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15eXRoZWZpY3Fva2JqYmttZWl2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDM1NTMwNCwiZXhwIjoyMDk1OTMxMzA0fQ.-KV4Iaz-hSxdXyhJGYBXo0W9VTmwZctk0kWvZWqIDaE';
var H = {'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};
var _usuario = null;
var _bolaoAtual = null;

window.onload = async function() {
  _usuario = AUTH.get();
  var area = document.getElementById('mainArea');

  if (!_usuario) {
    area.innerHTML = '<div class="card"><div class="card-body"><div class="acesso-negado">'
      + '<div class="icone">🔐</div>'
      + '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:var(--gold);letter-spacing:2px;margin-bottom:8px;">FAÇA LOGIN PRIMEIRO</div>'
      + '<div style="font-size:13px;color:var(--muted);margin-bottom:20px;">Você precisa estar logado para acessar o painel admin.</div>'
      + '<a href="login.html?volta=admin.html" style="display:inline-block;background:var(--gold);color:var(--blue);border-radius:10px;padding:12px 24px;font-family:\'Bebas Neue\',sans-serif;font-size:16px;font-weight:900;text-decoration:none;letter-spacing:1px;">ENTRAR</a>'
      + '</div></div></div>';
    return;
  }

  // Verificar se tem código na URL
  var params = new URLSearchParams(window.location.search);
  var codigoUrl = params.get('bolao');

  area.innerHTML = '<div class="busca-wrap">'
    + '<label>Código do Bolão</label>'
    + '<div class="busca-row">'
    + '<input type="text" id="codigoAdmin" placeholder="Digite o código do seu bolão" value="'+(codigoUrl||'')+'">'
    + '<button class="btn" onclick="acessarAdmin()">ACESSAR</button>'
    + '</div></div>'
    + '<div id="adminContent"></div>';

  if (codigoUrl) acessarAdmin();
};

async function acessarAdmin() {
  var codigo = document.getElementById('codigoAdmin').value.trim().toUpperCase();
  if (!codigo) return;
  var content = document.getElementById('adminContent');
  content.innerHTML = '<div class="loading">Verificando...</div>';

  // Buscar bolão
  var r = await fetch(SU+'/rest/v1/boloes?codigo=eq.'+encodeURIComponent(codigo)+'&select=*', {headers:H});
  if (!r.ok) { content.innerHTML = '<div class="loading">Erro ao buscar bolão.</div>'; return; }
  var boloes = await r.json();
  if (!boloes.length) { content.innerHTML = '<div class="loading">Bolão não encontrado.</div>'; return; }

  _bolaoAtual = boloes[0];

  // Verificar se o usuário logado é o criador
  if (_bolaoAtual.criador_telefone && _bolaoAtual.criador_telefone !== _usuario.telefone) {
    content.innerHTML = '<div class="card"><div class="card-body"><div class="acesso-negado">'
      + '<div class="icone">🚫</div>'
      + '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:#ff6b6b;letter-spacing:2px;margin-bottom:8px;">ACESSO NEGADO</div>'
      + '<div style="font-size:13px;color:var(--muted);">Somente o criador do bolão pode acessar o painel admin.</div>'
      + '</div></div></div>';
    return;
  }

  carregarAdmin();
}

async function carregarAdmin() {
  var content = document.getElementById('adminContent');
  content.innerHTML = '<div class="loading">Carregando dados...</div>';
  try {

  // Buscar palpites fase 1
  var r1 = await fetch(SU+'/rest/v1/palpites_fase1?bolao_id=eq.'+_bolaoAtual.id+'&select=*&order=criado_em.asc', {headers:H});
  var palpites1 = r1.ok ? await r1.json() : [];

  // Buscar palpites fase 2
  var r2 = await fetch(SU+'/rest/v1/palpites_fase2?bolao_id=eq.'+_bolaoAtual.id+'&select=*&order=criado_em.asc', {headers:H});
  var palpites2 = r2.ok ? await r2.json() : [];

  // Montar mapas
  var p1Map = {}, p2Map = {}, placMap = {}, p1Data = {}, p2Data = {};
  var placR1Map = {}, placR2Map = {}, placR3Map = {};
  var p2R16Map = {}, p2OitMap = {}, p2QuaMap = {}, p2SemMap = {}, p2FinMap = {};
  palpites1.forEach(function(x){
    if (!x.apelido) return;
    if (x['ga_1']) p1Map[x.apelido] = true;
    p1Data[x.apelido] = x;
    var pl = x.placares;
    if (pl) {
      if (typeof pl === 'string') { try { pl = JSON.parse(pl); } catch(e){ pl={}; } }
      if (typeof pl === 'object') {
        var keys = Object.keys(pl);
        if (keys.some(function(k){ return k.indexOf('placar_')===0; })) placMap[x.apelido] = true;
        if (keys.some(function(k){ return k.indexOf('placar_R1_')===0; })) placR1Map[x.apelido] = true;
        if (keys.some(function(k){ return k.indexOf('placar_R2_')===0; })) placR2Map[x.apelido] = true;
        if (keys.some(function(k){ return k.indexOf('placar_R3_')===0; })) placR3Map[x.apelido] = true;
      }
    }
  });
  palpites2.forEach(function(x){
    if (!x.apelido) return;
    if (x.fase === 'matamata')  { p2Map[x.apelido] = true; p2Data[x.apelido] = x; }
    if (x.fase === 'r16avos')   p2R16Map[x.apelido] = true;
    if (x.fase === 'roitavas')  p2OitMap[x.apelido] = true;
    if (x.fase === 'rquartas')  p2QuaMap[x.apelido] = true;
    if (x.fase === 'rsemi')     p2SemMap[x.apelido] = true;
    if (x.fase === 'rfinal')    p2FinMap[x.apelido] = true;
  });

  var todos = {};
  Object.keys(p1Map).forEach(function(a){ todos[a]=true; });
  Object.keys(p2Map).forEach(function(a){ todos[a]=true; });
  var participantes = Object.keys(todos);

  var totalP = participantes.length;
  var totalGrupos = Object.keys(p1Map).length;
  var totalMata = Object.keys(p2Map).length;

  var html = '';

  // Stats
  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-val">'+totalP+'</div><div class="stat-label">Participantes</div></div>';
  html += '<div class="stat-card"><div class="stat-val">'+totalGrupos+'</div><div class="stat-label">Grupos enviados</div></div>';
  html += '<div class="stat-card"><div class="stat-val">'+totalMata+'</div><div class="stat-label">Mata-mata enviados</div></div>';
  html += '</div>';

  // Tabela de participantes
  html += '<div class="card"><div class="card-header"><span class="card-title">👥 PARTICIPANTES — '+_bolaoAtual.nome+'</span>';
  html += '<button class="btn" onclick="exportarPDF()" style="background:#003087;color:#ffdf00;border:1px solid #ffdf00;">📄 PDF POR JOGADOR</button>';
  html += '</div>';
  html += '<div class="tabela-participantes">';
  html += '<div class="participante-row header"><div>Apelido</div><div>Grupos</div><div>Rod.1</div><div>Rod.2</div><div>Rod.3</div><div>Mata-Mata</div><div>16 Avos</div><div>Oitavas</div><div>Quartas</div><div>Semi</div><div>Final</div><div>Total</div></div>';

  if (!participantes.length) {
    html += '<div style="text-align:center;padding:24px;color:var(--muted);">Nenhum palpite enviado ainda.</div>';
  } else {
    participantes.forEach(function(ap) {
      var ok = '<span class="status-ok">✅</span>', no = '<span class="status-no">❌</span>';
      var total = (p1Map[ap]?1:0)+(placR1Map[ap]?1:0)+(placR2Map[ap]?1:0)+(placR3Map[ap]?1:0)+(p2Map[ap]?1:0)+(p2R16Map[ap]?1:0)+(p2OitMap[ap]?1:0)+(p2QuaMap[ap]?1:0)+(p2SemMap[ap]?1:0)+(p2FinMap[ap]?1:0);
      html += '<div class="participante-row">';
      html += '<div style="font-weight:600;">'+ap+'</div>';
      html += '<div>'+(p1Map[ap]?ok:no)+'</div>';
      html += '<div>'+(placR1Map[ap]?ok:no)+'</div>';
      html += '<div>'+(placR2Map[ap]?ok:no)+'</div>';
      html += '<div>'+(placR3Map[ap]?ok:no)+'</div>';
      html += '<div>'+(p2Map[ap]?ok:no)+'</div>';
      html += '<div>'+(p2R16Map[ap]?ok:no)+'</div>';
      html += '<div>'+(p2OitMap[ap]?ok:no)+'</div>';
      html += '<div>'+(p2QuaMap[ap]?ok:no)+'</div>';
      html += '<div>'+(p2SemMap[ap]?ok:no)+'</div>';
      html += '<div>'+(p2FinMap[ap]?ok:no)+'</div>';
      html += '<div style="color:var(--gold);font-weight:700;">'+total+'/10</div>';
      html += '</div>';
    });
  }
  html += '</div></div>';

  // Quem não enviou
  var naoEnviou = participantes.filter(function(a){ return !p1Map[a] || !p2Map[a]; });
  if (naoEnviou.length) {
    html += '<div class="card"><div class="card-header"><span class="card-title">⚠️ PALPITES PENDENTES</span></div><div class="card-body">';
    naoEnviou.forEach(function(ap){
      var faltam = [];
      if (!p1Map[ap]) faltam.push('Grupos');
      if (!placMap[ap]) faltam.push('Placares');
      if (!p2Map[ap]) faltam.push('Mata-Mata');
      html += '<div style="padding:8px 0;border-bottom:1px solid rgba(26,61,122,0.3);display:flex;justify-content:space-between;align-items:center;">';
      html += '<span style="font-weight:600;">'+ap+'</span>';
      html += '<span style="font-size:12px;color:#ff6b6b;">Falta: '+faltam.join(', ')+'</span>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  content.innerHTML = html;
  window._dadosExport = { participantes:participantes, p1Map:p1Map, placMap:placMap, p2Map:p2Map, p1Data:p1Data, p2Data:p2Data, bolao:_bolaoAtual };
  } catch(e) { console.error('carregarAdmin erro:', e); document.getElementById('adminContent').innerHTML = '<div class="loading">Erro: ' + e.message + '</div>'; }
}

// Grupos de A a L
var GRUPOS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
var JOGOS_R1_KEYS = {A:['México x África do Sul','Coreia do Sul x Rep. Tcheca'],B:['Canadá x Bósnia','Catar x Suíça'],C:['Brasil x Marrocos','Haiti x Escócia'],D:['EUA x Paraguai','Austrália x Turquia'],E:['Alemanha x Curaçao','Costa do Marfim x Equador'],F:['Holanda x Japão','Suécia x Tunísia'],G:['Bélgica x Egito','Irã x Nova Zelândia'],H:['Espanha x Cabo Verde','Arábia Saudita x Uruguai'],I:['França x Senegal','Noruega x Iraque'],J:['Argentina x Argélia','Áustria x Jordânia'],K:['Portugal x RD Congo','Uzbequistão x Colômbia'],L:['Inglaterra x Croácia','Gana x Panamá']};
var JOGOS_R2_KEYS = {A:['México x Coreia do Sul','África do Sul x Rep. Tcheca'],B:['Canadá x Catar','Bósnia x Suíça'],C:['Brasil x Haiti','Marrocos x Escócia'],D:['EUA x Austrália','Turquia x Paraguai'],E:['Alemanha x Costa do Marfim','Curaçao x Equador'],F:['Holanda x Suécia','Japão x Tunísia'],G:['Bélgica x Irã','Egito x Nova Zelândia'],H:['Espanha x Arábia Saudita','Cabo Verde x Uruguai'],I:['França x Iraque','Noruega x Senegal'],J:['Argentina x Áustria','Argélia x Jordânia'],K:['Portugal x Uzbequistão','Colômbia x RD Congo'],L:['Inglaterra x Gana','Croácia x Panamá']};
var JOGOS_R3_KEYS = {A:['México x Rep. Tcheca','África do Sul x Coreia do Sul'],B:['Canadá x Suíça','Bósnia x Catar'],C:['Brasil x Escócia','Marrocos x Haiti'],D:['EUA x Turquia','Paraguai x Austrália'],E:['Alemanha x Equador','Curaçao x Costa do Marfim'],F:['Holanda x Tunísia','Japão x Suécia'],G:['Bélgica x Nova Zelândia','Egito x Irã'],H:['Espanha x Uruguai','Cabo Verde x Arábia Saudita'],I:['França x Noruega','Senegal x Iraque'],J:['Argentina x Jordânia','Argélia x Áustria'],K:['Portugal x Colômbia','RD Congo x Uzbequistão'],L:['Inglaterra x Panamá','Croácia x Gana']};

function exportarCSV() {
  var d = window._dadosExport;
  if (!d) return;

  // Montar cabeçalho
  var cabecalho = ['Apelido'];

  // Grupos: posições 1-4 de cada grupo
  GRUPOS.forEach(function(g){
    for(var p=1;p<=4;p++) cabecalho.push('Grupo '+g+' '+p+'º');
  });

  // Zebras
  for(var z=1;z<=4;z++) cabecalho.push('Zebra '+z);

  // Melhores terceiros
  for(var t=1;t<=8;t++) cabecalho.push('Melhor 3º #'+t);

  // Placares R1
  var RODADAS = [['R1',JOGOS_R1_KEYS],['R2',JOGOS_R2_KEYS],['R3',JOGOS_R3_KEYS]];
  RODADAS.forEach(function(rod){
    var rKey=rod[0], jogos=rod[1];
    GRUPOS.forEach(function(g){
      if(!jogos[g]) return;
      jogos[g].forEach(function(nome, ji){
        cabecalho.push(rKey+' - '+nome);
      });
    });
  });

  // Mata-mata
  cabecalho.push('Campeão');
  cabecalho.push('Decepção Mata-Mata');

  // Montar linhas
  var linhas = [cabecalho];

  d.participantes.forEach(function(ap){
    var linha = [ap];
    var p1 = d.p1Data[ap] || {};
    var p2 = d.p2Data[ap] || {};

    // Grupos
    GRUPOS.forEach(function(g){
      for(var pos=1;pos<=4;pos++) linha.push(p1['g'+g.toLowerCase()+'_'+pos]||p1['g'+g+'_'+pos]||'');
    });

    // Zebras
    for(var z=1;z<=4;z++) linha.push(p1['zebra'+z]||'');

    // Terceiros
    for(var t=1;t<=8;t++) linha.push(p1['t'+t]||'');

    // Placares
    var placares = p1.placares || {};
    if (typeof placares === 'string') { try { placares = JSON.parse(placares); } catch(e){ placares={}; } }
    RODADAS.forEach(function(rod){
      var rKey=rod[0], jogos=rod[1];
      GRUPOS.forEach(function(g){
        if(!jogos[g]) return;
        jogos[g].forEach(function(nome, ji){
          var id = 'placar_'+rKey+'_'+g+'_'+ji;
          var va = placares[id+'_a'] !== undefined ? placares[id+'_a'] : '';
          var vb = placares[id+'_b'] !== undefined ? placares[id+'_b'] : '';
          linha.push(va !== '' && vb !== '' ? va+'x'+vb : '');
        });
      });
    });

    // Mata-mata
    linha.push(p2['champion']||'');
    linha.push(p2['decepcaoMata']||'');

    linhas.push(linha);
  });

  // Gerar CSV
  var csv = linhas.map(function(r){
    return r.map(function(c){ return '"'+(c+'').replace(/"/g,'""')+'"'; }).join(',');
  }).join('\n');

  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'bolao-'+d.bolao.codigo+'-palpites-completos.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function exportarPDF() {
  var d = window._dadosExport;
  if (!d) return;

  var RODADAS = [['R1', JOGOS_R1_KEYS, 'Rodada 1'], ['R2', JOGOS_R2_KEYS, 'Rodada 2'], ['R3', JOGOS_R3_KEYS, 'Rodada 3']];

  var estilos = `
    body { font-family: Arial, sans-serif; background: #fff; color: #111; margin: 0; padding: 0; }
    .jogador { page-break-after: always; padding: 32px 40px; border-bottom: 3px solid #003087; }
    .jogador:last-child { page-break-after: auto; }
    .header-jogador { background: #003087; color: #ffdf00; padding: 14px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
    .header-jogador h2 { margin: 0; font-size: 22px; letter-spacing: 2px; text-transform: uppercase; }
    .header-jogador span { font-size: 13px; color: #7a9fd4; }
    .secao { margin-bottom: 18px; }
    .secao-titulo { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #003087; border-bottom: 2px solid #003087; padding-bottom: 4px; margin-bottom: 10px; }
    .grupos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .grupo-card { border: 1px solid #ddd; border-radius: 6px; padding: 8px; }
    .grupo-label { font-size: 10px; font-weight: 700; color: #003087; letter-spacing: 1px; margin-bottom: 4px; }
    .grupo-times { font-size: 12px; line-height: 1.7; }
    .grupo-times span { display: block; padding: 1px 0; }
    .placares-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .jogo-item { font-size: 11px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 3px 0; }
    .jogo-nome { color: #444; flex: 1; }
    .jogo-placar { font-weight: 700; color: #003087; min-width: 36px; text-align: right; }
    .rodada-titulo { font-size: 10px; font-weight: 700; color: #888; letter-spacing: 1px; text-transform: uppercase; margin: 8px 0 4px; grid-column: 1/-1; }
    .mata-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mata-item { border: 1px solid #ddd; border-radius: 6px; padding: 10px; }
    .mata-label { font-size: 10px; color: #888; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
    .mata-valor { font-size: 14px; font-weight: 700; color: #003087; }
    .zebras-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .zebra-tag { background: #ffdf00; color: #003087; border-radius: 4px; padding: 3px 8px; font-size: 11px; font-weight: 700; }
    .terceiros-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .terceiro-tag { background: #f0f4ff; color: #003087; border: 1px solid #c0d0ff; border-radius: 4px; padding: 3px 8px; font-size: 11px; }
    .bolao-titulo { text-align: center; padding: 20px; font-size: 11px; color: #888; letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px solid #eee; margin-bottom: 8px; }
  `;

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Palpites — ' + d.bolao.nome + '</title><style>' + estilos + '</style></head><body>';
  html += '<div class="bolao-titulo">Bolão: ' + d.bolao.nome + ' · Código: ' + d.bolao.codigo + ' · Copa do Mundo 2026</div>';

  d.participantes.forEach(function(ap) {
    var p1 = d.p1Data[ap] || {};
    var p2 = d.p2Data[ap] || {};
    var placares = p1.placares || {};
    if (typeof placares === 'string') { try { placares = JSON.parse(placares); } catch(e){ placares={}; } }

    html += '<div class="jogador">';

    // Header do jogador
    html += '<div class="header-jogador"><h2>⚽ ' + ap + '</h2><span>' + d.bolao.nome + '</span></div>';

    // Classificação dos grupos
    if (d.p1Map[ap]) {
      html += '<div class="secao"><div class="secao-titulo">Classificação dos Grupos</div>';
      html += '<div class="grupos-grid">';
      GRUPOS.forEach(function(g) {
        html += '<div class="grupo-card"><div class="grupo-label">Grupo ' + g + '</div><div class="grupo-times">';
        for (var pos = 1; pos <= 4; pos++) {
          var time = p1['g' + g + '_' + pos] || '—';
          html += '<span>' + pos + 'º ' + time + '</span>';
        }
        html += '</div></div>';
      });
      html += '</div></div>';

      // Zebras
      var zebras = [];
      for (var z = 1; z <= 4; z++) { if (p1['zebra' + z]) zebras.push(p1['zebra' + z]); }
      if (zebras.length) {
        html += '<div class="secao"><div class="secao-titulo">Zebras</div><div class="zebras-row">';
        zebras.forEach(function(zb) { html += '<span class="zebra-tag">🐴 ' + zb + '</span>'; });
        html += '</div></div>';
      }

      // Melhores terceiros
      var terceiros = [];
      for (var t = 1; t <= 8; t++) { if (p1['t' + t]) terceiros.push(p1['t' + t]); }
      if (terceiros.length) {
        html += '<div class="secao"><div class="secao-titulo">Melhores Terceiros</div><div class="terceiros-row">';
        terceiros.forEach(function(tc) { html += '<span class="terceiro-tag">' + tc + '</span>'; });
        html += '</div></div>';
      }
    }

    // Placares por rodada
    if (d.placMap[ap]) {
      html += '<div class="secao"><div class="secao-titulo">Placares</div>';
      RODADAS.forEach(function(rod) {
        var rKey = rod[0], jogosMap = rod[1], rNome = rod[2];
        html += '<div style="font-size:10px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px;">' + rNome + '</div>';
        html += '<div class="placares-grid">';
        GRUPOS.forEach(function(g) {
          if (!jogosMap[g]) return;
          jogosMap[g].forEach(function(nome, ji) {
            var id = 'placar_' + rKey + '_' + g + '_' + ji;
            var va = placares[id + '_a'] !== undefined ? placares[id + '_a'] : '';
            var vb = placares[id + '_b'] !== undefined ? placares[id + '_b'] : '';
            var placarStr = (va !== '' && vb !== '') ? va + ' x ' + vb : '— x —';
            html += '<div class="jogo-item"><span class="jogo-nome">' + nome + '</span><span class="jogo-placar">' + placarStr + '</span></div>';
          });
        });
        html += '</div>';
      });
      html += '</div>';
    }

    // Mata-mata
    if (d.p2Map[ap]) {
      html += '<div class="secao"><div class="secao-titulo">Mata-Mata</div><div class="mata-grid">';
      html += '<div class="mata-item"><div class="mata-label">🏆 Campeão</div><div class="mata-valor">' + (p2['champion'] || '—') + '</div></div>';
      html += '<div class="mata-item"><div class="mata-label">😬 Decepção</div><div class="mata-valor">' + (p2['decepcaoMata'] || '—') + '</div></div>';
      html += '</div></div>';
    }

    html += '</div>'; // fim .jogador
  });

  html += '</body></html>';

  var blob = new Blob([html], {type: 'text/html;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var win = window.open(url, '_blank');
  setTimeout(function() {
    win.print();
    URL.revokeObjectURL(url);
  }, 800);
}
</script>
</body>
</html>
