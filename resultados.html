<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados — Bolão da Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#ffdf00;--green:#009c3b;--green-light:#00c44f;--blue:#003087;--bg:#001a4a;--bg2:#002266;--bg3:#002d80;--card:#00194a;--border:#1a3d7a;--text:#e8f0ff;--muted:#7a9fd4;--white:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,48,135,0.5) 0%,transparent 60%);}
  .wrapper{max-width:1100px;margin:0 auto;padding:0 20px 80px;}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;text-decoration:none;margin:20px 0 16px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;}
  .back:hover{color:var(--gold);border-color:var(--gold);}
  .page-header{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:2px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:20px;overflow:hidden;}
  .card-header{background:var(--bg3);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold);}
  .card-body{padding:16px 20px;}

  /* Tabelas de grupo */
  .grupos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
  .grupo-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .grupo-titulo{background:var(--bg);padding:7px 12px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--gold);}
  .grupo-table{width:100%;border-collapse:collapse;font-size:11px;}
  .grupo-table th{padding:4px 6px;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
  .grupo-table td{padding:5px 6px;border-top:1px solid rgba(26,61,122,0.3);}
  .grupo-table .pos{font-weight:700;font-size:10px;width:20px;}
  .grupo-table .time-nome{font-weight:500;}
  .grupo-table .num{text-align:center;color:var(--muted);}
  .grupo-table .num.destaque{color:var(--white);}

  /* Jogos */
  .rodada-titulo{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--muted);margin:16px 0 8px;}
  .jogos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:8px;}
  .jogo-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;}
  .jogo-grp{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;}
  .jogo-row{display:flex;align-items:center;gap:6px;}
  .jogo-time{flex:1;font-size:11px;}
  .jogo-time.away{text-align:left;}
  .jogo-time.home{text-align:right;}
  .jogo-placar{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);letter-spacing:2px;white-space:nowrap;}
  .jogo-placar.vazio{font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif;}
  .placar-input{width:36px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:16px;text-align:center;padding:4px 2px;outline:none;}
  .placar-input:focus{border-color:var(--gold);}
  .sep{color:var(--muted);font-size:14px;}

  /* Botões */
  .btn{border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:'DM Sans',sans-serif;}
  .btn-editar{background:rgba(255,223,0,0.1);border:1px solid rgba(255,223,0,0.3);color:#ffdf00;}
  .btn-salvar{background:rgba(255,223,0,0.15);border:1px solid rgba(255,223,0,0.4);color:#ffdf00;}
  .btn-calcular{background:rgba(0,196,79,0.15);border:1px solid rgba(0,196,79,0.4);color:#00c44f;}
  .btn-cancelar{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .btn-aleatorio{background:rgba(255,223,0,0.1);border:1px solid rgba(255,223,0,0.3);color:#ffdf00;}
  .btn-limpar{background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);color:#ff6b6b;}
  .acoes{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap;}
  .loading{text-align:center;color:var(--muted);padding:32px;}
</style>
</head>
<body>
<div class="wrapper">
  <a href="index.html" class="back">← Voltar</a>

  <div class="page-header">
    <div>
      <div class="page-title">⚽ Resultados — Copa 2026</div>
      <div id="ultimaAtualizacao" style="font-size:11px;color:var(--muted);margin-top:4px;"></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="btnEditar" class="btn btn-editar" style="display:none;" onclick="toggleEdicao()">✏️ EDITAR</button>
    </div>
  </div>

  <div id="tabelasGrupos" class="card">
    <div class="card-header"><span class="card-title">📊 CLASSIFICAÇÃO DOS GRUPOS</span></div>
    <div class="card-body"><div class="loading">Carregando...</div></div>
  </div>

  <div id="listaJogos" class="card">
    <div class="card-header"><span class="card-title">🗓️ JOGOS</span></div>
    <div class="card-body"><div class="loading">Carregando...</div></div>
  </div>

  <div id="acoesEdicao" style="display:none;" class="acoes">
    <button class="btn btn-cancelar" onclick="cancelarEdicao()">CANCELAR</button>
    <button class="btn btn-limpar" onclick="limparResultados()">🗑️ LIMPAR RESULTADOS</button>
    <button class="btn btn-aleatorio" onclick="preencherAleatorio()">🎲 PREENCHER ALEATÓRIO</button>
    <button class="btn btn-salvar" onclick="salvarResultados()">💾 SALVAR RESULTADOS</button>
    <button class="btn btn-calcular" onclick="calcularEPublicarRanking()">🏆 CALCULAR E PUBLICAR RANKING</button>
  </div>
</div>

<script src="db.js"></script>
<script src="auth.js"></script>
<script src="regras-admin.js"></script>
<script>
var ADMIN_APELIDO = 'MDANTAS';
var _modoEdicao = false;
var _resultadosDB = [];

var GRUPOS_DISPLAY = {
  A:['México','África do Sul','Coreia do Sul','República Tcheca'],
  B:['Canadá','Bósnia e Herzegovina','Catar','Suíça'],
  C:['Brasil','Marrocos','Haiti','Escócia'],
  D:['Estados Unidos','Turquia','Paraguai','Austrália'],
  E:['Alemanha','Curaçao','Costa do Marfim','Equador'],
  F:['Holanda','Japão','Suécia','Tunísia'],
  G:['Bélgica','Egito','Irã','Nova Zelândia'],
  H:['Espanha','Cabo Verde','Arábia Saudita','Uruguai'],
  I:['França','Senegal','Noruega','Iraque'],
  J:['Argentina','Argélia','Áustria','Jordânia'],
  K:['Portugal','RD Congo','Uzbequistão','Colômbia'],
  L:['Inglaterra','Croácia','Gana','Panamá']
};

var JOGOS_R1 = {
  A:[['México','África do Sul'],['Coreia do Sul','República Tcheca']],
  B:[['Canadá','Bósnia e Herzegovina'],['Catar','Suíça']],
  C:[['Brasil','Marrocos'],['Haiti','Escócia']],
  D:[['Estados Unidos','Paraguai'],['Austrália','Turquia']],
  E:[['Alemanha','Curaçao'],['Costa do Marfim','Equador']],
  F:[['Holanda','Japão'],['Suécia','Tunísia']],
  G:[['Bélgica','Egito'],['Irã','Nova Zelândia']],
  H:[['Espanha','Cabo Verde'],['Arábia Saudita','Uruguai']],
  I:[['França','Senegal'],['Noruega','Iraque']],
  J:[['Argentina','Argélia'],['Áustria','Jordânia']],
  K:[['Portugal','RD Congo'],['Uzbequistão','Colômbia']],
  L:[['Inglaterra','Croácia'],['Gana','Panamá']]
};
var JOGOS_R2 = {
  A:[['México','Coreia do Sul'],['África do Sul','República Tcheca']],
  B:[['Canadá','Catar'],['Bósnia e Herzegovina','Suíça']],
  C:[['Brasil','Haiti'],['Marrocos','Escócia']],
  D:[['Estados Unidos','Austrália'],['Turquia','Paraguai']],
  E:[['Alemanha','Costa do Marfim'],['Curaçao','Equador']],
  F:[['Holanda','Suécia'],['Japão','Tunísia']],
  G:[['Bélgica','Irã'],['Egito','Nova Zelândia']],
  H:[['Espanha','Arábia Saudita'],['Cabo Verde','Uruguai']],
  I:[['França','Iraque'],['Noruega','Senegal']],
  J:[['Argentina','Áustria'],['Argélia','Jordânia']],
  K:[['Portugal','Uzbequistão'],['Colômbia','RD Congo']],
  L:[['Inglaterra','Gana'],['Croácia','Panamá']]
};
var JOGOS_R3 = {
  A:[['México','República Tcheca'],['África do Sul','Coreia do Sul']],
  B:[['Canadá','Suíça'],['Bósnia e Herzegovina','Catar']],
  C:[['Brasil','Escócia'],['Marrocos','Haiti']],
  D:[['Estados Unidos','Turquia'],['Paraguai','Austrália']],
  E:[['Alemanha','Equador'],['Curaçao','Costa do Marfim']],
  F:[['Holanda','Tunísia'],['Japão','Suécia']],
  G:[['Bélgica','Nova Zelândia'],['Egito','Irã']],
  H:[['Espanha','Uruguai'],['Cabo Verde','Arábia Saudita']],
  I:[['França','Noruega'],['Senegal','Iraque']],
  J:[['Argentina','Jordânia'],['Argélia','Áustria']],
  K:[['Portugal','Colômbia'],['RD Congo','Uzbequistão']],
  L:[['Inglaterra','Panamá'],['Croácia','Gana']]
};

// Montar array flat de jogos a partir dos objetos por rodada
var JOGOS = [];
[['R1',JOGOS_R1],['R2',JOGOS_R2],['R3',JOGOS_R3]].forEach(function(rd){
  var r=rd[0], obj=rd[1];
  Object.keys(obj).forEach(function(g){
    obj[g].forEach(function(jogo,i){
      JOGOS.push({r:r,g:g,i:i,a:jogo[0],b:jogo[1]});
    });
  });
});

function jogoKey(j){ return j.r+'_'+j.g+'_'+j.i; }

function getResultado(jogo){
  var k = jogoKey(jogo);
  return _resultadosDB.find(function(x){ return x.api_id===k; })||null;
}

function calcularTabela(g){
  var times = GRUPOS_DISPLAY[g];
  var tab = {};
  times.forEach(function(t){ tab[t]={t:t,p:0,j:0,v:0,e:0,d:0,gf:0,gc:0,sg:0}; });
  JOGOS.filter(function(j){ return j.g===g; }).forEach(function(jogo){
    var res = getResultado(jogo);
    if(!res||res.gols_a===null||res.gols_b===null) return;
    var ga=parseInt(res.gols_a),gb=parseInt(res.gols_b);
    var ta=tab[jogo.a],tb=tab[jogo.b];
    if(!ta||!tb) return;
    ta.j++;tb.j++;ta.gf+=ga;ta.gc+=gb;ta.sg+=ga-gb;tb.gf+=gb;tb.gc+=ga;tb.sg+=gb-ga;
    if(ga>gb){ta.v++;ta.p+=3;tb.d++;}
    else if(ga<gb){tb.v++;tb.p+=3;ta.d++;}
    else{ta.e++;ta.p++;tb.e++;tb.p++;}
  });
  return Object.values(tab).sort(function(a,b){
    if(b.p!==a.p) return b.p-a.p;
    if(b.sg!==a.sg) return b.sg-a.sg;
    return b.gf-a.gf;
  });
}

function renderTabelasGrupos(){
  var el = document.getElementById('tabelasGrupos');
  var html = '<div class="card-header"><span class="card-title">📊 CLASSIFICAÇÃO DOS GRUPOS</span></div><div class="card-body"><div class="grupos-grid">';
  Object.keys(GRUPOS_DISPLAY).forEach(function(g){
    var rows = calcularTabela(g);
    html += '<div class="grupo-box"><div class="grupo-titulo">GRUPO '+g+'</div>';
    html += '<table class="grupo-table"><thead><tr>';
    html += '<th style="text-align:left;width:20px;"></th>';
    html += '<th style="text-align:left;">SELEÇÃO</th>';
    ['P','J','V','E','D','GF','GC','SG'].forEach(function(h){ html+='<th>'+h+'</th>'; });
    html += '</tr></thead><tbody>';
    rows.forEach(function(row,i){
      var cor = i<2?'var(--gold)':i===2?'#7a9fd4':'var(--muted)';
      html += '<tr><td class="pos" style="color:'+cor+';">'+(i+1)+'º</td>';
      html += '<td class="time-nome" style="font-weight:'+(i<2?'700':'400')+';">'+row.t+'</td>';
      [row.p,row.j,row.v,row.e,row.d,row.gf,row.gc,row.sg].forEach(function(v){
        html += '<td class="num'+(v>0?' destaque':'')+'">'+v+'</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  });
  html += '</div></div>';
  el.innerHTML = html;
}

function renderJogos(){
  var el = document.getElementById('listaJogos');
  var html = '<div class="card-header"><span class="card-title">🗓️ JOGOS</span></div><div class="card-body">';
  ['R1','R2','R3'].forEach(function(r){
    var label = r==='R1'?'Rodada 1':r==='R2'?'Rodada 2':'Rodada 3';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px;">';
    html += '<div class="rodada-titulo" style="margin:0;">'+label.toUpperCase()+'</div>';
    html += '<button onclick="limparRodada(\''+r+'\')" style="background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);color:#ff6b6b;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;">🗑️ Limpar</button>';
    html += '</div>';
    html += '<div class="jogos-grid">';
    JOGOS.filter(function(j){ return j.r===r; }).forEach(function(jogo){
      var res = getResultado(jogo);
      var ga = res&&res.gols_a!==null?res.gols_a:null;
      var gb = res&&res.gols_b!==null?res.gols_b:null;
      var key = jogoKey(jogo);
      html += '<div class="jogo-card">';
      html += '<div class="jogo-grp">GRP '+jogo.g+'</div>';
      html += '<div class="jogo-row">';
      html += '<span class="jogo-time home">'+jogo.a+'</span>';
      if(_modoEdicao){
        html += '<input class="placar-input" id="res_'+key+'_a" type="number" min="0" max="99" value="'+(ga!==null?ga:'')+'" placeholder="">';
        html += '<span class="sep">×</span>';
        html += '<input class="placar-input" id="res_'+key+'_b" type="number" min="0" max="99" value="'+(gb!==null?gb:'')+'" placeholder="">';
      } else {
        if(ga!==null){
          html += '<span class="jogo-placar">'+ga+' × '+gb+'</span>';
        } else {
          html += '<span class="jogo-placar vazio">— × —</span>';
        }
      }
      html += '<span class="jogo-time away">'+jogo.b+'</span>';
      html += '</div></div>';
    });
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderTudo(){
  renderTabelasGrupos();
  renderJogos();
  // Timestamp
  var ts = document.getElementById('ultimaAtualizacao');
  if(ts&&_resultadosDB.length){
    var datas = _resultadosDB.filter(function(x){return x.atualizado_em;}).map(function(x){return new Date(x.atualizado_em);});
    if(datas.length){
      var ultima = new Date(Math.max.apply(null,datas));
      ts.textContent = 'Última atualização: '+ultima.toLocaleDateString('pt-BR')+' às '+ultima.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    }
  }
}

async function carregarResultados(){
  var H = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
  try {
    var r = await fetch(SUPABASE_URL+'/rest/v1/resultados?select=*',{headers:H});
    _resultadosDB = r.ok ? await r.json() : [];
  } catch(e){ _resultadosDB = []; }
  renderTudo();
}

function toggleEdicao(){
  _modoEdicao = !_modoEdicao;
  document.getElementById('btnEditar').textContent = _modoEdicao ? '👁️ VISUALIZAR' : '✏️ EDITAR';
  document.getElementById('acoesEdicao').style.display = _modoEdicao ? 'flex' : 'none';
  renderTudo();
}

function cancelarEdicao(){
  _modoEdicao = false;
  document.getElementById('btnEditar').textContent = '✏️ EDITAR';
  document.getElementById('acoesEdicao').style.display = 'none';
  renderTudo();
}

async function salvarResultados(){
  var H = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
  var erros = 0;
  for(var i=0;i<JOGOS.length;i++){
    var jogo = JOGOS[i];
    var key = jogoKey(jogo);
    var elA = document.getElementById('res_'+key+'_a');
    var elB = document.getElementById('res_'+key+'_b');
    if(!elA||elA.value==='') continue;
    var ga = parseInt(elA.value), gb = parseInt(elB.value);
    if(isNaN(ga)||isNaN(gb)) continue;
    var existente = getResultado(jogo);
    var payload = {grupo:jogo.g,rodada:parseInt(jogo.r.replace('R','')),time_a:jogo.a,time_b:jogo.b,gols_a:ga,gols_b:gb,finalizado:true,api_id:key,atualizado_em:new Date().toISOString()};
    var resp;
    if(existente){
      resp = await fetch(SUPABASE_URL+'/rest/v1/resultados?api_id=eq.'+encodeURIComponent(key),{method:'PATCH',headers:H,body:JSON.stringify(payload)});
    } else {
      resp = await fetch(SUPABASE_URL+'/rest/v1/resultados',{method:'POST',headers:H,body:JSON.stringify(payload)});
    }
    if(!resp.ok) erros++;
  }
  if(erros){ alert('Erro ao salvar '+erros+' resultado(s).'); return; }
  alert('Resultados salvos!');
  await carregarResultados();
  cancelarEdicao();
}

async function _salvarResultadosSilencioso(){
  var H = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
  for(var i=0;i<JOGOS.length;i++){
    var jogo=JOGOS[i], key=jogoKey(jogo);
    var elA=document.getElementById('res_'+key+'_a'), elB=document.getElementById('res_'+key+'_b');
    if(!elA||elA.value==='') continue;
    var ga=parseInt(elA.value), gb=parseInt(elB.value);
    if(isNaN(ga)||isNaN(gb)) continue;
    var existente=getResultado(jogo);
    var payload={grupo:jogo.g,rodada:parseInt(jogo.r.replace('R','')),time_a:jogo.a,time_b:jogo.b,gols_a:ga,gols_b:gb,finalizado:true,api_id:key,atualizado_em:new Date().toISOString()};
    if(existente){
      await fetch(SUPABASE_URL+'/rest/v1/resultados?api_id=eq.'+encodeURIComponent(key),{method:'PATCH',headers:H,body:JSON.stringify(payload)});
    } else {
      await fetch(SUPABASE_URL+'/rest/v1/resultados',{method:'POST',headers:H,body:JSON.stringify(payload)});
    }
  }
}

async function calcularEPublicarRanking(){
  if(!confirm('Calcular e publicar ranking para TODOS os bolões?')) return;
  var H = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};

  console.log('[CALC] Iniciando...');
  await _salvarResultadosSilencioso();
  console.log('[CALC] Resultados salvos. Carregando...');
  await carregarResultados();
  console.log('[CALC] Resultados carregados:', _resultadosDB.length);

  var rb = await fetch(SUPABASE_URL+'/rest/v1/boloes?select=*',{headers:H});
  console.log('[CALC] Boloes status:', rb.status);
  var boloes = rb.ok ? await rb.json() : [];
  console.log('[CALC] Boloes:', boloes.length);
  if(!boloes.length){ alert('Nenhum bolão encontrado.'); return; }

  // Buscar TODOS os palpites sem limite (paginando se necessário)
  var todosPalpites1 = [];
  var pageSize = 1000;
  var offset = 0;
  while(true){
    var H3 = Object.assign({},H,{'Range': offset+'-'+(offset+pageSize-1), 'Prefer':'count=none'});
    var rp1 = await fetch(SUPABASE_URL+'/rest/v1/palpites_fase1?select=*&order=criado_em.asc&limit='+pageSize+'&offset='+offset,{headers:H3});
    console.log('[CALC] Palpites status:', rp1.status, 'offset:', offset);
    if(!rp1.ok) break;
    var batch = await rp1.json();
    todosPalpites1 = todosPalpites1.concat(batch);
    if(batch.length < pageSize) break;
    offset += pageSize;
  }
  console.log('[CALC] Palpites total:', todosPalpites1.length);

  // Mesclar registros por bolao_id+apelido
  var palpitesMap = {};
  todosPalpites1.forEach(function(x){
    var chave = x.bolao_id+'|'+x.apelido;
    if(!palpitesMap[chave]) palpitesMap[chave]={};
    Object.keys(x).forEach(function(k){
      if(k==='placares'){
        var pl=x[k];
        if(pl){
          if(typeof pl==='string'){try{pl=JSON.parse(pl);}catch(e){pl={};}}
          if(!palpitesMap[chave].placares) palpitesMap[chave].placares={};
          Object.assign(palpitesMap[chave].placares,pl);
        }
      } else if(x[k]!==null&&x[k]!==undefined&&x[k]!==''){
        palpitesMap[chave][k]=x[k];
      }
    });
  });

  var pontuacoes = [];
  Object.keys(palpitesMap).forEach(function(chave){
    var p1 = palpitesMap[chave];
    var pts_grupos=0, pts_placares=0, pts_zebras=0;

    // Grupos
    Object.keys(GRUPOS_DISPLAY).forEach(function(g){
      var tabelaReal = calcularTabela(g);
      for(var pos=1;pos<=4;pos++){
        var tp = p1['g'+g.toLowerCase()+'_'+pos]||p1['g'+g+'_'+pos]||'';
        if(!tp) continue;
        var posReal = tabelaReal.findIndex(function(t){return t.t===tp;});
        if(posReal===-1) continue;
        if(posReal+1===pos) pts_grupos+=REGRAS.grupos.posicao_exata;
        if(posReal<2&&pos<=2) pts_grupos+=REGRAS.grupos.classificado_direto;
      }
    });

    // Placares por rodada
    var placares = p1.placares||{};
    if(typeof placares==='string'){try{placares=JSON.parse(placares);}catch(e){placares={};}}
    if(typeof placares!=='object'||placares===null) placares={};
    var ptsR1=[], ptsR2=[], ptsR3=[];
    JOGOS.forEach(function(jogo){
      var res = getResultado(jogo);
      if(!res||res.gols_a===null||res.gols_b===null) return;
      var key = jogoKey(jogo);
      var pa=placares['placar_'+key+'_a'], pb=placares['placar_'+key+'_b'];
      if(pa===undefined||pa===null||pb===undefined||pb===null) return;
      var pts = REGRAS.calcularPlacar(pa,pb,res.gols_a,res.gols_b);
      if(jogo.r==='R1') ptsR1.push(pts);
      else if(jogo.r==='R2') ptsR2.push(pts);
      else ptsR3.push(pts);
    });
    var todosPlacares = ptsR1.concat(ptsR2).concat(ptsR3);
    todosPlacares.sort(function(a,b){return b-a;});
    pts_placares = todosPlacares.slice(0,24).reduce(function(s,v){return s+v;},0);
    var pts_placares_r1 = ptsR1.reduce(function(s,v){return s+v;},0);
    var pts_placares_r2 = ptsR2.reduce(function(s,v){return s+v;},0);
    var pts_placares_r3 = ptsR3.reduce(function(s,v){return s+v;},0);

    // Zebras
    for(var zi=1;zi<=4;zi++){
      var zebra=p1['zebra'+zi];
      if(!zebra) continue;
      var grupoZ=null;
      Object.keys(GRUPOS_DISPLAY).forEach(function(g){if(GRUPOS_DISPLAY[g].indexOf(zebra)>=0)grupoZ=g;});
      if(!grupoZ) continue;
      var tabZ=calcularTabela(grupoZ);
      var posZ=tabZ.findIndex(function(t){return t.t===zebra;});
      if(posZ===0) pts_zebras+=REGRAS.zebras.primeiro_lugar;
      else if(posZ===1) pts_zebras+=REGRAS.zebras.segundo_lugar;
      else if(posZ===2) pts_zebras+=REGRAS.zebras.melhor_terceiro;
    }

    // Terceiros — comparar palpite t1..t8 com os 8 terceiros que realmente avançaram
    var pts_terceiros = 0;
    // Montar lista dos 8 melhores terceiros reais (ordenados por pontos/sg/gf)
    var todosTerceiros = [];
    Object.keys(GRUPOS_DISPLAY).forEach(function(g){
      var tab = calcularTabela(g);
      if(tab[2] && tab[2].j > 0) todosTerceiros.push({t:tab[2].t, p:tab[2].p, sg:tab[2].sg, gf:tab[2].gf});
    });
    todosTerceiros.sort(function(a,b){
      if(b.p!==a.p) return b.p-a.p;
      if(b.sg!==a.sg) return b.sg-a.sg;
      return b.gf-a.gf;
    });
    var oitoMelhores = todosTerceiros.slice(0,8).map(function(x){return x.t;});
    for(var ti=1;ti<=8;ti++){
      var tPalpite = p1['t'+ti];
      if(!tPalpite) continue;
      var posReal = oitoMelhores.indexOf(tPalpite);
      if(posReal === -1) continue; // não avançou
      if(posReal+1 === ti) pts_terceiros += REGRAS.terceiros.avancou_posicao_certa;
      else pts_terceiros += REGRAS.terceiros.avancou_posicao_errada;
    }

    pontuacoes.push({
      bolao_id:p1.bolao_id,
      apelido:p1.apelido,
      pts_grupos:pts_grupos,
      pts_placares:pts_placares,
      pts_placares_r1:pts_placares_r1,
      pts_placares_r2:pts_placares_r2,
      pts_placares_r3:pts_placares_r3,
      pts_zebras:pts_zebras,
      pts_terceiros:pts_terceiros,
      total:pts_grupos+pts_placares+pts_zebras+pts_terceiros,
      atualizado_em:new Date().toISOString()
    });
  });

  // Limpar pontuações antigas e reinserir
  for(var i=0;i<boloes.length;i++){
    var delResp = await fetch(SUPABASE_URL+'/rest/v1/pontuacoes?bolao_id=eq.'+boloes[i].id,{method:'DELETE',headers:H});
    if(!delResp.ok){ var delErr=await delResp.text(); console.error('DELETE erro:',delResp.status,delErr); }
    else { console.log('DELETE OK para bolao',boloes[i].id); }
  }
  if(pontuacoes.length){
    // Usar upsert com a constraint única
    var H2=Object.assign({},H,{'Prefer':'resolution=merge-duplicates,return=minimal'});
    var resp=await fetch(SUPABASE_URL+'/rest/v1/pontuacoes',{method:'POST',headers:H2,body:JSON.stringify(pontuacoes)});
    if(!resp.ok){
      var errText=await resp.text();
      console.error('INSERT erro:',resp.status,errText);
      alert('Erro ao publicar ranking: '+errText);
      return;
    }
    console.log('INSERT OK —',pontuacoes.length,'registros');
  }
  alert('✅ Ranking publicado para '+pontuacoes.length+' jogador(es) em '+boloes.length+' bolão(ões)!');
}

function preencherAleatorio(){
  JOGOS.forEach(function(jogo){
    var key = jogoKey(jogo);
    var elA = document.getElementById('res_'+key+'_a');
    var elB = document.getElementById('res_'+key+'_b');
    if(elA && elB){ elA.value = Math.floor(Math.random()*5); elB.value = Math.floor(Math.random()*5); }
  });
}

async function limparRodada(rodada) {
  var label = rodada==='R1'?'Rodada 1':rodada==='R2'?'Rodada 2':'Rodada 3';
  if (!confirm('Apagar todos os resultados da '+label+'?\nEsta ação não pode ser desfeita.')) return;
  var H = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
  var num = parseInt(rodada.replace('R',''));
  var r = await fetch(SUPABASE_URL+'/rest/v1/resultados?rodada=eq.'+num,{method:'DELETE',headers:H});
  if (!r.ok) { alert('Erro ao apagar resultados da '+label+'.'); return; }
  // Remover do cache local
  _resultadosDB = _resultadosDB.filter(function(x){ return x.rodada !== num; });
  alert('✅ Resultados da '+label+' apagados.');
  renderTudo();
}

async function limparResultados(){
  if(!confirm('Apagar TODOS os resultados e zerar o ranking? Esta ação não pode ser desfeita.')) return;
  var H = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};

  // Apagar resultados
  var r1 = await fetch(SUPABASE_URL+'/rest/v1/resultados?id=neq.00000000-0000-0000-0000-000000000000',{method:'DELETE',headers:H});
  if(!r1.ok){ alert('Erro ao apagar resultados.'); return; }

  // Zerar pontuações
  var r2 = await fetch(SUPABASE_URL+'/rest/v1/pontuacoes?id=neq.00000000-0000-0000-0000-000000000000',{method:'DELETE',headers:H});
  if(!r2.ok){ alert('Resultados apagados, mas erro ao zerar ranking.'); }

  _resultadosDB = [];
  alert('Resultados apagados e ranking zerado.');
  renderTudo();
}

// Init
window.addEventListener('DOMContentLoaded', function(){
  renderTudo();
  carregarResultados();
  var u = (typeof AUTH!=='undefined') ? AUTH.get() : null;
  if(u && u.apelido===ADMIN_APELIDO){
    document.getElementById('btnEditar').style.display = 'inline-block';
  }
});
</script>
