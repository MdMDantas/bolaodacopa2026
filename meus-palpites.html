<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Meus Palpites — Bolão da Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#ffdf00;--green:#009c3b;--green-light:#00c44f;--blue:#003087;--bg:#001a4a;--bg2:#002266;--bg3:#002d80;--card:#00194a;--border:#1a3d7a;--text:#e8f0ff;--muted:#7a9fd4;--white:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,48,135,0.5) 0%,transparent 60%);}
  .wrapper{max-width:720px;margin:0 auto;padding:0 20px 80px;}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;text-decoration:none;margin:20px 0 16px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;}
  .back:hover{color:var(--gold);border-color:var(--gold);}

  /* HEADER */
  .page-header{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .user-info .label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .user-info .nome{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:2px;line-height:1.1;}
  .user-info .bolao-tag{font-size:12px;color:var(--muted);margin-top:4px;}
  .btn-sair{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .btn-sair:hover{border-color:var(--gold);color:var(--gold);}

  /* BUSCA DE BOLÃO */
  .bolao-busca{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:24px;}
  .bolao-busca label{display:block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
  .busca-row{display:flex;gap:10px;}
  .busca-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;text-transform:uppercase;}
  .busca-row input:focus{border-color:var(--gold);}
  .busca-row button{background:var(--gold);color:var(--blue);border:none;border-radius:10px;padding:12px 20px;font-family:'Bebas Neue',sans-serif;font-size:15px;cursor:pointer;font-weight:900;}

  /* LOGIN REQUIRED */
  .login-required{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:40px;text-align:center;}
  .login-required .icone{font-size:48px;margin-bottom:16px;}
  .login-required h2{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;}
  .login-required p{font-size:14px;color:var(--muted);margin-bottom:20px;}
  .btn-login{display:inline-block;background:var(--gold);color:var(--blue);border:none;border-radius:12px;padding:14px 28px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;font-weight:900;text-decoration:none;}

  /* TABS */
  .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:5px;}
  .tab{flex:1;padding:10px 8px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;border-radius:8px;color:var(--muted);border:none;background:transparent;transition:all .2s;}
  .tab.active{background:var(--gold);color:var(--blue);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* CARDS DE SEÇÃO */
  .section-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
  .section-card-header{background:var(--bg3);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
  .section-card-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);}
  .section-card-body{padding:16px 20px;}

  /* TABELA DE GRUPOS */
  .grupo-block{margin-bottom:20px;}
  .grupo-titulo{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,223,0,0.15);}
  .grupo-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(26,61,122,0.3);}
  .grupo-row:last-child{border-bottom:none;}
  .pos-badge{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;flex-shrink:0;}
  .pos-1{background:rgba(255,223,0,0.2);color:var(--gold);border:1px solid rgba(255,223,0,0.4);}
  .pos-2{background:rgba(170,170,170,0.15);color:#aaa;border:1px solid rgba(170,170,170,0.3);}
  .pos-3{background:rgba(0,156,59,0.15);color:var(--green-light);border:1px solid rgba(0,196,79,0.3);}
  .pos-4{background:rgba(122,159,212,0.1);color:var(--muted);border:1px solid rgba(122,159,212,0.2);}
  .team-name{font-size:14px;font-weight:500;flex:1;}
  .team-empty{color:var(--muted);font-style:italic;font-size:13px;}

  /* TERCEIROS */
  .terceiros-lista{display:flex;flex-direction:column;gap:8px;}
  .terceiro-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border-radius:10px;padding:10px 14px;}
  .terceiro-rank{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green-light);min-width:28px;}
  .terceiro-nome{font-size:14px;font-weight:500;}
  .terceiro-vazio{color:var(--muted);font-style:italic;font-size:13px;}

  /* ZEBRAS */
  .zebras-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .zebra-item{background:linear-gradient(135deg,rgba(0,156,59,0.12),rgba(0,26,74,0.9));border:1px solid rgba(0,196,79,0.2);border-radius:10px;padding:14px;}
  .zebra-num{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);margin-bottom:4px;}
  .zebra-nome{font-size:15px;font-weight:600;}
  .zebra-vazio{color:var(--muted);font-style:italic;font-size:13px;}

  /* PLACARES */
  .rodada-block{margin-bottom:20px;}
  .rodada-titulo{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(26,61,122,0.4);}
  .jogo-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(26,61,122,0.2);}
  .jogo-row:last-child{border-bottom:none;}
  .jogo-time{font-size:13px;font-weight:500;flex:1;text-align:right;}
  .jogo-time.away{text-align:left;}
  .jogo-placar{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .placar-num{background:var(--bg3);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);}
  .placar-x{font-size:11px;color:var(--muted);}
  .placar-vazio{color:var(--muted);font-size:12px;font-style:italic;}
  .jogo-data{font-size:10px;color:var(--muted);white-space:nowrap;}

  /* MATA-MATA */
  .mata-fase{margin-bottom:18px;}
  .mata-fase-titulo{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .mata-jogo{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-radius:8px;margin-bottom:6px;}
  .mata-jogo .vs{font-size:10px;color:var(--muted);flex-shrink:0;}
  .mata-time{font-size:13px;font-weight:500;flex:1;}
  .mata-time.empty{color:var(--muted);font-style:italic;}
  .mata-winner{font-size:11px;color:var(--green-light);background:rgba(0,196,79,0.1);border:1px solid rgba(0,196,79,0.2);border-radius:6px;padding:2px 8px;white-space:nowrap;}

  /* CAMPEÃO */
  .campiao-box{background:linear-gradient(135deg,rgba(255,223,0,0.1),rgba(0,26,74,0.9));border:1px solid rgba(255,223,0,0.3);border-radius:14px;padding:24px;text-align:center;margin-bottom:16px;}
  .campiao-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .campiao-nome{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);letter-spacing:3px;}
  .campiao-trophy{font-size:36px;margin-bottom:8px;}

  /* PONTUAÇÃO */
  .pontos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
  .pontos-section-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .pontos-section-title.grupos{color:var(--green-light);}
  .pontos-section-title.matamata{color:#E74C3C;}
  .ponto-card{background:var(--bg2);border-radius:10px;padding:16px;text-align:center;}
  .ponto-card .valor{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);line-height:1;}
  .ponto-card .label{font-size:11px;color:var(--muted);margin-top:4px;}
  .ponto-total{background:linear-gradient(135deg,rgba(255,223,0,0.08),rgba(0,26,74,0.9));border:1px solid rgba(255,223,0,0.25);border-radius:12px;padding:16px;text-align:center;}
  .ponto-total .valor{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--gold);}
  .ponto-total .label{font-size:13px;color:var(--muted);}
  .ranking-pos-box{margin-top:16px;background:var(--bg3);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:center;gap:12px;}
  .ranking-pos-box .pos{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);}
  .ranking-pos-box .label{font-size:13px;color:var(--muted);}

  /* ESTADO VAZIO / LOADING */
  .estado-vazio{text-align:center;padding:32px 20px;color:var(--muted);font-size:14px;}
  .estado-vazio strong{color:var(--gold);display:block;font-size:16px;margin-bottom:6px;}
  .loading{text-align:center;padding:40px;color:var(--muted);}
  .spinner{display:inline-block;width:24px;height:24px;border:3px solid rgba(255,223,0,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-right:10px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* NAO ENVIADO */
  .nao-enviado{background:rgba(255,80,80,0.06);border:1px solid rgba(255,80,80,0.15);border-radius:12px;padding:16px;text-align:center;color:#ff8080;font-size:13px;}
  .nao-enviado strong{display:block;font-size:15px;margin-bottom:6px;}
  .btn-ir{display:inline-block;margin-top:10px;background:var(--gold);color:var(--blue);border:none;border-radius:8px;padding:10px 20px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;text-decoration:none;font-weight:900;}
</style>
</head>

async function limparRodada(rodada) {
  if (!_palpite1 || !_bolaoAtual || !_usuario) return;
  if (!confirm('Apagar todos os placares da ' + (rodada==='R1'?'Rodada 1':rodada==='R2'?'Rodada 2':'Rodada 3') + '? Esta ação não pode ser desfeita.')) return;

  var placares = _palpite1.placares;
  if (typeof placares === 'string') { try { placares = JSON.parse(placares); } catch(e) { placares = {}; } }
  placares = placares || {};

  // Remover todas as chaves da rodada
  Object.keys(placares).forEach(function(k) {
    if (k.indexOf('placar_'+rodada+'_') === 0) delete placares[k];
  });

  // Salvar de volta no banco
  var H = {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'};
  var r = await fetch(SUPABASE_URL+'/rest/v1/palpites_fase1?bolao_id=eq.'+_bolaoAtual.id+'&apelido=eq.'+encodeURIComponent(_usuario.apelido), {
    method: 'PATCH',
    headers: H,
    body: JSON.stringify({ placares: placares })
  });

  if (r.ok) {
    _palpite1.placares = placares;
    renderPlacares();
    alert('Placares da ' + (rodada==='R1'?'Rodada 1':rodada==='R2'?'Rodada 2':'Rodada 3') + ' apagados.');
  } else {
    alert('Erro ao apagar. Tente novamente.');
  }
}

        html += '<div class="mata-jogo"><div class="mata-time">'+v+'</div><span class="mata-winner">classificado</span></div>';
      });
    }
    html += '</div></div>';
  });

  // Decepção
  if (d.decepcaoMata) {
    html += '<div class="section-card"><div class="section-card-header"><span class="section-card-title">😬 Decepção do Mata-mata</span></div>';
    html += '<div class="section-card-body"><div class="mata-jogo"><div class="mata-time">'+d.decepcaoMata+'</div></div></div></div>';
  }

  // Top 4
  var top4Labels = ['🥇 Campeão','🥈 Vice','🥉 3º Lugar','4️⃣ 4º Lugar'];
  var top4Ids = ['top4_1','top4_2','top4_3','top4_4'];
  var top4Vals = top4Ids.map(function(id){ return d[id]||''; });
  if (top4Vals.some(function(v){ return v; })) {
    html += '<div class="section-card"><div class="section-card-header"><span class="section-card-title">🏅 Top 4 Final</span></div><div class="section-card-body">';
    top4Ids.forEach(function(id, i) {
      var val = d[id]||'';
      html += '<div class="mata-jogo"><div class="mata-time'+(val?'':' empty')+'">'+top4Labels[i]+': '+(val||'Não escolhido')+'</div></div>';
    });
    html += '</div></div>';
  }

  // Azarão
  var decep1 = d['decepcao1']||'';
  if (decep1) {
    html += '<div class="section-card"><div class="section-card-header"><span class="section-card-title">⭐ Azarão</span></div><div class="section-card-body">';
    html += '<div class="mata-jogo"><div class="mata-time">⭐ ' + decep1 + '</div></div>';
    html += '</div></div>';
  }

  // Zebras do Mata-Mata
  var zebrasMM = [d['zebra_mm_1']||'', d['zebra_mm_2']||'', d['zebra_mm_3']||'', d['zebra_mm_4']||''].filter(Boolean);
  if (zebrasMM.length) {
    html += '<div class="section-card"><div class="section-card-header"><span class="section-card-title">🌪️ Zebras do Mata-Mata</span></div><div class="section-card-body">';
    zebrasMM.forEach(function(z, zi) {
      html += '<div class="mata-jogo"><div class="mata-time">🌪️ Zebra ' + (zi+1) + ': ' + z + '</div></div>';
    });
    html += '</div></div>';
  }

  el.innerHTML = html;
}

async function buscarPosicaoRanking() {
  if (!_bolaoAtual) return;
  try {
    var r = await fetch(SUPABASE_URL+'/rest/v1/pontuacoes?bolao_id=eq.'+_bolaoAtual.id+'&select=apelido,total&order=total.desc', {headers:H});
    if (!r.ok) return;
    var ranking = await r.json();
    var pos = ranking.findIndex(function(x){ return x.apelido === _usuario.apelido; });
    var box = document.getElementById('rankingPosBox');
    if (!box) return;
    if (pos === -1) {
      box.innerHTML = '<div class="label">Posição no ranking ainda não calculada</div>';
    } else {
      box.innerHTML = '<div class="pos">'+(pos+1)+'º</div><div class="label">no ranking do bolão</div>';
    }
  } catch(e) {}
}

function exportarPalpitesPDF() {
  var { jsPDF } = window.jspdf;
  var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  var agora = new Date();
  var dataHora = agora.toLocaleDateString('pt-BR') + ' às ' + agora.toLocaleTimeString('pt-BR');
  var apelido = (document.getElementById('headerNome') ? document.getElementById('headerNome').textContent : '') || 'Jogador';
  var bolao   = (document.getElementById('headerBolao') ? document.getElementById('headerBolao').textContent : '') || '';

  var W = 210, M = 14, y = 0;
  var colW = (W - M*2) / 4;

  function checkPage(need) {
    if (y + (need||8) > 278) { rodape(); doc.addPage(); cabecalhoMini(); }
  }

  function rodape() {
    var pg = doc.internal.getCurrentPageInfo().pageNumber;
    doc.setDrawColor(200,200,200); doc.line(M, 287, W-M, 287);
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(160,160,160);
    doc.text('Bolão da Copa 2026  ·  Comprovante de ' + apelido + '  ·  ' + dataHora + '  ·  Página ' + pg, M, 292);
  }

  function cabecalhoMini() {
    doc.setFillColor(0,34,102); doc.rect(0,0,W,14,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,223,0);
    doc.text('BOLÃO DA COPA 2026  ·  ' + apelido.toUpperCase(), M, 9);
    y = 20;
  }

  function secao(titulo, cor) {
    checkPage(14);
    cor = cor || [0,34,102];
    doc.setFillColor(cor[0],cor[1],cor[2]);
    doc.roundedRect(M, y, W-M*2, 8, 1.5, 1.5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(255,223,0);
    doc.text(titulo.toUpperCase(), M+4, y+5.5);
    y += 11;
  }

  function subSecao(txt) {
    checkPage(8);
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(0,34,102);
    doc.text(txt, M+2, y); y += 6;
  }

  // Capa
  doc.setFillColor(0,26,74); doc.rect(0,0,W,38,'F');
  doc.setFillColor(255,223,0); doc.rect(0,38,W,2,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(22); doc.setTextColor(255,223,0);
  doc.text('BOLÃO DA COPA 2026', M, 16);
  doc.setFontSize(11); doc.setTextColor(180,210,255);
  doc.text('Comprovante de Palpites', M, 25);
  doc.setFontSize(9); doc.setTextColor(255,255,255);
  doc.text(apelido.toUpperCase(), M, 33);
  doc.setFillColor(0,34,102); doc.roundedRect(M, 45, W-M*2, 18, 2, 2, 'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(122,159,212);
  doc.text('PARTICIPANTE', M+4, 52); doc.text('BOLÃO', M+80, 52); doc.text('EXPORTADO EM', M+140, 52);
  doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text(apelido, M+4, 58); doc.text(bolao || '—', M+80, 58);
  doc.setFontSize(7.5); doc.text(dataHora, M+140, 58);
  y = 72;

  // Grupos
  if (_palpite1) {
    var GRUPOS_KEYS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
    secao('Classificação dos Grupos', [0,34,102]);
    var gruposCols = 4, gColW = (W-M*2)/gruposCols;
    for (var gi = 0; gi < GRUPOS_KEYS.length; gi += gruposCols) {
      checkPage(32);
      var rowY = y;
      for (var col = 0; col < gruposCols && gi+col < GRUPOS_KEYS.length; col++) {
        var g = GRUPOS_KEYS[gi+col];
        var cx = M + col * gColW;
        doc.setFillColor(230,235,250); doc.rect(cx, rowY, gColW-2, 6, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(0,34,102);
        doc.text('GRUPO ' + g, cx+2, rowY+4.2);
        for (var p = 1; p <= 4; p++) {
          var team = _palpite1['g'+g.toLowerCase()+'_'+p] || _palpite1['g'+g+'_'+p] || '—';
          var ty = rowY + 8 + (p-1)*6;
          doc.setFont('helvetica', p===1?'bold':'normal'); doc.setFontSize(7.5);
          doc.setTextColor(p===1?30:80, p===1?30:80, p===1?30:80);
          doc.text(p+'º '+team, cx+2, ty);
        }
      }
      y = rowY + 8 + 4*6 + 4;
    }
    y += 2;

    // Terceiros
    var terceiros = [];
    for (var ti = 1; ti <= 8; ti++) { if (_palpite1['t'+ti]) terceiros.push(_palpite1['t'+ti]); }

      secao('Melhores Terceiros', [0,80,40]);
      var tColW = (W-M*2)/4;
      for (var ti2 = 0; ti2 < terceiros.length; ti2++) {

      }
      y += 10;
    }

    // Zebras
    var zebras = [];
    for (var zi = 1; zi <= 4; zi++) { if (_palpite1['zebra'+zi]) zebras.push(_palpite1['zebra'+zi]); }

        doc.text(z, zx+2, y+5);
      });
      y += 12;
    }

    // Placares Grupos
    if (_palpite1.placares && Object.keys(_palpite1.placares).length) {
      var pl = _palpite1.placares;
      var rodadasList = [['R1','Rodada 1'],['R2','Rodada 2'],['R3','Rodada 3']];

          if (ki % pCols === 0) checkPage(12);
          var col = ki % pCols, px = M + col * pColW;

          var kb = ka.replace(/_a$/,'_b');

          var vb = pl[kb] !== undefined ? pl[kb] : '?';

          var grp2 = parts2[0], ji2 = parseInt(parts2[1]);

          var times = jogoData ? jogoData[0]+' × '+jogoData[1] : grp2+(ji2+1);

          doc.text(va+' × '+vb, px+2, y+5);
        });
        y += 14;
      });
    }
  }

  // Mata-Mata — Chaveamento e Top 4
  if (_palpite2) {
    var d2 = (_palpite2.dados_mm && typeof _palpite2.dados_mm === 'object') ? _palpite2.dados_mm : _palpite2;

    // Top 4
    var posLabels = ['1° Lugar — Campeão','2° Lugar — Vice','3° Lugar','4° Lugar'];
    var posIds    = ['pos1','pos2','pos3','pos4'];
    var posVals   = posIds.map(function(id){ return d2[id]||''; });
    if (posVals.some(function(v){ return v; })) {
      secao('Top 4 Final', [100,60,0]);
      checkPage(14);
      var t4ColW = (W-M*2)/4;
      posVals.forEach(function(val, i) {
        var px = M + i * t4ColW;
        doc.setFillColor(255,245,220); doc.roundedRect(px, y-5, t4ColW-2, 14, 1.5,1.5,'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(120,70,0);
        doc.text(posLabels[i], px+2, y-0.5);

        doc.text(val||'—', px+2, y+6);
      });
      y += 16;
    }

    // Chaveamento (R32 → SF)
    var FASES_CH = [
      { label:'Round of 32', ids:['r32L_0_A','r32L_0_B','r32L_1_A','r32L_1_B','r32L_2_A','r32L_2_B','r32L_3_A','r32L_3_B','r32L_4_A','r32L_4_B','r32L_5_A','r32L_5_B','r32L_6_A','r32L_6_B','r32L_7_A','r32L_7_B','r32R_0_A','r32R_0_B','r32R_1_A','r32R_1_B','r32R_2_A','r32R_2_B','r32R_3_A','r32R_3_B','r32R_4_A','r32R_4_B','r32R_5_A','r32R_5_B','r32R_6_A','r32R_6_B','r32R_7_A','r32R_7_B'], pairs:true },

      { label:'Quartas',     ids:['qfL_0','qfL_1','qfL_2','qfL_3','qfR_0','qfR_1','qfR_2','qfR_3'], pairs:false },
      { label:'Semifinal',   ids:['sfL_0','sfL_1','sfR_0','sfR_1'], pairs:false }
    ];
    FASES_CH.forEach(function(fase) {

    }

    // Zebras do Mata-Mata
    var zebrasMM2 = [d2['zebra_mm_1']||'', d2['zebra_mm_2']||'', d2['zebra_mm_3']||'', d2['zebra_mm_4']||''].filter(Boolean);
    if (zebrasMM2.length) {
      secao('Zebras do Mata-Mata', [0,80,100]);
      checkPage(10);
      var zmmColW = (W-M*2)/4;
      zebrasMM2.forEach(function(z, zi) {
        var pxz = M + zi * zmmColW;
        doc.setFillColor(220,240,250); doc.roundedRect(pxz, y-5, zmmColW-2, 9, 1.5,1.5,'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(0,60,80);
        doc.text('Zebra '+(zi+1), pxz+2, y-0.5);
        doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(0,34,102);
        doc.text(z, pxz+2, y+5);
      });
      y += 14;
    }
  }

  // Placares Mata-Mata
  if (_palpite2 && (_palpite2._allPlacaresMM || _palpite2.placares_mm)) {
    var TIMES_PDF = {
      'r16avos': [['Alemanha','Paraguai'],['França','Suécia'],['África do Sul','Canadá'],['Holanda','Marrocos'],['Portugal','Croácia'],['Espanha','Áustria'],['Estados Unidos','Bósnia e Herz.'],['Bélgica','Senegal'],['Brasil','Japão'],['Costa do Marfim','Noruega'],['México','Equador'],['Inglaterra','RD Congo'],['Argentina','Cabo Verde'],['Austrália','Egito'],['Suíça','Argélia'],['Colômbia','Gana']],
      'roitavas': [['J1','J2'],['J3','J4'],['J5','J6'],['J7','J8'],['J9','J10'],['J11','J12'],['J13','J14'],['J15','J16']],
      'rquartas': [['Oit.1','Oit.2'],['Oit.3','Oit.4'],['Oit.5','Oit.6'],['Oit.7','Oit.8']],
      'rsemi':    [['Q1','Q2'],['Q3','Q4']],
      'rfinal':   [['3º Lugar','4º Lugar'],['Final','']]
    };
    var FASES_PDF = [
      {id:'r16avos',label:'16 Avos de Final',n:16},{id:'roitavas',label:'Oitavas de Final',n:8},
      {id:'rquartas',label:'Quartas de Final',n:4},{id:'rsemi',label:'Semifinal',n:2},{id:'rfinal',label:'3º Lugar e Final',n:2}
    ];
    var plMM = _palpite2._allPlacaresMM || (typeof _palpite2.placares_mm === 'string' ? JSON.parse(_palpite2.placares_mm) : (_palpite2.placares_mm || {}));
    FASES_PDF.forEach(function(fase) {
      var keysA = [];
      for (var fi=0; fi<fase.n; fi++) { if (plMM[fase.id+'_'+fi+'_A'] !== undefined) keysA.push(fi); }
      if (!keysA.length) return;
      secao('Placares — ' + fase.label, [80,20,100]);
      var pCols = 4, pColW2 = (W-M*2)/pCols;
      keysA.forEach(function(ji3, ki) {
        if (ki % pCols === 0) checkPage(12);
        var col4 = ki % pCols, px4 = M + col4 * pColW2;
        if (ki % pCols === 0 && ki > 0) y += 12;
        var va3 = plMM[fase.id+'_'+ji3+'_A'], vb3 = plMM[fase.id+'_'+ji3+'_B'];
        var timesArr = TIMES_PDF[fase.id] && TIMES_PDF[fase.id][ji3] ? TIMES_PDF[fase.id][ji3] : ['Time A','Time B'];
        var label3 = timesArr[0] + (timesArr[1]?' × '+timesArr[1]:'');
        if (label3.length > 22) label3 = label3.substring(0,20)+'…';
        doc.setFillColor(245,240,255); doc.roundedRect(px4, y-5, pColW2-2, 10, 1.5,1.5,'F');
        doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(80,20,100);
        doc.text(label3, px4+2, y-1);
        doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(80,20,100);
        doc.text((va3!==undefined?va3:'?')+' × '+(vb3!==undefined?vb3:'?'), px4+2, y+4.5);
      });
      y += 14;
    });
  }

  rodape();
  doc.save('palpites-' + apelido.replace(/\s+/g,'_') + '-' + agora.getFullYear() + (agora.getMonth()+1).toString().padStart(2,'0') + agora.getDate().toString().padStart(2,'0') + '.pdf');
}

async function limparFaseMM(faseId) {
  if (!_bolaoAtual || !_usuario) { alert('Sessão inválida.'); return; }
  if (!confirm('Apagar os placares de "' + faseId + '"?\nEsta ação não pode ser desfeita.')) return;
  var resp = await fetch(SUPABASE_URL+'/rest/v1/palpites_fase2?bolao_id=eq.'+_bolaoAtual.id+'&apelido=eq.'+encodeURIComponent(_usuario.apelido)+'&fase=eq.'+faseId, {
    method: 'DELETE',
    headers: H
  });
  if (resp.ok) {
    alert('✅ Placares apagados.');
    // Recarregar palpite2
    var r2 = await fetch(SUPABASE_URL+'/rest/v1/palpites_fase2?bolao_id=eq.'+_bolaoAtual.id+'&apelido=eq.'+encodeURIComponent(_usuario.apelido)+'&select=*&order=criado_em.desc&limit=1', {headers:H});
    _palpite2 = r2.ok ? (await r2.json())[0] || null : null;
    renderPlacaresMM();
  } else {
    alert('❌ Erro ao apagar.');
  }
}

async function limparPalpitesMM() {
  if (!_bolaoAtual || !_usuario) { alert('Sessão inválida.'); return; }
  if (!confirm('Tem certeza que deseja apagar todos os palpites do mata-mata?\nEsta ação não pode ser desfeita.')) return;
  var resp = await fetch(SUPABASE_URL+'/rest/v1/palpites_fase2?bolao_id=eq.'+_bolaoAtual.id+'&apelido=eq.'+encodeURIComponent(_usuario.apelido), {
    method: 'DELETE',
    headers: H
  });
  if (resp.ok) {
    alert('✅ Palpites do mata-mata apagados.');
    _palpite2 = null;
    renderMataMata();
  } else {
    alert('❌ Erro ao apagar palpites.');
  }
}
</script>
