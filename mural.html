<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mural da Zoeira — Bolão Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#ffdf00;--green:#009c3b;--green-light:#00c44f;--blue:#003087;--bg:#001a4a;--bg2:#002266;--bg3:#002d80;--card:#00194a;--border:#1a3d7a;--text:#e8f0ff;--muted:#7a9fd4;--white:#fff;--orange:#ff8c00;--red:#ff4444;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,48,135,0.5) 0%,transparent 60%);
    padding-bottom:60px;}
  .wrapper{max-width:800px;margin:0 auto;padding:0 20px;}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;
    text-decoration:none;margin:20px 0 16px;padding:8px 14px;background:var(--card);
    border:1px solid var(--border);border-radius:8px;}
  .back:hover{color:var(--gold);border-color:var(--gold);}

  .select-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:20px;}
  .select-wrap label{display:block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
  .input-row{display:flex;gap:10px;}
  .input-row input{flex:1;background:#001a4a;border:1px solid #1a3d7a;border-radius:10px;
    padding:12px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;text-transform:uppercase;}
  .input-row input:focus{border-color:var(--gold);}
  .btn-buscar{background:var(--gold);color:var(--blue);border:none;border-radius:10px;
    padding:12px 22px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;font-weight:900;}

  /* TROFÉUS */
  .trofeus-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px;}
  @media(max-width:500px){.trofeus-grid{grid-template-columns:1fr;}}
  .trofeu-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
  .trofeu-card.destaque{border-color:rgba(255,223,0,0.4);}
  .trofeu-emoji{font-size:32px;margin-bottom:8px;display:block;}
  .trofeu-titulo{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .trofeu-criterio{font-size:10px;color:var(--muted);opacity:0.75;margin-bottom:8px;line-height:1.4;}
  .trofeu-nome{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);}
  .trofeu-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}
  .trofeu-vazio{font-size:12px;color:var(--muted);font-style:italic;}

  /* CARDS DOS JOGOS (acordeão) */
  .jogo-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
    padding:12px 16px;margin-bottom:0;cursor:pointer;display:flex;justify-content:space-between;
    align-items:center;gap:10px;transition:border-color 0.15s;}
  .jogo-card:hover{border-color:rgba(255,223,0,0.4);}
  .jogo-card.aberto{border-radius:12px 12px 0 0;border-color:rgba(255,223,0,0.4);}
  .jogo-card-nome{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:#fff;flex:1;}
  .jogo-card-placar{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gold);}
  .jogo-card-seta{font-size:11px;color:var(--muted);transition:transform 0.2s;}
  .jogo-card.aberto .jogo-card-seta{transform:rotate(180deg);}
  .jogo-detalhe{display:none;grid-template-columns:repeat(3,1fr);gap:10px;
    padding:12px;margin-bottom:10px;background:rgba(0,0,0,0.18);
    border:1px solid rgba(255,223,0,0.4);border-top:none;border-radius:0 0 12px 12px;}
  .jogo-detalhe.aberto{display:grid;}
  @media(max-width:700px){.jogo-detalhe.aberto{grid-template-columns:1fr;}}
  .jogo-subcard{background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:12px;text-align:center;}
  .jogo-subcard-titulo{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px;}
  .jogo-subcard-nome{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;
    color:var(--gold);line-height:1.3;}
  .jogo-subcard-desc{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4;}
  .jogo-subcard-vazio{font-size:11px;color:var(--muted);font-style:italic;}

  .secao-titulo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;
    color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px;}


  .msg{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
  .msg strong{display:block;font-size:18px;margin-bottom:6px;color:var(--gold);
    font-family:'Bebas Neue',sans-serif;letter-spacing:2px;}

  #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#002266;border:1px solid var(--green-light);border-radius:12px;
    padding:12px 22px;font-size:13px;color:#fff;font-weight:600;
    opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrapper">

  <svg width="100%" viewBox="0 0 680 160" style="display:block;border-radius:16px;overflow:hidden;margin:20px 0 0;">
    <rect x="0" y="0" width="340" height="80" fill="#003087"/>
    <rect x="340" y="0" width="340" height="80" fill="#009c3b"/>
    <rect x="0" y="80" width="340" height="80" fill="#ffdf00"/>
    <rect x="340" y="80" width="340" height="80" fill="#ffffff"/>
    <path d="M-10 80 Q60 80 60 30 Q60 -10 110 -10 L-10 -10 Z" fill="#ffdf00"/>
    <path d="M690 80 Q620 80 620 30 Q620 -10 570 -10 L690 -10 Z" fill="#003087"/>
    <path d="M-10 80 Q60 80 60 130 Q60 170 110 170 L-10 170 Z" fill="#003087"/>
    <path d="M690 80 Q620 80 620 130 Q620 170 570 170 L690 170 Z" fill="#009c3b"/>
    <rect x="100" y="28" width="480" height="104" rx="10" fill="#1a0800" opacity="0.95"/>
    <rect x="100" y="28" width="480" height="104" rx="10" fill="none" stroke="#ff8c00" stroke-width="1.5"/>
    <text x="340" y="52" text-anchor="middle" font-size="12" fill="#ff8c00">😂 🔥 😂 🔥 😂</text>
    <text x="340" y="88" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#fff" letter-spacing="2">MURAL DA ZOEIRA</text>
    <text x="340" y="108" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="11" font-weight="700" fill="#ff8c00" letter-spacing="4">Copa do Mundo 2026</text>
  </svg>

  <a href="index.html" class="back">← Voltar ao Início</a>

  <div class="select-wrap">
    <label>Código do Bolão</label>
    <div class="input-row">
      <input type="text" id="codigoInput" placeholder="Ex: TETEU1234" onkeydown="if(event.key==='Enter')buscar()">
      <button class="btn-buscar" onclick="buscar()">BUSCAR</button>
    </div>
  </div>

  <div id="area">
    <div class="msg"><strong>😂 MURAL DA ZOEIRA</strong>Digite o código do bolão para ver as zoações!</div>
  </div>

</div>
<div id="toast"></div>

<script src="db.js"></script>
<script src="auth.js"></script>
<script>
var SU = SUPABASE_URL, SK = SUPABASE_KEY;
var H = { 'apikey': SK, 'Authorization': 'Bearer ' + SK };
var bolaoAtual = null;
var participantes = [];
var usuarioAtual = null;

window.onload = function() {
  usuarioAtual = (typeof AUTH !== 'undefined') ? AUTH.get() : null;
  if (usuarioAtual && usuarioAtual.bolao_codigo) {
    document.getElementById('codigoInput').value = usuarioAtual.bolao_codigo;
    buscar();
  }
};

async function buscar() {
  var codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
  if (!codigo) return;
  document.getElementById('area').innerHTML = '<div class="msg"><strong>⏳</strong>Carregando...</div>';
  // Buscar bolão
  var rb = await fetch(SU + '/rest/v1/boloes?codigo=eq.' + encodeURIComponent(codigo) + '&select=id,nome', { headers: H });
  var boloes = await rb.json();
  if (!boloes.length) { document.getElementById('area').innerHTML = '<div class="msg"><strong>⚠️</strong>Bolão não encontrado.</div>'; return; }
  bolaoAtual = boloes[0];

  // Buscar participantes
  var rp = await fetch(SU + '/rest/v1/palpites_fase1?bolao_id=eq.' + bolaoAtual.id + '&select=apelido', { headers: H });
  var pp = await rp.json();
  participantes = pp.map(function(x){ return x.apelido; });


  try {
    await renderPage();
  } catch(e) {
    document.getElementById('area').innerHTML = '<div class="msg"><strong>❌ Erro:</strong> ' + e.message + '<br><small>' + (e.stack||'').replace(/\n/g,'<br>') + '</small></div>';
    console.error(e);
  }
}

async function renderPage() {
  var hoje = new Date().toISOString().slice(0, 10);
  var trofeus = await calcTrofeus(hoje);

  var html = '';

  // TROFÉUS
  html += '<div style="margin-bottom:20px;">';
  html += '<div class="secao-titulo">🏆 Troféus de Hoje</div>';

  // Maior Queda — card diário, largura cheia
  html += '<div class="trofeu-card" style="margin-bottom:14px;"><span class="trofeu-emoji">📉</span>';
  html += '<div class="trofeu-titulo">Maior Queda</div>';
  html += '<div class="trofeu-criterio">Quem mais caiu de posição no ranking de ontem para hoje</div>';
  if (trofeus.queda) {
    html += '<div class="trofeu-nome">' + trofeus.queda.apelido + '</div>';
    html += '<div class="trofeu-desc">Caiu ' + trofeus.queda.diff + ' posição(ões) hoje</div>';
  } else { html += '<div class="trofeu-vazio">Aguardando dados</div>'; }
  html += '</div>';

  // Cards dos jogos — clique para abrir os troféus daquele jogo
  if (trofeus.jogos && trofeus.jogos.length) {
    trofeus.jogos.forEach(function(j){
      html += '<div class="jogo-card" id="jogo-card-' + j.jid + '" onclick="toggleJogo(\'' + j.jid + '\')">';
      html += '<span class="jogo-card-nome">' + j.jogo + '</span>';
      html += '<span class="jogo-card-placar">' + j.placar + '</span>';
      html += '<span class="jogo-card-seta">▾</span>';
      html += '</div>';

      html += '<div class="jogo-detalhe" id="jogo-det-' + j.jid + '">';

      // Acertou o Placar
      html += '<div class="jogo-subcard"><span class="trofeu-emoji" style="font-size:24px;">🎯</span>';
      html += '<div class="jogo-subcard-titulo">Acertou o Placar</div>';
      if (j.acertaram.length) {
        html += '<div class="jogo-subcard-nome">' + j.acertaram.join(', ') + '</div>';
      } else { html += '<div class="jogo-subcard-vazio">Ninguém acertou</div>'; }
      html += '</div>';

      // Palpite Errado (apostou no perdedor)
      html += '<div class="jogo-subcard"><span class="trofeu-emoji" style="font-size:24px;">🙈</span>';
      html += '<div class="jogo-subcard-titulo">Palpite Errado</div>';
      if (j.perdedores) {
        html += '<div class="jogo-subcard-nome">' + j.perdedores.apelidos.join(', ') + '</div>';
        html += '<div class="jogo-subcard-desc">Foi contra ' + j.perdedores.pct + '% do bolão e errou</div>';
      } else {
        html += '<div class="jogo-subcard-vazio">Ninguém</div>';
        if (j._debug) {
          var d = j._debug;
          html += '<div style="font-size:9px;color:var(--muted);margin-top:6px;text-align:left;line-height:1.5;">';
          html += 'DEBUG — Votos: A=' + d.vencVotos.A + ' B=' + d.vencVotos.B + ' E=' + d.vencVotos.E + ' (total ' + d.total + ')<br>';
          html += 'Maioria: ' + d.vencMaioria + ' (' + d.maioriaPct + '%) | Real: ' + d.vencReal;
          html += '</div>';
        }
      }
      html += '</div>';

      // Pior Palpite da Rodada (deste jogo)
      html += '<div class="jogo-subcard"><span class="trofeu-emoji" style="font-size:24px;">🤡</span>';
      html += '<div class="jogo-subcard-titulo">Pior Palpite</div>';
      if (j.piorPalpite) {
        var nomesPior = j.piorPalpite.apelidos.map(function(ap,i){ return ap + ' (' + j.piorPalpite.placares[i] + ')'; });
        html += '<div class="jogo-subcard-nome" style="font-size:13px;">' + nomesPior.join(', ') + '</div>';
      } else { html += '<div class="jogo-subcard-vazio">Ninguém zerou</div>'; }
      html += '</div>';

      html += '</div>'; // jogo-detalhe
    });
  } else {
    html += '<div class="trofeu-vazio" style="text-align:center;padding:16px;">Aguardando resultados dos jogos</div>';
  }

  html += '</div>';

  document.getElementById('area').innerHTML = html;
}

async function calcTrofeus(hoje) {
  var trofeus = { queda: null, jogos: [] };
  if (!bolaoAtual) return trofeus;

  // Maior Queda
  try {
    var ontem = new Date(hoje); ontem.setDate(ontem.getDate() - 1);
    var ontemStr = ontem.toISOString().slice(0,10);
    var rh = await fetch(SU + '/rest/v1/ranking_historico?bolao_id=eq.' + bolaoAtual.id + '&dia=in.(' + hoje + ',' + ontemStr + ')&select=apelido,total,dia', { headers: H });
    var hist = await rh.json();
    var porDia = {};
    hist.forEach(function(r) {
      if (!porDia[r.dia]) porDia[r.dia] = {};
      porDia[r.dia][r.apelido] = r.total;
    });
    var dHoje = porDia[hoje] || {}, dOntem = porDia[ontemStr] || {};
    function getRanking(d) { return Object.keys(d).sort(function(a,b){ return d[b]-d[a]; }); }
    var rHoje = getRanking(dHoje), rOntem = getRanking(dOntem);
    var melhor = null, melhorDiff = 0;
    rHoje.forEach(function(ap, pos) {
      var posOntem = rOntem.indexOf(ap);
      if (posOntem === -1) return;
      var diff = pos - posOntem;
      if (diff > melhorDiff) { melhorDiff = diff; melhor = ap; }
    });
    if (melhor) trofeus.queda = { apelido: melhor, diff: melhorDiff };
  } catch(e) {}

  // Calcula trofeus por jogo: acertos, palpite errado (apostou no perdedor), pior palpite
  try {
    var rp = await fetch(SU + '/rest/v1/palpites_fase1?bolao_id=eq.' + bolaoAtual.id + '&select=apelido,placares', { headers: H });
    var palpites = await rp.json();
    var rr = await fetch(SU + '/rest/v1/resultados?select=*&finalizado=eq.true', { headers: H });
    var resultados = await rr.json();

    var mapaJogos = {};
    palpites.forEach(function(p) {
      var pl = p.placares || {};
      if (typeof pl === 'string') { try { pl = JSON.parse(pl); } catch(e) { pl = {}; } }
      Object.keys(pl).forEach(function(k) {
        var m = k.match(/placar_(R\d+_[A-Z]+_\d+)_([ab])/);
        if (!m) return;
        var jid = m[1], lado = m[2];
        if (!mapaJogos[jid]) mapaJogos[jid] = {};
        if (!mapaJogos[jid][p.apelido]) mapaJogos[jid][p.apelido] = { a: null, b: null };
        mapaJogos[jid][p.apelido][lado] = parseInt(pl[k]);
      });
    });

    var jogos = [];

    resultados.forEach(function(res) {
      var jid = res.api_id;
      if (!jid || !mapaJogos[jid]) return;
      var ga = res.gols_a, gb = res.gols_b;
      if (ga === null || ga === undefined) return;
      var apelidos = Object.keys(mapaJogos[jid]).filter(function(ap){
        var pp = mapaJogos[jid][ap]; return pp.a !== null && pp.b !== null;
      });
      var total = apelidos.length;
      if (!total) return;

      var vencReal = ga > gb ? 'A' : gb > ga ? 'B' : 'E';
      var vencVotos = { A:0, B:0, E:0 };
      apelidos.forEach(function(ap) {
        var pp = mapaJogos[jid][ap];
        if (pp.a > pp.b) vencVotos.A++; else if (pp.b > pp.a) vencVotos.B++; else vencVotos.E++;
      });
      var maioriaPct = Math.max(vencVotos.A, vencVotos.B, vencVotos.E) / total;
      var vencMaioria = vencVotos.A >= vencVotos.B && vencVotos.A >= vencVotos.E ? 'A'
        : vencVotos.B > vencVotos.A && vencVotos.B >= vencVotos.E ? 'B' : 'E';

      var acertaram = [];
      var perdedoresJogo = [];
      var piorDistJogo = -1, piorApsJogo = [], piorPlacaresJogo = [];

      apelidos.forEach(function(ap) {
        var pp = mapaJogos[jid][ap];

        if (pp.a === ga && pp.b === gb) acertaram.push(ap);

        var pts = calcPts(pp.a, pp.b, ga, gb);
        if (pts === 0) {
          var dist = Math.abs(pp.a - ga) + Math.abs(pp.b - gb);
          if (dist > piorDistJogo) {
            piorDistJogo = dist; piorApsJogo = [ap]; piorPlacaresJogo = [pp.a + '×' + pp.b];
          } else if (dist === piorDistJogo) { piorApsJogo.push(ap); piorPlacaresJogo.push(pp.a + '×' + pp.b); }
        }

        var meuVenc = pp.a > pp.b ? 'A' : pp.b > pp.a ? 'B' : 'E';
        if (meuVenc !== vencMaioria && meuVenc !== vencReal && maioriaPct >= 0.6) {
          perdedoresJogo.push(ap);
        }
      });

      jogos.push({
        jid: jid,
        jogo: res.time_a + ' × ' + res.time_b,
        placar: ga + '×' + gb,
        acertaram: acertaram,
        perdedores: perdedoresJogo.length ? { apelidos: perdedoresJogo, pct: Math.round(maioriaPct * 100) } : null,
        piorPalpite: piorApsJogo.length ? { apelidos: piorApsJogo, placares: piorPlacaresJogo } : null,
        _debug: { vencVotos: vencVotos, total: total, maioriaPct: Math.round(maioriaPct*100), vencMaioria: vencMaioria, vencReal: vencReal }
      });
    });

    trofeus.jogos = jogos;
  } catch(e) {}

  return trofeus;
}

function toggleJogo(jid) {
  var card = document.getElementById('jogo-card-' + jid);
  var det = document.getElementById('jogo-det-' + jid);
  if (!card || !det) return;
  var aberto = det.classList.toggle('aberto');
  card.classList.toggle('aberto', aberto);
}

function calcPts(pa, pb, ra, rb) {
  if (pa === null || pb === null) return 0;
  if (pa === ra && pb === rb) return 3;
  var pe = pa===pb, re = ra===rb;
  if (pe && re) return 2;
  if (!pe && !re) {
    var pv = pa>pb?'A':'B', rv = ra>rb?'A':'B';
    if (pv === rv) return Math.abs(pa-pb) === Math.abs(ra-rb) ? 2 : 1;
  }
  return 0;
}





function toast(msg, cor) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.borderColor = cor || 'var(--green-light)';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
</script>
