<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mural da Zoeira — Bolão Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#ffdf00;--green:#009c3b;--green-light:#00c44f;--blue:#003087;--bg:#001a4a;--bg2:#002266;--bg3:#002d80;--card:#00194a;--border:#1a3d7a;--text:#e8f0ff;--muted:#7a9fd4;--white:#fff;--orange:#ff8c00;--red:#ff4444;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,48,135,0.5) 0%,transparent 60%);
    padding-bottom:60px;}
  .wrapper{max-width:860px;margin:0 auto;padding:0 20px;}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;
    text-decoration:none;margin:20px 0 16px;padding:8px 14px;background:var(--card);
    border:1px solid var(--border);border-radius:8px;}
  .back:hover{color:var(--gold);border-color:var(--gold);}

  /* SELETOR */
  .select-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:24px;}
  .select-wrap label{display:block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
  .input-row{display:flex;gap:10px;}
  .input-row input{flex:1;background:#001a4a;border:1px solid #1a3d7a;border-radius:10px;
    padding:12px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;text-transform:uppercase;}
  .input-row input:focus{border-color:var(--gold);}
  .btn-buscar{background:var(--gold);color:var(--blue);border:none;border-radius:10px;
    padding:12px 22px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;font-weight:900;}

  /* TROFÉUS */
  .trofeus-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
  @media(max-width:500px){.trofeus-grid{grid-template-columns:1fr;}}
  .trofeu-card{border-radius:14px;padding:20px;text-align:center;position:relative;overflow:hidden;}
  .trofeu-card.ouro{background:linear-gradient(135deg,#1a1200,#2d1f00);border:2px solid rgba(255,223,0,0.5);}
  .trofeu-card.vermelho{background:linear-gradient(135deg,#1a0000,#2d0a00);border:2px solid rgba(255,68,68,0.4);}
  .trofeu-emoji{font-size:36px;margin-bottom:10px;display:block;}
  .trofeu-titulo{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .trofeu-card.ouro .trofeu-titulo{color:var(--gold);}
  .trofeu-card.vermelho .trofeu-titulo{color:#ff8888;}
  .trofeu-nome{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--white);}
  .trofeu-desc{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4;}
  .trofeu-vazio{font-size:12px;color:var(--muted);font-style:italic;margin-top:8px;}

  /* RODADA TÍTULO */
  .rodada-titulo{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;
    color:var(--muted);margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

  /* CARD DE JOGO */
  .jogo-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
    margin-bottom:10px;overflow:hidden;transition:border-color 0.2s;}
  .jogo-card:hover{border-color:rgba(255,223,0,0.25);}
  .jogo-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
    gap:12px;cursor:pointer;user-select:none;}
  .jogo-header.sem-resultado{cursor:default;opacity:0.6;}
  .jogo-nomes{font-size:14px;font-weight:700;color:var(--white);}
  .jogo-sub{font-size:10px;color:var(--muted);margin-top:2px;}
  .jogo-right{display:flex;align-items:center;gap:12px;}
  .jogo-placar{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--gold);}
  .jogo-arrow{font-size:12px;color:var(--muted);transition:transform 0.3s;flex-shrink:0;}
  .jogo-arrow.open{transform:rotate(180deg);}

  /* CORPO DO CARD */
  .jogo-body{display:none;padding:0 18px 16px;}
  .jogo-body.open{display:block;}
  .jogo-section{margin-top:14px;}
  .jogo-section-titulo{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .jogo-section-titulo.acertou{color:var(--green-light);}
  .jogo-section-titulo.pior{color:var(--orange);}
  .jogo-section-titulo.ninguem{color:var(--muted);}

  /* ACERTOU */
  .acertou-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .acertou-badge{background:rgba(0,196,79,0.1);border:1px solid rgba(0,196,79,0.3);
    border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;color:var(--green-light);}

  /* PIOR PALPITE */
  .pior-item{display:flex;align-items:center;gap:12px;padding:10px 14px;
    background:rgba(255,140,0,0.06);border:1px solid rgba(255,140,0,0.2);
    border-radius:10px;margin-bottom:8px;}
  .pior-item:last-child{margin-bottom:0;}
  .pior-emoji{font-size:20px;flex-shrink:0;}
  .pior-nome{font-weight:700;font-size:13px;color:var(--orange);}
  .pior-placar{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--white);}
  .pior-motivo{font-size:11px;color:var(--muted);margin-top:2px;}

  /* MSG */
  .msg{text-align:center;padding:50px 20px;color:var(--muted);font-size:14px;}
  .msg strong{display:block;font-size:22px;margin-bottom:8px;color:var(--gold);
    font-family:'Bebas Neue',sans-serif;letter-spacing:2px;}
  .sem-jogos{text-align:center;padding:20px;font-size:13px;color:var(--muted);font-style:italic;}
</style>
</head>
<body>
<div class="wrapper">

  <svg width="100%" viewBox="0 0 680 160" style="display:block;border-radius:16px;overflow:hidden;margin:20px 0 0;">
    <rect x="0" y="0" width="340" height="80" fill="#003087"/>
    <rect x="340" y="0" width="340" height="80" fill="#009c3b"/>
    <rect x="0" y="80" width="340" height="80" fill="#ffdf00"/>
    <rect x="340" y="80" width="340" height="80" fill="#ffffff"/>
    <path d="M-10 80 Q60 80 60 30 Q60 -10 110 -10 L-10 -10 Z" fill="#ffdf00"/>
    <path d="M690 80 Q620 80 620 30 Q620 -10 570 -10 L690 -10 Z" fill="#003087"/>
    <path d="M-10 80 Q60 80 60 130 Q60 170 110 170 L-10 170 Z" fill="#003087"/>
    <path d="M690 80 Q620 80 620 130 Q620 170 570 170 L690 170 Z" fill="#009c3b"/>
    <rect x="100" y="28" width="480" height="104" rx="10" fill="#1a0800" opacity="0.95"/>
    <rect x="100" y="28" width="480" height="104" rx="10" fill="none" stroke="#ff8c00" stroke-width="1.5"/>
    <text x="340" y="52" text-anchor="middle" font-size="12" fill="#ff8c00">😂 🔥 😂 🔥 😂</text>
    <text x="340" y="88" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#fff" letter-spacing="2">MURAL DA ZOEIRA</text>
    <text x="340" y="108" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="11" font-weight="700" fill="#ff8c00" letter-spacing="4">Copa do Mundo 2026</text>
  </svg>

  <a href="index.html" class="back">← Voltar ao Início</a>

  <div class="select-wrap">
    <label>Código do Bolão</label>
    <div class="input-row">
      <input type="text" id="codigoInput" placeholder="Ex: TETEU1234" onkeydown="if(event.key==='Enter')buscar()">
      <button class="btn-buscar" onclick="buscar()">BUSCAR</button>
    </div>
  </div>

  <div id="area">
    <div class="msg"><strong>😂 MURAL DA ZOEIRA</strong>Digite o código do bolão para ver os resultados e os palpites!</div>
  </div>

</div>

<script src="db.js"></script>
<script src="auth.js"></script>
<script>
var SU = SUPABASE_URL, SK = SUPABASE_KEY;
var H = { 'apikey': SK, 'Authorization': 'Bearer ' + SK };
var bolaoAtual = null;

var JOGOS_R = {
  R1:{A:[['México','África do Sul'],['Coreia do Sul','República Tcheca']],B:[['Canadá','Bósnia e Herzegovina'],['Catar','Suíça']],C:[['Brasil','Marrocos'],['Haiti','Escócia']],D:[['Estados Unidos','Paraguai'],['Austrália','Turquia']],E:[['Alemanha','Curaçao'],['Costa do Marfim','Equador']],F:[['Holanda','Japão'],['Suécia','Tunísia']],G:[['Bélgica','Egito'],['Irã','Nova Zelândia']],H:[['Espanha','Cabo Verde'],['Arábia Saudita','Uruguai']],I:[['França','Senegal'],['Noruega','Iraque']],J:[['Argentina','Argélia'],['Áustria','Jordânia']],K:[['Portugal','RD Congo'],['Uzbequistão','Colômbia']],L:[['Inglaterra','Croácia'],['Gana','Panamá']]},
  R2:{A:[['México','Coreia do Sul'],['África do Sul','República Tcheca']],B:[['Canadá','Catar'],['Bósnia e Herzegovina','Suíça']],C:[['Brasil','Haiti'],['Marrocos','Escócia']],D:[['Estados Unidos','Austrália'],['Turquia','Paraguai']],E:[['Alemanha','Costa do Marfim'],['Curaçao','Equador']],F:[['Holanda','Suécia'],['Japão','Tunísia']],G:[['Bélgica','Irã'],['Egito','Nova Zelândia']],H:[['Espanha','Arábia Saudita'],['Cabo Verde','Uruguai']],I:[['França','Iraque'],['Noruega','Senegal']],J:[['Argentina','Áustria'],['Argélia','Jordânia']],K:[['Portugal','Uzbequistão'],['Colômbia','RD Congo']],L:[['Inglaterra','Gana'],['Croácia','Panamá']]},
  R3:{A:[['México','República Tcheca'],['África do Sul','Coreia do Sul']],B:[['Canadá','Suíça'],['Bósnia e Herzegovina','Catar']],C:[['Brasil','Escócia'],['Marrocos','Haiti']],D:[['Estados Unidos','Turquia'],['Paraguai','Austrália']],E:[['Alemanha','Equador'],['Curaçao','Costa do Marfim']],F:[['Holanda','Tunísia'],['Japão','Suécia']],G:[['Bélgica','Nova Zelândia'],['Egito','Irã']],H:[['Espanha','Uruguai'],['Cabo Verde','Arábia Saudita']],I:[['França','Noruega'],['Senegal','Iraque']],J:[['Argentina','Jordânia'],['Argélia','Áustria']],K:[['Portugal','Colômbia'],['RD Congo','Uzbequistão']],L:[['Inglaterra','Panamá'],['Croácia','Gana']]}
};

window.onload = function() {
  var u = (typeof AUTH !== 'undefined') ? AUTH.get() : null;
  if (u && u.bolao_codigo) { document.getElementById('codigoInput').value = u.bolao_codigo; buscar(); }
};

async function buscar() {
  var codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
  if (!codigo) return;
  document.getElementById('area').innerHTML = '<div class="msg"><strong>⏳</strong>Carregando...</div>';

  var rb = await fetch(SU + '/rest/v1/boloes?codigo=eq.' + encodeURIComponent(codigo) + '&select=id,nome', { headers: H });
  var boloes = await rb.json();
  if (!boloes.length) { document.getElementById('area').innerHTML = '<div class="msg"><strong>⚠️</strong>Bolão não encontrado.</div>'; return; }
  bolaoAtual = boloes[0];

  var rp = await fetch(SU + '/rest/v1/palpites_fase1?bolao_id=eq.' + bolaoAtual.id + '&select=apelido,placares', { headers: H });
  var palpites = await rp.json();

  var rr = await fetch(SU + '/rest/v1/resultados?select=*', { headers: H });
  var resultados = await rr.json();

  renderMural(palpites, resultados);
}

function calcPts(pa, pb, ra, rb) {
  if (pa === null || pb === null) return -1;
  if (pa === ra && pb === rb) return 3;
  var pe = pa===pb, re = ra===rb;
  if (pe && re) return 2;
  if (!pe && !re) {
    var pv = pa>pb?'A':'B', rv = ra>rb?'A':'B';
    if (pv === rv) return Math.abs(pa-pb) === Math.abs(ra-rb) ? 2 : 1;
  }
  return 0;
}

function renderMural(palpites, resultados) {
  // Montar mapa de palpites
  var mapaJogos = {};
  palpites.forEach(function(p) {
    var pl = p.placares || {};
    if (typeof pl === 'string') { try { pl = JSON.parse(pl); } catch(e) { pl = {}; } }
    Object.keys(pl).forEach(function(k) {
      var m = k.match(/^placar_(R\d+_[A-Z]+_\d+)_([ab])$/);
      if (!m) return;
      var jid = m[1], lado = m[2];
      if (!mapaJogos[jid]) mapaJogos[jid] = {};
      if (!mapaJogos[jid][p.apelido]) mapaJogos[jid][p.apelido] = { a: null, b: null };
      mapaJogos[jid][p.apelido][lado] = parseInt(pl[k]);
    });
  });

  // Mapa de resultados
  var mapaRes = {};
  resultados.forEach(function(r) { if (r.api_id) mapaRes[r.api_id] = r; });

  // Calcular troféus globais
  var acertosTotal = {}, errosTotal = {};
  palpites.forEach(function(p) { acertosTotal[p.apelido] = 0; errosTotal[p.apelido] = 0; });

  Object.keys(mapaRes).forEach(function(jid) {
    var res = mapaRes[jid];
    if (res.gols_a === null || res.gols_a === undefined) return;
    var jogoPalp = mapaJogos[jid] || {};
    Object.keys(jogoPalp).forEach(function(ap) {
      var pp = jogoPalp[ap];
      if (pp.a === null || pp.b === null) return;
      var pts = calcPts(pp.a, pp.b, res.gols_a, res.gols_b);
      if (pts === 3) acertosTotal[ap] = (acertosTotal[ap] || 0) + 1;
      if (pts === 0) errosTotal[ap] = (errosTotal[ap] || 0) + 1;
    });
  });

  var reiAcertos = Object.keys(acertosTotal).sort(function(a,b){ return acertosTotal[b]-acertosTotal[a]; })[0];
  var reiErros   = Object.keys(errosTotal).sort(function(a,b){ return errosTotal[b]-errosTotal[a]; })[0];

  var html = '';

  // TROFÉUS
  html += '<div class="trofeus-grid">';

  html += '<div class="trofeu-card ouro">';
  html += '<span class="trofeu-emoji">🏆</span>';
  html += '<div class="trofeu-titulo">Rei dos Placares</div>';
  if (reiAcertos && acertosTotal[reiAcertos] > 0) {
    html += '<div class="trofeu-nome">' + reiAcertos + '</div>';
    html += '<div class="trofeu-desc">' + acertosTotal[reiAcertos] + ' placar(es) exato(s) acertado(s)</div>';
  } else {
    html += '<div class="trofeu-vazio">Ninguém acertou ainda</div>';
  }
  html += '</div>';

  html += '<div class="trofeu-card vermelho">';
  html += '<span class="trofeu-emoji">🤡</span>';
  html += '<div class="trofeu-titulo">Rei dos Erros</div>';
  if (reiErros && errosTotal[reiErros] > 0) {
    html += '<div class="trofeu-nome">' + reiErros + '</div>';
    html += '<div class="trofeu-desc">' + errosTotal[reiErros] + ' palpite(s) zerado(s)</div>';
  } else {
    html += '<div class="trofeu-vazio">Aguardando resultados</div>';
  }
  html += '</div>';

  html += '</div>';

  // JOGOS POR RODADA
  var temJogosComRes = false;
  ['R1','R2','R3'].forEach(function(rodada) {
    var rl = rodada==='R1'?'Rodada 1':rodada==='R2'?'Rodada 2':'Rodada 3';
    var jogosDaRodada = [];

    Object.keys(JOGOS_R[rodada]).sort().forEach(function(grupo) {
      JOGOS_R[rodada][grupo].forEach(function(jogo, i) {
        var jid = rodada + '_' + grupo + '_' + i;
        var res = mapaRes[jid];
        jogosDaRodada.push({ jid: jid, jogo: jogo, grupo: grupo, res: res });
      });
    });

    // Só mostrar rodada se tiver ao menos 1 jogo com resultado
    var comRes = jogosDaRodada.filter(function(j){ return j.res && j.res.gols_a !== null && j.res.gols_a !== undefined; });
    if (!comRes.length) return;
    temJogosComRes = true;

    html += '<div class="rodada-titulo">⚽ ' + rl + '</div>';

    jogosDaRodada.forEach(function(item) {
      var jid = item.jid, jogo = item.jogo, res = item.res;
      var temRes = res && res.gols_a !== null && res.gols_a !== undefined;

      // Analisar palpites deste jogo
      var jogoPalp = mapaJogos[jid] || {};
      var apelidos = Object.keys(jogoPalp).filter(function(ap){ return jogoPalp[ap].a !== null && jogoPalp[ap].b !== null; });
      var acertaram = [], piores = [], piorDist = -1;

      if (temRes) {
        apelidos.forEach(function(ap) {
          var pp = jogoPalp[ap];
          var pts = calcPts(pp.a, pp.b, res.gols_a, res.gols_b);
          if (pts === 3) acertaram.push(ap);
          if (pts === 0) {
            var dist = Math.abs(pp.a - res.gols_a) + Math.abs(pp.b - res.gols_b);
            if (dist > piorDist) { piorDist = dist; piores = [{ ap: ap, ga: pp.a, gb: pp.b }]; }
            else if (dist === piorDist) piores.push({ ap: ap, ga: pp.a, gb: pp.b });
          }
        });
      }

      var placarStr = temRes ? (res.gols_a + ' × ' + res.gols_b) : null;
      var headerCls = temRes ? '' : ' sem-resultado';
      var arrowHtml = temRes ? '<div class="jogo-arrow" id="arrow-' + jid + '">▼</div>' : '';

      html += '<div class="jogo-card" id="card-' + jid + '">';
      html += '<div class="jogo-header' + headerCls + '" ' + (temRes ? 'onclick="toggleJogo(\'' + jid + '\')"' : '') + '>';
      html += '<div><div class="jogo-nomes">⚽ ' + jogo[0] + ' × ' + jogo[1] + '</div>';
      html += '<div class="jogo-sub">Grupo ' + item.grupo + ' · ' + apelidos.length + ' palpite(s)</div></div>';
      html += '<div class="jogo-right">';
      if (temRes) {
        html += '<div class="jogo-placar">' + placarStr + '</div>';
      } else {
        html += '<div style="font-size:11px;color:var(--muted);">Aguardando resultado</div>';
      }
      html += arrowHtml;
      html += '</div></div>';

      if (temRes) {
        html += '<div class="jogo-body" id="body-' + jid + '">';

        // Quem acertou
        html += '<div class="jogo-section">';
        html += '<div class="jogo-section-titulo ' + (acertaram.length ? 'acertou' : 'ninguem') + '">';
        html += '✅ Acertaram o placar exato (' + acertaram.length + ')</div>';
        if (acertaram.length) {
          html += '<div class="acertou-grid">';
          acertaram.forEach(function(ap){ html += '<div class="acertou-badge">🎯 ' + ap + '</div>'; });
          html += '</div>';
        } else {
          html += '<div style="font-size:12px;color:var(--muted);font-style:italic;">Ninguém acertou este placar.</div>';
        }
        html += '</div>';

        // Pior palpite
        if (piores.length) {
          html += '<div class="jogo-section">';
          html += '<div class="jogo-section-titulo pior">🤡 Pior(es) palpite(s) do jogo</div>';
          piores.forEach(function(p) {
            var emojis = ['🤡','😱','💀','🤪','😂','🙈'];
            var emoji = emojis[(p.ga + p.gb) % emojis.length];
            html += '<div class="pior-item">';
            html += '<div class="pior-emoji">' + emoji + '</div>';
            html += '<div>';
            html += '<div class="pior-nome">' + p.ap + '</div>';
            html += '<div class="pior-placar">' + p.ga + ' × ' + p.gb + '</div>';
            html += '<div class="pior-motivo">Resultado foi ' + res.gols_a + '×' + res.gols_b + ' — diferença de ' + piorDist + ' gol(s)</div>';
            html += '</div></div>';
          });
          html += '</div>';
        }

        html += '</div>'; // fim jogo-body
      }

      html += '</div>'; // fim jogo-card
    });
  });

  if (!temJogosComRes) {
    html += '<div class="sem-jogos">Nenhum resultado registrado ainda. Os jogos aparecerão aqui conforme os resultados forem sendo inseridos.</div>';
  }

  document.getElementById('area').innerHTML = html;
}

function toggleJogo(jid) {
  var body  = document.getElementById('body-' + jid);
  var arrow = document.getElementById('arrow-' + jid);
  if (!body) return;
  var open = body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open', open);
}
</script>
</body>
</html>
