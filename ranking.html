<style>

  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,48,135,0.5) 0%,transparent 60%);}
  .wrapper{max-width:1200px;margin:0 auto;padding:0 20px 80px;}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;text-decoration:none;margin:20px 0 0;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;}
  .back:hover{color:var(--gold);border-color:var(--gold);}
  header{padding:0 0 32px;}
  .bolao-select-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:28px;}
  .bolao-select-wrap label{display:block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
  .sel-wrap{position:relative;}
  .sel-wrap select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 36px 13px 16px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;appearance:none;cursor:pointer;}
  .sel-wrap select:focus{border-color:var(--gold);}
  .sel-wrap select option{background:#002266;}
  .sel-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
  .ranking-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .ranking-header{background:var(--bg3);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
  .ranking-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);}
  .ranking-update{font-size:11px;color:var(--muted);}
  .ranking-row{display:grid;grid-template-columns:80px 1fr repeat(4,60px);align-items:center;padding:12px 20px;border-bottom:1px solid rgba(26,61,122,0.4);gap:8px;}
  .ranking-row:last-child{border-bottom:none;}
  .ranking-row.header{background:var(--bg3);padding:8px 20px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
  .ranking-pos{font-family:'Bebas Neue',sans-serif;font-size:14px;text-align:center;line-height:1.2;}
  .ranking-pos sup{font-size:10px;vertical-align:super;}
  .ranking-pos.gold{color:var(--gold);}
  .ranking-pos.silver{color:#aaa;}
  .ranking-pos.bronze{color:#cd7f32;}
  .ranking-pos.other{color:var(--muted);}
  .ranking-apelido{font-weight:600;font-size:14px;}
  .ranking-pts{text-align:center;font-size:13px;color:var(--muted);}
  .ranking-pts.total{color:var(--gold);font-weight:700;font-size:15px;}
  .status-icon{text-align:center;font-size:16px;line-height:1;}
  .empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;}
  .empty strong{color:var(--gold);display:block;font-size:18px;margin-bottom:8px;}
  .loading{text-align:center;padding:48px;color:var(--muted);}
  .status-box{background:rgba(255,223,0,0.07);border:1px solid rgba(255,223,0,0.2);border-radius:12px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:10px;}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green-light);flex-shrink:0;box-shadow:0 0 8px var(--green-light);}
  .legend{display:flex;gap:16px;font-size:11px;color:var(--muted);margin-top:12px;padding:10px 20px;background:rgba(0,0,0,0.2);}
  .legend span{display:flex;align-items:center;gap:4px;}
</style>
</head>

// ══ DADOS PARA RESUMO ══════════════════════════════════════
var GRUPOS_DISPLAY_R = {

};

};

function calcPlacarDesc(pa,pb,ra,rb){
  pa=parseInt(pa);pb=parseInt(pb);ra=parseInt(ra);rb=parseInt(rb);
  if(isNaN(pa)||isNaN(pb)) return {pts:0,desc:'Não apostado'};
  if(pa===ra&&pb===rb) return {pts:3,desc:'Placar exato ✓'};
  var pe=(pa===pb),re=(ra===rb);
  if(pe&&re) return {pts:2,desc:'Empate (placar errado)'};
  if(!pe&&re) return {pts:0,desc:'Apostou vencedor, empatou'};
  if(pe&&!re) return {pts:0,desc:'Apostou empate, teve vencedor'};
  var pv=pa>pb?'A':'B', rv=ra>rb?'A':'B';
  if(pv!==rv) return {pts:0,desc:'Vencedor errado'};
  if(Math.abs(pa-pb)===Math.abs(ra-rb)) return {pts:2,desc:'Vencedor + diferença certa'};
  return {pts:1,desc:'Só o vencedor'};
}

function calcTabelaR(g, resultadosArr){
  var times=GRUPOS_DISPLAY_R[g], tab={};
  times.forEach(function(t){tab[t]={t:t,p:0,j:0,v:0,e:0,d:0,gf:0,gc:0,sg:0};});
  ['R1','R2','R3'].forEach(function(r){
    (JOGOS_R[r][g]||[]).forEach(function(jogo,i){
      var key=r+'_'+g+'_'+i;
      var res=resultadosArr.find(function(x){return x.api_id===key;});
      if(!res||res.gols_a===null||res.gols_b===null) return;
      var ga=parseInt(res.gols_a),gb=parseInt(res.gols_b);
      var ta=tab[jogo[0]],tb=tab[jogo[1]];
      if(!ta||!tb) return;
      ta.j++;tb.j++;ta.gf+=ga;ta.gc+=gb;ta.sg+=ga-gb;tb.gf+=gb;tb.gc+=ga;tb.sg+=gb-ga;
      if(ga>gb){ta.v++;ta.p+=3;tb.d++;}
      else if(ga<gb){tb.v++;tb.p+=3;ta.d++;}
      else{ta.e++;ta.p++;tb.e++;tb.p++;}
    });
  });
  return Object.values(tab).sort(function(a,b){if(b.p!==a.p)return b.p-a.p;if(b.sg!==a.sg)return b.sg-a.sg;return b.gf-a.gf;});
}

async function gerarResumo(apelido, bolaoId, silencioso) {
  var u = (typeof AUTH!=='undefined') ? AUTH.get() : null;
  var isAdmin = u && u.apelido === 'MDANTAS';
  if (!silencioso && !isAdmin && (!u || u.apelido !== apelido)) {
    alert('Você só pode ver o seu próprio resumo.');
    return;
  }

  var H2 = {'apikey':SK,'Authorization':'Bearer '+SK};
  var rp = await fetch(SU+'/rest/v1/palpites_fase1?bolao_id=eq.'+bolaoId+'&apelido=eq.'+encodeURIComponent(apelido)+'&select=*&order=criado_em.asc',{headers:H2});
  var palpites = rp.ok ? await rp.json() : [];
  var p1 = {};
  palpites.forEach(function(x){
    Object.keys(x).forEach(function(k){
      if(k==='placares'){
        var pl=x[k];
        if(pl){if(typeof pl==='string'){try{pl=JSON.parse(pl);}catch(e){pl={};}}
        if(!p1.placares)p1.placares={};Object.assign(p1.placares,pl);}
      } else if(x[k]!==null&&x[k]!==undefined&&x[k]!==''){p1[k]=x[k];}
    });
  });
  var placares=p1.placares||{};
  if(typeof placares==='string'){try{placares=JSON.parse(placares);}catch(e){placares={};}}

  var rr = await fetch(SU+'/rest/v1/resultados?select=*',{headers:H2});
  var resultados = rr.ok ? await rr.json() : [];
  var rb = await fetch(SU+'/rest/v1/boloes?id=eq.'+bolaoId+'&select=nome',{headers:H2});
  var bolaoNome = rb.ok ? ((await rb.json())[0]||{}).nome||'' : '';
  var now = new Date();
  var dataGeracao = now.toLocaleDateString('pt-BR')+' às '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  var css = '<style>body{font-family:Arial,sans-serif;color:#111;margin:0;padding:0;font-size:11px;}.page{max-width:900px;margin:0 auto;padding:20px;}.topo{background:#003087;color:#fff;padding:16px 20px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center;}.topo-nome{font-size:22px;font-weight:900;letter-spacing:2px;color:#ffdf00;}.topo-sub{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px;}.topo-bolao{text-align:right;font-size:11px;color:rgba(255,255,255,0.8);}.secao{margin-top:16px;}.secao-titulo{background:#003087;color:#ffdf00;font-weight:700;font-size:10px;letter-spacing:2px;padding:6px 10px;text-transform:uppercase;border-radius:4px;margin-bottom:8px;}.grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}.grupo-box{border:1px solid #ddd;border-radius:6px;overflow:hidden;}.grupo-label{background:#003087;color:#ffdf00;font-size:9px;font-weight:700;letter-spacing:1px;padding:4px 8px;text-transform:uppercase;}.grupo-cols{display:grid;grid-template-columns:1fr 1fr;}.col-label{background:#f0f4ff;font-size:8px;font-weight:700;color:#003087;padding:3px 6px;text-align:center;letter-spacing:1px;border-top:1px solid #e0e8ff;}.col-item{padding:3px 6px;font-size:9px;display:flex;align-items:center;gap:3px;border-top:1px solid #eee;}.pos{font-weight:700;color:#003087;min-width:14px;font-size:8px;}.pts-badge{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;margin-left:auto;}.pts-ok{background:#e6f9ee;color:#00a050;}.pts-zero{background:#fee;color:#cc0000;}table.placares{width:100%;border-collapse:collapse;}table.placares th{background:#f0f4ff;color:#003087;font-size:9px;font-weight:700;padding:4px 6px;text-align:left;letter-spacing:1px;}table.placares td{padding:4px 6px;border-bottom:1px solid #eee;font-size:10px;}table.placares tr:last-child td{border-bottom:none;}.pts-cell{font-weight:700;text-align:center;}.pts3{color:#00a050;}.pts2{color:#2266cc;}.pts1{color:#cc8800;}.pts0{color:#cc0000;}.zebra-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}.zebra-item{border:1px solid #ddd;border-radius:6px;padding:6px 10px;}.zebra-nome{font-weight:700;font-size:11px;}.zebra-pos{font-size:10px;color:#666;margin-top:2px;}.resumo-total{background:#003087;color:#fff;border-radius:6px;padding:12px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;text-align:center;}.total-item-label{font-size:9px;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase;}.total-item-val{font-size:18px;font-weight:900;color:#ffdf00;margin-top:2px;}.rodada-titulo{font-size:9px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px;padding:3px 6px;background:#f8f8f8;border-left:3px solid #003087;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>';

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Resumo — '+apelido+'</title>'+css+'</head><body><div class="page">';
  html += '<div class="topo"><div><div class="topo-nome">'+apelido+'</div><div class="topo-sub">Resumo de palpites — Copa do Mundo 2026</div></div><div class="topo-bolao"><div>'+bolaoNome+'</div><div style="margin-top:4px;color:rgba(255,255,255,0.5);">Gerado em '+dataGeracao+'</div></div></div>';

  // Grupos
  var pts_grupos=0;
  html += '<div class="secao"><div class="secao-titulo">Classificação dos Grupos</div><div class="grid2">';
  Object.keys(GRUPOS_DISPLAY_R).forEach(function(g){
    var tabelaReal=calcTabelaR(g,resultados);
    html += '<div class="grupo-box"><div class="grupo-label">Grupo '+g+'</div>';
    html += '<div class="grupo-cols"><div class="col-label">Palpite</div><div class="col-label">Hoje</div></div>';
    var bonusClassif = [];
    for(var pos=1;pos<=4;pos++){
      var tp=p1['g'+g.toLowerCase()+'_'+pos]||p1['g'+g+'_'+pos]||'—';
      var tr=tabelaReal[pos-1]?tabelaReal[pos-1].t:'—';
      var posReal=tabelaReal.findIndex(function(t){return t.t===tp;});
      var acertouPos=(posReal!==-1&&posReal+1===pos&&tp!=='—');
      var acertouClass=(posReal!==-1&&posReal<2&&pos<=2&&tp!=='—');
      if(acertouPos) pts_grupos+=1;
      if(acertouClass){ pts_grupos+=1; bonusClassif.push(tp); }
      html += '<div class="grupo-cols">';
      html += '<div class="col-item"><span class="pos">'+pos+'</span>'+tp+'</div>';
      var badges = acertouPos?'<span class="pts-badge pts-ok">+1 pos</span>':'';
      if(acertouClass) badges += '<span class="pts-badge pts-ok">+1 class</span>';
      html += '<div class="col-item"><span class="pos">'+pos+'</span>'+tr+badges+'</div>';
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div></div>';

  // Zebras
  var pts_zebras=0;
  html += '<div class="secao"><div class="secao-titulo">Zebras</div><div class="zebra-row">';
  for(var zi=1;zi<=4;zi++){
    var zebra=p1['zebra'+zi]||'—';
    var posZ=-1,grupoZ=null;
    if(zebra!=='—'){
      Object.keys(GRUPOS_DISPLAY_R).forEach(function(g){if(GRUPOS_DISPLAY_R[g].indexOf(zebra)>=0)grupoZ=g;});
      if(grupoZ){var tabZ=calcTabelaR(grupoZ,resultados);posZ=tabZ.findIndex(function(t){return t.t===zebra;});}
    }
    var zPts=0,zDesc='Aguardando';
    if(posZ===0){zPts=6;zDesc='1º lugar +6pts';}
    else if(posZ===1){zPts=4;zDesc='2º lugar +4pts';}
    else if(posZ===2){zPts=2;zDesc='3º lugar +2pts';}
    else if(posZ>=3){zPts=0;zDesc='Eliminada +0pts';}
    pts_zebras+=zPts;
    html += '<div class="zebra-item"><div class="zebra-nome">'+zebra+'</div><div class="zebra-pos">'+zDesc+'</div></div>';
  }
  html += '</div></div>';

  // Melhores Terceiros
  var pts_terceiros=0;
  html += '<div class="secao"><div class="secao-titulo">Melhores Terceiros</div>';
  // Calcular os 8 melhores terceiros reais
  var todosTerceirosR=[];
  Object.keys(GRUPOS_DISPLAY_R).forEach(function(g){
    var tab=calcTabelaR(g,resultados);
    if(tab[2]&&tab[2].j>0) todosTerceirosR.push({t:tab[2].t,p:tab[2].p,sg:tab[2].sg,gf:tab[2].gf});
  });
  todosTerceirosR.sort(function(a,b){if(b.p!==a.p)return b.p-a.p;if(b.sg!==a.sg)return b.sg-a.sg;return b.gf-a.gf;});
  var oitoMelhoresR=todosTerceirosR.slice(0,8).map(function(x){return x.t;});
  if(oitoMelhoresR.length===0){
    html += '<div style="color:#888;font-size:11px;padding:8px;">Aguardando fase de grupos terminar.</div>';
  } else {
    html += '<table class="placares"><thead><tr><th>Posição</th><th>Seu palpite</th><th>Melhor terceiro real</th><th>Resultado</th><th>Pts</th></tr></thead><tbody>';
    for(var ti=1;ti<=8;ti++){
      var tPalpite=p1['t'+ti]||'—';
      var tReal=oitoMelhoresR[ti-1]||'—';
      var posRealT=oitoMelhoresR.indexOf(tPalpite);
      var tPts=0, tDesc='Não avançou';
      if(posRealT!==-1){
        if(posRealT+1===ti){tPts=2;tDesc='Posição exata ✓';}
        else{tPts=1;tDesc='Avançou (posição errada)';}
      }
      pts_terceiros+=tPts;
      var cls=tPts===2?'pts3':tPts===1?'pts2':'pts0';
      html += '<tr><td style="text-align:center;font-weight:700;">'+ti+'º</td><td style="font-weight:700;">'+tPalpite+'</td><td>'+tReal+'</td><td>'+tDesc+'</td><td class="pts-cell '+cls+'">'+tPts+'</td></tr>';
    }
    html += '</tbody></table>';
  }
  html += '</div>';

  // Placares
  var pts_placares=0,ptsLista=[];
  html += '<div class="secao"><div class="secao-titulo">Placares (top 24 contam)</div><table class="placares"><thead><tr><th>Jogo</th><th>Palpite</th><th>Resultado</th><th>Descrição</th><th>Pts</th></tr></thead><tbody>';
  ['R1','R2','R3'].forEach(function(r){
    var rLabel=r==='R1'?'Rodada 1':r==='R2'?'Rodada 2':'Rodada 3';
    html += '<tr><td colspan="5" class="rodada-titulo">'+rLabel+'</td></tr>';
    Object.keys(JOGOS_R[r]).forEach(function(g){
      JOGOS_R[r][g].forEach(function(jogo,i){
        var key=r+'_'+g+'_'+i;
        var res=resultados.find(function(x){return x.api_id===key;});
        var pa=placares['placar_'+key+'_a'],pb=placares['placar_'+key+'_b'];
        var palpiteStr=(pa!==undefined&&pa!==null)?pa+' × '+pb:'—';
        var realStr=res&&res.gols_a!==null?res.gols_a+' × '+res.gols_b:'Aguardando';
        var calc={pts:0,desc:'Aguardando resultado'};
        if(res&&res.gols_a!==null&&pa!==undefined&&pa!==null) calc=calcPlacarDesc(pa,pb,res.gols_a,res.gols_b);
        else if(pa===undefined||pa===null) calc={pts:0,desc:'Não apostado'};
        ptsLista.push(calc.pts);
        var cls=calc.pts===3?'pts3':calc.pts===2?'pts2':calc.pts===1?'pts1':'pts0';
        html += '<tr><td>'+jogo[0]+' × '+jogo[1]+'</td><td style="text-align:center;font-weight:700;">'+palpiteStr+'</td><td style="text-align:center;font-weight:700;">'+realStr+'</td><td>'+calc.desc+'</td><td class="pts-cell '+cls+'">'+calc.pts+'</td></tr>';
      });
    });
  });
  ptsLista.sort(function(a,b){return b-a;});
  pts_placares=ptsLista.slice(0,24).reduce(function(s,v){return s+v;},0);
  html += '</tbody></table></div>';

  // Total Fase Grupos
  html += '<div class="resumo-total" style="grid-template-columns:repeat(5,1fr);">';
  html += '<div><div class="total-item-label">Grupos</div><div class="total-item-val">'+pts_grupos+'</div></div>';
  html += '<div><div class="total-item-label">Zebras</div><div class="total-item-val">'+pts_zebras+'</div></div>';
  html += '<div><div class="total-item-label">Terceiros</div><div class="total-item-val">'+pts_terceiros+'</div></div>';
  html += '<div><div class="total-item-label">Placares</div><div class="total-item-val">'+pts_placares+'</div></div>';
  html += '<div><div class="total-item-label" style="color:#ffdf00;">Total Fase Grupos</div><div class="total-item-val" style="font-size:22px;">'+(pts_grupos+pts_zebras+pts_terceiros+pts_placares)+'</div></div>';
  html += '</div>';

  // ── MATA-MATA ──
  var rp2 = await fetch(SU+'/rest/v1/palpites_fase2?bolao_id=eq.'+bolaoId+'&apelido=eq.'+encodeURIComponent(apelido)+'&select=*&order=criado_em.asc',{headers:H2});
  var palpites2 = rp2.ok ? await rp2.json() : [];
  var dadosMM = {}, placaresMM = {};
  palpites2.forEach(function(x){
    if (x.fase === 'matamata' && x.dados_mm) Object.assign(dadosMM, x.dados_mm);
    if (x.placares_mm) Object.assign(placaresMM, x.placares_mm);
  });

  var rrm = await fetch(SU+'/rest/v1/resultados_mm?select=*',{headers:H2});
  var resultadosMM = rrm.ok ? await rrm.json() : [];
  var vencedoresReaisR = {}, placaresReaisR = {};
  resultadosMM.forEach(function(r){
    var k = r.fase+'_'+r.jogo_idx;
    if (r.vencedor) vencedoresReaisR[k] = r.vencedor;
    if (r.gols_a !== null && r.gols_b !== null) placaresReaisR[k] = {ga:r.gols_a, gb:r.gols_b};
  });

  var MM_PAIRS_R = [
    ['Alemanha','Paraguai'],['França','Suécia'],['Canadá','África do Sul'],['Holanda','Marrocos'],
    ['Portugal','Croácia'],['Espanha','Áustria'],['Estados Unidos','Bósnia e Herzegovina'],['Bélgica','Senegal'],
    ['Brasil','Japão'],['Costa do Marfim','Noruega'],['México','Equador'],['Inglaterra','RD Congo'],
    ['Argentina','Cabo Verde'],['Austrália','Egito'],['Suíça','Argélia'],['Colômbia','Gana']
  ];

  // Chaveamento
  var pts_chaveamento = 0;
  html += '<div class="secao"><div class="secao-titulo">Chaveamento — Mata-Mata</div><table class="placares"><thead><tr><th>Fase</th><th>Confronto</th><th>Seu palpite</th><th>Resultado real</th><th>Pts</th></tr></thead><tbody>';
  for (var i=0;i<8;i++) {
    var confL = MM_PAIRS_R[i][0]+' × '+MM_PAIRS_R[i][1];
    var realL = vencedoresReaisR['r16avos_'+i];
    var palL = dadosMM['r16L_'+i]||'—';
    var ptsL = (realL && palL===realL) ? 1 : 0;
    pts_chaveamento += ptsL;
    html += '<tr><td>R32→Oit.</td><td>'+confL+'</td><td style="font-weight:700;">'+palL+'</td><td>'+(realL||'Aguardando')+'</td><td class="pts-cell '+(ptsL?'pts3':'pts0')+'">'+ptsL+'</td></tr>';
    var confR = MM_PAIRS_R[i+8][0]+' × '+MM_PAIRS_R[i+8][1];
    var realR = vencedoresReaisR['r16avos_'+(i+8)];
    var palR = dadosMM['r16R_'+i]||'—';
    var ptsR = (realR && palR===realR) ? 1 : 0;
    pts_chaveamento += ptsR;
    html += '<tr><td>R32→Oit.</td><td>'+confR+'</td><td style="font-weight:700;">'+palR+'</td><td>'+(realR||'Aguardando')+'</td><td class="pts-cell '+(ptsR?'pts3':'pts0')+'">'+ptsR+'</td></tr>';
  }
  for (var i2=0;i2<4;i2++) {
    var realQL = vencedoresReaisR['roitavas_'+i2];
    var palQL = dadosMM['qfL_'+i2]||'—';
    var ptsQL = (realQL && palQL===realQL) ? 1 : 0;
    pts_chaveamento += ptsQL;
    html += '<tr><td>Oit.→Qua.</td><td>—</td><td style="font-weight:700;">'+palQL+'</td><td>'+(realQL||'Aguardando')+'</td><td class="pts-cell '+(ptsQL?'pts3':'pts0')+'">'+ptsQL+'</td></tr>';
    var realQR = vencedoresReaisR['roitavas_'+(i2+4)];
    var palQR = dadosMM['qfR_'+i2]||'—';
    var ptsQR = (realQR && palQR===realQR) ? 1 : 0;
    pts_chaveamento += ptsQR;
    html += '<tr><td>Oit.→Qua.</td><td>—</td><td style="font-weight:700;">'+palQR+'</td><td>'+(realQR||'Aguardando')+'</td><td class="pts-cell '+(ptsQR?'pts3':'pts0')+'">'+ptsQR+'</td></tr>';
  }
  for (var i3=0;i3<2;i3++) {
    var realSL = vencedoresReaisR['rquartas_'+i3];
    var palSL = dadosMM['sfL_'+i3]||'—';
    var ptsSL = (realSL && palSL===realSL) ? 1 : 0;
    pts_chaveamento += ptsSL;
    html += '<tr><td>Qua.→Semi</td><td>—</td><td style="font-weight:700;">'+palSL+'</td><td>'+(realSL||'Aguardando')+'</td><td class="pts-cell '+(ptsSL?'pts3':'pts0')+'">'+ptsSL+'</td></tr>';
    var realSR = vencedoresReaisR['rquartas_'+(i3+2)];
    var palSR = dadosMM['sfR_'+i3]||'—';
    var ptsSR = (realSR && palSR===realSR) ? 1 : 0;
    pts_chaveamento += ptsSR;
    html += '<tr><td>Qua.→Semi</td><td>—</td><td style="font-weight:700;">'+palSR+'</td><td>'+(realSR||'Aguardando')+'</td><td class="pts-cell '+(ptsSR?'pts3':'pts0')+'">'+ptsSR+'</td></tr>';
  }
  var realFL = vencedoresReaisR['rsemi_0'];
  var palFL = dadosMM['finalL']||'—';
  var ptsFL = (realFL && palFL===realFL) ? 1 : 0;
  pts_chaveamento += ptsFL;
  html += '<tr><td>Semi→Final</td><td>—</td><td style="font-weight:700;">'+palFL+'</td><td>'+(realFL||'Aguardando')+'</td><td class="pts-cell '+(ptsFL?'pts3':'pts0')+'">'+ptsFL+'</td></tr>';
  var realFR = vencedoresReaisR['rsemi_1'];
  var palFR = dadosMM['finalR']||'—';
  var ptsFR = (realFR && palFR===realFR) ? 1 : 0;
  pts_chaveamento += ptsFR;
  html += '<tr><td>Semi→Final</td><td>—</td><td style="font-weight:700;">'+palFR+'</td><td>'+(realFR||'Aguardando')+'</td><td class="pts-cell '+(ptsFR?'pts3':'pts0')+'">'+ptsFR+'</td></tr>';
  html += '</tbody></table></div>';

  // Top 4
  var pts_top4 = 0;
  var finalResR = resultadosMM.find(function(r){return r.fase==='rfinal'&&r.jogo_idx===1;});
  var terceiroResR = resultadosMM.find(function(r){return r.fase==='rfinal'&&r.jogo_idx===0;});
  var campeaoRealR = finalResR ? finalResR.vencedor : null;
  var viceRealR = finalResR ? (finalResR.vencedor===finalResR.time_a?finalResR.time_b:finalResR.time_a) : null;
  var terceiroRealR = terceiroResR ? terceiroResR.vencedor : null;
  var quartoRealR = terceiroResR ? (terceiroResR.vencedor===terceiroResR.time_a?terceiroResR.time_b:terceiroResR.time_a) : null;
  var top4RealR = [campeaoRealR, viceRealR, terceiroRealR, quartoRealR];
  var top4Labels = ['1º Lugar — Campeão','2º Lugar — Vice','3º Lugar','4º Lugar'];
  html += '<div class="secao"><div class="secao-titulo">Top 4 Final</div><div class="zebra-row">';
  for (var ti2=0; ti2<4; ti2++) {
    var palT4 = dadosMM['top4_'+(ti2+1)]||'—';
    var realT4 = top4RealR[ti2];
    var ptsT4=0, descT4='Aguardando';
    if (realT4) {
      if (palT4===realT4) { ptsT4=2; descT4='Posição exata +2pts'; }
      else if (top4RealR.indexOf(palT4)>=0) { ptsT4=1; descT4='No Top4, posição errada +1pt'; }
      else { ptsT4=0; descT4='Fora do Top4 +0pts'; }
    }
    pts_top4 += ptsT4;
    html += '<div class="zebra-item"><div class="zebra-nome">'+top4Labels[ti2]+': '+palT4+'</div><div class="zebra-pos">'+descT4+'</div></div>';
  }
  html += '</div></div>';

  // Azarão
  var pts_azarao = 0;
  var azaraoNome = dadosMM['decepcao1']||'—';
  var azDesc = 'Aguardando';
  if (azaraoNome !== '—') {
    var passouR16az = Object.keys(vencedoresReaisR).some(function(k){return k.indexOf('r16avos_')===0 && vencedoresReaisR[k]===azaraoNome;});
    var passouQFaz  = Object.keys(vencedoresReaisR).some(function(k){return k.indexOf('roitavas_')===0 && vencedoresReaisR[k]===azaraoNome;});
    var passouSFaz  = Object.keys(vencedoresReaisR).some(function(k){return k.indexOf('rquartas_')===0 && vencedoresReaisR[k]===azaraoNome;});
    if (!passouR16az && Object.keys(vencedoresReaisR).some(function(k){return k.indexOf('r16avos_')===0;})) { pts_azarao=4; azDesc='Caiu no R32 +4pts'; }
    else if (!passouQFaz && passouR16az) { pts_azarao=3; azDesc='Caiu nas Oitavas +3pts'; }
    else if (!passouSFaz && passouQFaz) { pts_azarao=2; azDesc='Caiu nas Quartas +2pts'; }
    else if (passouSFaz) { pts_azarao=0; azDesc='Chegou às Semis ou além +0pts'; }
  }
  html += '<div class="secao"><div class="secao-titulo">Azarão</div><div class="zebra-row" style="grid-template-columns:1fr;">';
  html += '<div class="zebra-item"><div class="zebra-nome">⭐ '+azaraoNome+'</div><div class="zebra-pos">'+azDesc+'</div></div>';
  html += '</div></div>';

  // Zebras do Mata-Mata
  var pts_zebras_mm = 0;
  html += '<div class="secao"><div class="secao-titulo">Zebras do Mata-Mata</div><div class="zebra-row">';
  [dadosMM['zebra_mm_1'], dadosMM['zebra_mm_2']].forEach(function(zebraMM, zmi) {
    var nomeZMM = zebraMM || '—';
    var descZMM = 'Aguardando';
    var ptsZMM = 0;
    if (nomeZMM !== '—') {
      var passouR16zm = Object.keys(vencedoresReaisR).some(function(k){return k.indexOf('r16avos_')===0 && vencedoresReaisR[k]===nomeZMM;});
      var passouQFzm  = Object.keys(vencedoresReaisR).some(function(k){return k.indexOf('roitavas_')===0 && vencedoresReaisR[k]===nomeZMM;});
      var passouSFzm  = Object.keys(vencedoresReaisR).some(function(k){return k.indexOf('rquartas_')===0 && vencedoresReaisR[k]===nomeZMM;});
      if (passouSFzm) { ptsZMM=4; descZMM='Chegou às Semis ou além +4pts'; }
      else if (passouQFzm) { ptsZMM=3; descZMM='Chegou às Quartas +3pts'; }
      else if (passouR16zm) { ptsZMM=2; descZMM='Chegou às Oitavas +2pts'; }
      else if (Object.keys(vencedoresReaisR).length) { ptsZMM=0; descZMM='Eliminada no R32 +0pts'; }
    }
    pts_zebras_mm += ptsZMM;
    html += '<div class="zebra-item"><div class="zebra-nome">🦓 Zebra '+(zmi+1)+': '+nomeZMM+'</div><div class="zebra-pos">'+descZMM+'</div></div>';
  });
  html += '</div></div>';

  // Placares Mata-Mata
  var pts_placares_mata = 0;
  var TIMES_MM_RESUMO = {
    'r16avos': [['Alemanha','Paraguai'],['França','Suécia'],['Canadá','África do Sul'],['Holanda','Marrocos'],['Portugal','Croácia'],['Espanha','Áustria'],['Estados Unidos','Bósnia e Herz.'],['Bélgica','Senegal'],['Brasil','Japão'],['Costa do Marfim','Noruega'],['México','Equador'],['Inglaterra','RD Congo'],['Argentina','Cabo Verde'],['Austrália','Egito'],['Suíça','Argélia'],['Colômbia','Gana']],
    'roitavas': [['Canadá','Marrocos'],['Paraguai','França'],['Brasil','Noruega'],['México','Inglaterra'],['Portugal','Espanha'],['Estados Unidos','Bélgica'],['Argentina','Egito'],['Suíça','Colômbia']],
    'rquartas': [['França','Marrocos'],['Espanha','Bélgica'],['Noruega','Inglaterra'],['Argentina','Suíça']],
    'rsemi':    [['França','Espanha'],['Inglaterra','Argentina']],
    'rfinal':   [['3° Lugar','4° Lugar'],['Final','']]
  };
  var FASES_MM_R = {
    r16avos: {n:16, label:'16 Avos de Final'}, roitavas: {n:8, label:'Oitavas de Final'},
    rquartas: {n:4, label:'Quartas de Final'}, rsemi: {n:2, label:'Semifinal'}, rfinal: {n:2, label:'Final'}
  };

  // Primeiro passo: coletar todos os jogos com pontuação
  var todosPlacaresMMCalc = [];
  Object.keys(FASES_MM_R).forEach(function(fase) {
    var faseInfo = FASES_MM_R[fase];
    for (var ji=0; ji<faseInfo.n; ji++) {
      var pa2 = placaresMM[fase+'_'+ji+'_A'], pb2 = placaresMM[fase+'_'+ji+'_B'];
      if (pa2===undefined && pb2===undefined) continue;
      var timesArr = TIMES_MM_RESUMO[fase] && TIMES_MM_RESUMO[fase][ji] ? TIMES_MM_RESUMO[fase][ji] : ['Time A','Time B'];
      var realMM = placaresReaisR[fase+'_'+ji];
      var calcMM = {pts:0, desc:'Aguardando'};
      if (realMM && pa2!==undefined) calcMM = calcPlacarDesc(parseInt(pa2), parseInt(pb2), realMM.ga, realMM.gb);
      todosPlacaresMMCalc.push({
        fase: fase, ji: ji,
        nomeJogo: timesArr[0] + (timesArr[1] ? ' × ' + timesArr[1] : ''),
        faseLabel: faseInfo.label,
        palpiteStr: (pa2!==undefined) ? pa2+' × '+pb2 : '—',
        realStr: realMM ? realMM.ga+' × '+realMM.gb : 'Aguardando',
        pts: calcMM.pts,
        desc: calcMM.desc
      });
    }
  });

  // Segundo passo: determinar os 12 melhores (só jogos com resultado real)
  var comResultado = todosPlacaresMMCalc.filter(function(j){ return j.realStr !== 'Aguardando'; });
  // Ordenar por pts decrescente, guardar índices originais dos 12 melhores
  var idxOrdenados = comResultado
    .map(function(j, idx){ return {idx: idx, pts: j.pts}; })
    .sort(function(a, b){ return b.pts - a.pts; })
    .slice(0, 12)
    .map(function(x){ return x.idx; });
  var top12Set = {};
  idxOrdenados.forEach(function(idx){ top12Set[idx] = true; });
  var contadorTop12 = 0;
  var limite12 = 0;
  comResultado.forEach(function(j, idx){
    if (top12Set[idx]) { limite12 += j.pts; }
  });
  // Marcar cada jogo se conta ou não
  var comResultadoIdx = 0;
  todosPlacaresMMCalc.forEach(function(j) {
    if (j.realStr === 'Aguardando') { j.conta = false; return; }
    j.conta = !!top12Set[comResultadoIdx];
    comResultadoIdx++;
  });

  // Terceiro passo: renderizar tabela com indicação visual
  html += '<div class="secao"><div class="secao-titulo">Placares — Mata-Mata <span style="font-size:10px;font-weight:400;color:#aaa;">(12 melhores contam)</span></div><table class="placares"><thead><tr><th>Confronto</th><th>Palpite</th><th>Resultado</th><th>Desc.</th><th>Pts</th></tr></thead><tbody>';
  var faseAtual = '';
  todosPlacaresMMCalc.forEach(function(j) {
    if (j.faseLabel !== faseAtual) {
      html += '<tr><td colspan="5" class="rodada-titulo">'+j.faseLabel+'</td></tr>';
      faseAtual = j.faseLabel;
    }
    var clsMM = j.pts===3?'pts3':j.pts===2?'pts2':j.pts===1?'pts1':'pts0';
    var descartado = !j.conta && j.realStr !== 'Aguardando';
    var rowStyle = descartado ? 'opacity:0.45;' : '';
    var descartadoTag = descartado ? ' <span style="font-size:9px;color:#888;">(descartado)</span>' : '';
    html += '<tr style="'+rowStyle+'">';
    html += '<td style="font-size:10px;">'+j.nomeJogo+'</td>';
    html += '<td style="text-align:center;font-weight:700;">'+j.palpiteStr+'</td>';
    html += '<td style="text-align:center;font-weight:700;">'+j.realStr+'</td>';
    html += '<td style="font-size:10px;color:#666;">'+j.desc+descartadoTag+'</td>';
    html += '<td class="pts-cell '+clsMM+'">'+(j.conta ? j.pts : '<span style="text-decoration:line-through;opacity:0.5;">'+j.pts+'</span>')+'</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  pts_placares_mata = limite12;

  // Total Mata-Mata
  var totalMataMata = pts_chaveamento + pts_top4 + pts_azarao + pts_zebras_mm + pts_placares_mata;
  html += '<div class="resumo-total" style="grid-template-columns:repeat(5,1fr);">';
  html += '<div><div class="total-item-label">Chaveamento</div><div class="total-item-val">'+pts_chaveamento+'</div></div>';
  html += '<div><div class="total-item-label">Top4</div><div class="total-item-val">'+pts_top4+'</div></div>';
  html += '<div><div class="total-item-label">Azarão</div><div class="total-item-val">'+pts_azarao+'</div></div>';
  html += '<div><div class="total-item-label">Zebras MM</div><div class="total-item-val">'+pts_zebras_mm+'</div></div>';
  html += '<div><div class="total-item-label" style="color:#ffdf00;">Total Mata-Mata</div><div class="total-item-val" style="font-size:22px;">'+totalMataMata+'</div></div>';
  html += '</div>';
  html += '<div style="text-align:center;font-size:9px;color:#888;margin-top:2px;">Placares Mata-Mata: '+pts_placares_mata+' pts (incluído no total acima)</div>';

  // Total Geral
  html += '<div class="resumo-total" style="margin-top:8px;background:#00194a;">';
  html += '<div><div class="total-item-label" style="color:#ffdf00;">TOTAL GERAL</div><div class="total-item-val" style="font-size:26px;">'+(pts_grupos+pts_zebras+pts_terceiros+pts_placares+totalMataMata)+'</div></div>';
  html += '</div>';

  if (silencioso) {
    // Retornar só o conteúdo interno (sem html/head/body)
    return html;
  }

  html += '</div></body></html>';
  var win=window.open('','_blank');
  win.document.write(html);
  win.document.close();
  setTimeout(function(){win.print();},800);
}


async function init() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('bolao')) {
    document.getElementById('codigoRanking').value = params.get('bolao');
    buscarBolaoRanking();
  }
}

async function buscarBolaoRanking() {

  if (!codigo) return;
  var resp = await fetch(SU+'/rest/v1/boloes?codigo=eq.'+encodeURIComponent(codigo)+'&select=id,nome',{headers:H});
  if (!resp.ok) { document.getElementById('rankingArea').innerHTML='<div class="ranking-card"><div class="empty"><strong>Bolão não encontrado</strong>Verifique o código e tente novamente.</div></div>'; return; }
  var boloes = await resp.json();

  carregarRanking(boloes[0].id, boloes[0].nome);
}

async function carregarRanking(bolaoId, bolaoNome) {
  if (!bolaoId) return;
  var area = document.getElementById('rankingArea');
  area.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    // Buscar palpites fase 1 — verificar grupos E placares separadamente
    var r2 = await fetch(SU+'/rest/v1/palpites_fase1?bolao_id=eq.'+bolaoId+'&select=apelido,ga_1,placares&order=criado_em.asc',{headers:H});
    var fase1Grupos = {};
    var fase1Placares = {};
    var fase1PlacR1 = {};
    var fase1PlacR2 = {};
    var fase1PlacR3 = {};
    if (r2.ok) {
      var p1 = await r2.json();
      p1.forEach(function(x){
        if (!x.apelido) return;
        // Grupos: só marca se ga_1 tem valor
        if (x['ga_1']) fase1Grupos[x.apelido] = true;
        // Placares: checar cada rodada separadamente
        var pl = x.placares;
        if (pl) {
          if (typeof pl === 'string') { try { pl = JSON.parse(pl); } catch(e){ pl = {}; } }
          if (typeof pl === 'object') {
            var keys = Object.keys(pl);
            if (keys.some(function(k){ return k.indexOf('placar_') === 0; }))    fase1Placares[x.apelido] = true;
            if (keys.some(function(k){ return k.indexOf('placar_R1_') === 0; })) fase1PlacR1[x.apelido] = true;
            if (keys.some(function(k){ return k.indexOf('placar_R2_') === 0; })) fase1PlacR2[x.apelido] = true;
            if (keys.some(function(k){ return k.indexOf('placar_R3_') === 0; })) fase1PlacR3[x.apelido] = true;
          }
        }
      });
    }

    // Buscar palpites fase 2 (chaveamento mata-mata)
    var r3 = await fetch(SU+'/rest/v1/palpites_fase2?bolao_id=eq.'+bolaoId+'&select=apelido,fase&order=criado_em.asc',{headers:H});
    var fase2Chaveamento = {}, fase2R16 = {}, fase2Oitavas = {}, fase2Quartas = {}, fase2Semi = {}, fase2Final = {};
    if (r3.ok) {
      var p2 = await r3.json();
      p2.forEach(function(x){
        if (!x.apelido) return;
        if (x.fase === 'matamata')  fase2Chaveamento[x.apelido] = true;
        if (x.fase === 'r16avos')   fase2R16[x.apelido] = true;
        if (x.fase === 'roitavas')  fase2Oitavas[x.apelido] = true;
        if (x.fase === 'rquartas')  fase2Quartas[x.apelido] = true;
        if (x.fase === 'rsemi')     fase2Semi[x.apelido] = true;
        if (x.fase === 'rfinal')    fase2Final[x.apelido] = true;
      });
    }

    // Buscar pontuações
    var ranking = [];
    var r1 = await fetch(SU+'/rest/v1/pontuacoes?bolao_id=eq.'+bolaoId+'&select=*&order=total.desc',{headers:H});
    if (r1.ok) ranking = await r1.json();

    // Buscar histórico para tendência e variação de posição
    var historicoMap = {}; // { apelido: [total_d1, total_d2, ...] }
    var diasHist = [];
    try {
      var rHist = await fetch(SU+'/rest/v1/ranking_historico?bolao_id=eq.'+bolaoId+'&select=apelido,total,dia&order=dia.asc',{headers:H});
      if (rHist.ok) {
        var histRows = await rHist.json();
        // Coletar dias únicos ordenados
        var diasSet = {};
        histRows.forEach(function(r){ diasSet[r.dia] = true; });
        diasHist = Object.keys(diasSet).sort();
        // Montar mapa
        histRows.forEach(function(r){
          if (!historicoMap[r.apelido]) historicoMap[r.apelido] = {};
          historicoMap[r.apelido][r.dia] = r.total;
        });
      }
    } catch(e) {}

    // Garantir que todos que palpitaram apareçam no ranking
    var apelidosNoRanking = {};
    ranking.forEach(function(r){ apelidosNoRanking[r.apelido]=true; });
    [fase1Grupos, fase2Chaveamento, fase2R16, fase2Oitavas, fase2Quartas, fase2Semi, fase2Final].forEach(function(mapa){
      Object.keys(mapa).forEach(function(a){
        if (!apelidosNoRanking[a]) {
          ranking.push({apelido:a, pts_grupos:0, pts_placares:0, pts_zebras:0, pts_chaveamento:0, pts_placares_mata:0, total:0});
          apelidosNoRanking[a]=true;
        }
      });
    });
    if (!ranking.length) {
      area.innerHTML = '<div class="ranking-card"><div class="empty"><strong>Nenhum palpite ainda</strong>Seja o primeiro!</div></div>';
      return;
    }

    // ── RENDER ──────────────────────────────────────────────────────
    var GRID = '44px 1fr 60px 50px 50px 60px 60px 50px 58px 60px 50px 50px 50px 60px 64px';
    var html = '<div class="ranking-card" style="overflow-x:visible;width:100%;">';
    var dataHoje = new Date().toISOString().slice(0,10).split('-').reverse().join('/');
    html += '<div class="ranking-header"><span class="ranking-title">CLASSIFICAÇÃO ATUAL — '+dataHoje+'</span><div style="display:flex;align-items:center;gap:10px;"><button onclick="exportarTodosPDF(\''+bolaoId+'\')" style="background:#003087;color:#ffdf00;border:1px solid #ffdf00;border-radius:8px;padding:6px 14px;font-family:Bebas Neue,sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;">📄 EXPORTAR PDF</button><span class="ranking-update" style="color:#00c44f;">🟢 Ao vivo</span></div></div>';

    // Header colunas
    html += '<div style="background:var(--bg3);padding:6px 12px;">';
    html += '<div style="display:grid;grid-template-columns:'+GRID+';gap:4px;font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:4px 0;">';
    html += '<div></div><div></div>';
    html += '<div style="grid-column:span 6;text-align:center;color:var(--gold);border-bottom:2px solid rgba(255,223,0,0.4);padding-bottom:3px;">FASE DE GRUPOS</div>';
    html += '<div></div>';
    html += '<div style="grid-column:span 5;text-align:center;color:var(--muted);border-bottom:2px solid rgba(122,159,212,0.3);padding-bottom:3px;">MATA-MATA</div>';
    html += '<div></div>';
    html += '</div>';
    html += '<div style="display:grid;grid-template-columns:'+GRID+';gap:4px;font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);padding:4px 0 6px;">';
    html += '<div>Pos.</div><div>Participante</div>';
    html += '<div style="text-align:center">Grupos</div>';
    html += '<div style="text-align:center">Zebras</div>';
    html += '<div style="text-align:center">Terceiros</div>';
    html += '<div style="text-align:center">Rod. 1</div>';
    html += '<div style="text-align:center">Rod. 2</div>';
    html += '<div style="text-align:center">Rod. 3</div>';
    html += '<div style="text-align:center;color:var(--gold);font-weight:700;">Total GRP</div>';
    html += '<div style="text-align:center">Chaveam.</div>';
    html += '<div style="text-align:center">Top4</div>';
    html += '<div style="text-align:center">Zebras MM</div>';
    html += '<div style="text-align:center">Azarão</div>';
    html += '<div style="text-align:center">Placares MM</div>';
    html += '<div style="text-align:center;color:var(--muted);font-weight:700;">Total MM</div>';
    html += '</div></div>';

    // Calcular posições com empate
    var posicoes = [];
    var posAtual = 1;
    for (var ii = 0; ii < ranking.length; ii++) {
      if (ii > 0 && ranking[ii].total === ranking[ii-1].total) {
        posicoes.push(posicoes[ii-1]);
      } else {
        posAtual = ii + 1;
        posicoes.push(posAtual);
      }
    }

    ranking.forEach(function(r, i) {
      var pos = posicoes[i];
      var numColor = pos===1?'var(--gold)':pos===2?'#aaaaaa':pos===3?'#cd7f32':'var(--muted)';

      var temGrupos     = fase1Grupos[r.apelido]      ? '✅' : '❌';
      var temChaveamento= fase2Chaveamento[r.apelido] ? '✅' : '❌';
      var temR1  = fase1PlacR1[r.apelido]   ? '✅' : '❌';
      var temR2  = fase1PlacR2[r.apelido]   ? '✅' : '❌';
      var temR3  = fase1PlacR3[r.apelido]   ? '✅' : '❌';
      var tem16avos  = fase2R16[r.apelido]      ? '✅' : '❌';
      var temOitavas = fase2Oitavas[r.apelido]  ? '✅' : '❌';
      var temQuartas = fase2Quartas[r.apelido]  ? '✅' : '❌';
      var temSemi    = fase2Semi[r.apelido]      ? '✅' : '❌';
      var temFinal   = fase2Final[r.apelido]     ? '✅' : '❌';

      var pGrupos    = r.pts_grupos      || 0;
      var pZebras    = r.pts_zebras      || 0;
      var pTerceiros = r.pts_terceiros   || 0;
      var pR1        = r.pts_placares_r1 || 0;
      var pR2        = r.pts_placares_r2 || 0;
      var pR3        = r.pts_placares_r3 || 0;
      var pChaveamento = r.pts_chaveamento || 0;
      var pTop4      = r.pts_top4      || 0;
      var pZebrasMM  = r.pts_zebras_mm || 0;
      var pAzarao    = r.pts_azarao    || 0;
      var p16avos    = r.pts_16avos    || 0;
      var pOitavas   = r.pts_oitavas   || 0;
      var pQuartas   = r.pts_quartas   || 0;
      var pSemi      = r.pts_semi      || 0;
      var pFinal     = r.pts_final     || 0;
      var pPlacares  = r.pts_placares_mata || 0;
      var totalGrp   = pGrupos + pZebras + pTerceiros + (r.pts_placares||0);
      var totalMM    = pChaveamento + pTop4 + pZebrasMM + pAzarao + pPlacares;

      html += '<div style="display:grid;grid-template-columns:'+GRID+';align-items:center;padding:8px 12px;border-bottom:1px solid rgba(26,61,122,0.4);gap:4px;">';
      html += '<div class="ranking-pos" style="color:'+numColor+'">'+pos+'<sup>º</sup></div>';
      html += '<div class="ranking-apelido" style="display:flex;align-items:center;gap:8px;">'+r.apelido+'<button onclick="gerarResumo(\''+r.apelido+'\',\''+bolaoId+'\')" style="background:rgba(255,223,0,0.1);border:1px solid rgba(255,223,0,0.25);color:#ffdf00;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:0.5px;white-space:nowrap;">📄 RESUMO</button></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pGrupos+' pts</div><div style="font-size:15px;">'+temGrupos+'</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pZebras+' pts</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pTerceiros+' pts</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pR1+' pts</div><div style="font-size:15px;">'+temR1+'</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pR2+' pts</div><div style="font-size:15px;">'+temR2+'</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pR3+' pts</div><div style="font-size:15px;">'+temR3+'</div></div>';
      html += '<div style="text-align:center;background:rgba(255,223,0,0.06);border-radius:6px;"><div style="font-size:11px;color:var(--gold);font-weight:700;">'+totalGrp+'</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);font-weight:700;">'+pChaveamento+' pts</div><div style="font-size:15px;">'+temChaveamento+'</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);font-weight:700;">'+pTop4+' pts</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);font-weight:700;">'+pZebrasMM+' pts</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);font-weight:700;">'+pAzarao+' pts</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);font-weight:700;">'+pPlacares+' pts</div></div>';
      html += '<div class="ranking-pts total">'+totalMM+'</div>';
      html += '</div>';
    });

    html += '<div class="legend"><span>✅ Palpite enviado</span><span>❌ Palpite não enviado</span></div>';
    html += '</div>';
    area.innerHTML = html;
  } catch(e) {
    console.error(e);
    area.innerHTML = '<div class="ranking-card"><div class="empty"><strong>Erro ao carregar</strong></div></div>';
  }
}

async function init() {

    document.getElementById('codigoRanking').value = params.get('bolao');
    buscarBolaoRanking();

async function buscarBolaoRanking() {
  var codigo = document.getElementById('codigoRanking').value.trim().toUpperCase();
  if (!codigo) return;
  var resp = await fetch(SU+'/rest/v1/boloes?codigo=eq.'+encodeURIComponent(codigo)+'&select=id,nome',{headers:H});
  if (!resp.ok) { document.getElementById('rankingArea').innerHTML='<div class="ranking-card"><div class="empty"><strong>Bolão não encontrado</strong>Verifique o código e tente novamente.</div></div>'; return; }
  var boloes = await resp.json();
  if (!boloes.length) { document.getElementById('rankingArea').innerHTML='<div class="ranking-card"><div class="empty"><strong>Bolão não encontrado</strong>Verifique o código e tente novamente.</div></div>'; return; }
  carregarRanking(boloes[0].id, boloes[0].nome);
}

async function carregarRanking(bolaoId, bolaoNome) {
  if (!bolaoId) return;
  var area = document.getElementById('rankingArea');
  area.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    // Buscar palpites fase 1 — verificar grupos E placares separadamente
    var r2 = await fetch(SU+'/rest/v1/palpites_fase1?bolao_id=eq.'+bolaoId+'&select=apelido,ga_1,placares&order=criado_em.asc',{headers:H});
    var fase1Grupos = {};
    var fase1Placares = {};
    var fase1PlacR1 = {};
    var fase1PlacR2 = {};
    var fase1PlacR3 = {};
    if (r2.ok) {
      var p1 = await r2.json();
      p1.forEach(function(x){
        if (!x.apelido) return;
        // Grupos: só marca se ga_1 tem valor
        if (x['ga_1']) fase1Grupos[x.apelido] = true;
        // Placares: checar cada rodada separadamente
        var pl = x.placares;
        if (pl) {
          if (typeof pl === 'string') { try { pl = JSON.parse(pl); } catch(e){ pl = {}; } }
          if (typeof pl === 'object') {
            var keys = Object.keys(pl);
            if (keys.some(function(k){ return k.indexOf('placar_') === 0; }))    fase1Placares[x.apelido] = true;
            if (keys.some(function(k){ return k.indexOf('placar_R1_') === 0; })) fase1PlacR1[x.apelido] = true;
            if (keys.some(function(k){ return k.indexOf('placar_R2_') === 0; })) fase1PlacR2[x.apelido] = true;
            if (keys.some(function(k){ return k.indexOf('placar_R3_') === 0; })) fase1PlacR3[x.apelido] = true;
          }
        }
      });
    }

    // Buscar palpites fase 2 (chaveamento mata-mata)
    var r3 = await fetch(SU+'/rest/v1/palpites_fase2?bolao_id=eq.'+bolaoId+'&select=apelido,fase&order=criado_em.asc',{headers:H});
    var fase2Chaveamento = {}, fase2R16 = {}, fase2Oitavas = {}, fase2Quartas = {}, fase2Semi = {}, fase2Final = {};
    if (r3.ok) {
      var p2 = await r3.json();
      p2.forEach(function(x){
        if (!x.apelido) return;
        if (x.fase === 'matamata')  fase2Chaveamento[x.apelido] = true;
        if (x.fase === 'r16avos')   fase2R16[x.apelido] = true;
        if (x.fase === 'roitavas')  fase2Oitavas[x.apelido] = true;
        if (x.fase === 'rquartas')  fase2Quartas[x.apelido] = true;
        if (x.fase === 'rsemi')     fase2Semi[x.apelido] = true;
        if (x.fase === 'rfinal')    fase2Final[x.apelido] = true;
      });
    }

    // Buscar pontuações
    var ranking = [];
    var r1 = await fetch(SU+'/rest/v1/pontuacoes?bolao_id=eq.'+bolaoId+'&select=*&order=total.desc',{headers:H});
    if (r1.ok) ranking = await r1.json();

    // Buscar histórico para tendência e variação de posição
    var historicoMap = {}; // { apelido: [total_d1, total_d2, ...] }
    var diasHist = [];
    try {
      var rHist = await fetch(SU+'/rest/v1/ranking_historico?bolao_id=eq.'+bolaoId+'&select=apelido,total,dia&order=dia.asc',{headers:H});
      if (rHist.ok) {
        var histRows = await rHist.json();
        // Coletar dias únicos ordenados
        var diasSet = {};
        histRows.forEach(function(r){ diasSet[r.dia] = true; });
        diasHist = Object.keys(diasSet).sort();
        // Montar mapa
        histRows.forEach(function(r){
          if (!historicoMap[r.apelido]) historicoMap[r.apelido] = {};
          historicoMap[r.apelido][r.dia] = r.total;
        });
      }
    } catch(e) {}

    // Garantir que todos que palpitaram apareçam no ranking
    var apelidosNoRanking = {};
    ranking.forEach(function(r){ apelidosNoRanking[r.apelido]=true; });
    [fase1Grupos, fase2Chaveamento, fase2R16, fase2Oitavas, fase2Quartas, fase2Semi, fase2Final].forEach(function(mapa){
      Object.keys(mapa).forEach(function(a){
        if (!apelidosNoRanking[a]) {
          ranking.push({apelido:a, pts_grupos:0, pts_placares:0, pts_zebras:0, pts_chaveamento:0, pts_placares_mata:0, total:0});
          apelidosNoRanking[a]=true;
        }
      });
    });
    if (!ranking.length) {
      area.innerHTML = '<div class="ranking-card"><div class="empty"><strong>Nenhum palpite ainda</strong>Seja o primeiro!</div></div>';
      return;
    }

    // ── RENDER ──────────────────────────────────────────────────────
    var GRID = '44px 1fr 60px 50px 50px 60px 60px 50px 58px 60px 50px 50px 50px 60px 64px';
    var html = '<div class="ranking-card" style="overflow-x:visible;width:100%;">';
    var dataHoje = new Date().toISOString().slice(0,10).split('-').reverse().join('/');
    html += '<div class="ranking-header"><span class="ranking-title">CLASSIFICAÇÃO ATUAL — '+dataHoje+'</span><div style="display:flex;align-items:center;gap:10px;"><button onclick="exportarTodosPDF(\''+bolaoId+'\')" style="background:#003087;color:#ffdf00;border:1px solid #ffdf00;border-radius:8px;padding:6px 14px;font-family:Bebas Neue,sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;">📄 EXPORTAR PDF</button><span class="ranking-update" style="color:#00c44f;">🟢 Ao vivo</span></div></div>';

    // Header colunas
    html += '<div style="background:var(--bg3);padding:6px 12px;">';
    html += '<div style="display:grid;grid-template-columns:'+GRID+';gap:4px;font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:4px 0;">';
    html += '<div></div><div></div>';
    html += '<div style="grid-column:span 6;text-align:center;color:var(--gold);border-bottom:2px solid rgba(255,223,0,0.4);padding-bottom:3px;">FASE DE GRUPOS</div>';
    html += '<div></div>';
    html += '<div style="grid-column:span 5;text-align:center;color:var(--muted);border-bottom:2px solid rgba(122,159,212,0.3);padding-bottom:3px;">MATA-MATA</div>';
    html += '<div></div>';
    html += '</div>';
    html += '<div style="display:grid;grid-template-columns:'+GRID+';gap:4px;font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);padding:4px 0 6px;">';
    html += '<div>Pos.</div><div>Participante</div>';
    html += '<div style="text-align:center">Grupos</div>';
    html += '<div style="text-align:center">Zebras</div>';
    html += '<div style="text-align:center">Terceiros</div>';
    html += '<div style="text-align:center">Rod. 1</div>';
    html += '<div style="text-align:center">Rod. 2</div>';
    html += '<div style="text-align:center">Rod. 3</div>';
    html += '<div style="text-align:center;color:var(--gold);font-weight:700;">Total GRP</div>';
    html += '<div style="text-align:center">Chaveam.</div>';
    html += '<div style="text-align:center">Top4</div>';
    html += '<div style="text-align:center">Zebras MM</div>';
    html += '<div style="text-align:center">Azarão</div>';
    html += '<div style="text-align:center">Placares MM</div>';
    html += '<div style="text-align:center;color:var(--muted);font-weight:700;">Total MM</div>';
    html += '</div></div>';

    // Calcular posições com empate
    var posicoes = [];
    var posAtual = 1;
    for (var ii = 0; ii < ranking.length; ii++) {
      if (ii > 0 && ranking[ii].total === ranking[ii-1].total) {
        posicoes.push(posicoes[ii-1]);
      } else {
        posAtual = ii + 1;
        posicoes.push(posAtual);
      }
    }

    ranking.forEach(function(r, i) {
      var pos = posicoes[i];
      var numColor = pos===1?'var(--gold)':pos===2?'#aaaaaa':pos===3?'#cd7f32':'var(--muted)';

      var temGrupos     = fase1Grupos[r.apelido]      ? '✅' : '❌';
      var temChaveamento= fase2Chaveamento[r.apelido] ? '✅' : '❌';
      var temR1  = fase1PlacR1[r.apelido]   ? '✅' : '❌';
      var temR2  = fase1PlacR2[r.apelido]   ? '✅' : '❌';
      var temR3  = fase1PlacR3[r.apelido]   ? '✅' : '❌';
      var tem16avos  = fase2R16[r.apelido]      ? '✅' : '❌';
      var temOitavas = fase2Oitavas[r.apelido]  ? '✅' : '❌';
      var temQuartas = fase2Quartas[r.apelido]  ? '✅' : '❌';
      var temSemi    = fase2Semi[r.apelido]      ? '✅' : '❌';
      var temFinal   = fase2Final[r.apelido]     ? '✅' : '❌';

      var pGrupos    = r.pts_grupos      || 0;
      var pZebras    = r.pts_zebras      || 0;
      var pTerceiros = r.pts_terceiros   || 0;
      var pR1        = r.pts_placares_r1 || 0;
      var pR2        = r.pts_placares_r2 || 0;
      var pR3        = r.pts_placares_r3 || 0;
      var pChaveamento = r.pts_chaveamento || 0;
      var pTop4      = r.pts_top4      || 0;
      var pZebrasMM  = r.pts_zebras_mm || 0;
      var pAzarao    = r.pts_azarao    || 0;
      var p16avos    = r.pts_16avos    || 0;
      var pOitavas   = r.pts_oitavas   || 0;
      var pQuartas   = r.pts_quartas   || 0;
      var pSemi      = r.pts_semi      || 0;
      var pFinal     = r.pts_final     || 0;
      var pPlacares  = r.pts_placares_mata || 0;
      var totalGrp   = pGrupos + pZebras + pTerceiros + (r.pts_placares||0);
      var totalMM    = pChaveamento + pTop4 + pZebrasMM + pAzarao + pPlacares;

      html += '<div style="display:grid;grid-template-columns:'+GRID+';align-items:center;padding:8px 12px;border-bottom:1px solid rgba(26,61,122,0.4);gap:4px;">';
      html += '<div class="ranking-pos" style="color:'+numColor+'">'+pos+'<sup>º</sup></div>';
      html += '<div class="ranking-apelido" style="display:flex;align-items:center;gap:8px;">'+r.apelido+'<button onclick="gerarResumo(\''+r.apelido+'\',\''+bolaoId+'\')" style="background:rgba(255,223,0,0.1);border:1px solid rgba(255,223,0,0.25);color:#ffdf00;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:0.5px;white-space:nowrap;">📄 RESUMO</button></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pGrupos+' pts</div><div style="font-size:15px;">'+temGrupos+'</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pZebras+' pts</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pTerceiros+' pts</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pR1+' pts</div><div style="font-size:15px;">'+temR1+'</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pR2+' pts</div><div style="font-size:15px;">'+temR2+'</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--gold);font-weight:700;">'+pR3+' pts</div><div style="font-size:15px;">'+temR3+'</div></div>';
      html += '<div style="text-align:center;background:rgba(255,223,0,0.06);border-radius:6px;"><div style="font-size:11px;color:var(--gold);font-weight:700;">'+totalGrp+'</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);font-weight:700;">'+pChaveamento+' pts</div><div style="font-size:15px;">'+temChaveamento+'</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);font-weight:700;">'+pTop4+' pts</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);font-weight:700;">'+pZebrasMM+' pts</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);font-weight:700;">'+pAzarao+' pts</div></div>';
      html += '<div style="text-align:center;"><div style="font-size:10px;color:var(--muted);font-weight:700;">'+pPlacares+' pts</div></div>';
      html += '<div class="ranking-pts total">'+totalMM+'</div>';
      html += '</div>';
    });

    html += '<div class="legend"><span>✅ Palpite enviado</span><span>❌ Palpite não enviado</span></div>';
    html += '</div>';
    area.innerHTML = html;
  } catch(e) {
    console.error(e);
    area.innerHTML = '<div class="ranking-card"><div class="empty"><strong>Erro ao carregar</strong></div></div>';
  }
}

async function exportarTodosPDF(bolaoId) {
  var btn = event ? event.target : null;
  if (btn) { btn.textContent = '⏳ Gerando...'; btn.disabled = true; }
  try {
    var H2 = {'apikey':SK,'Authorization':'Bearer '+SK};
    // Buscar ranking para obter lista de participantes ordenada
    var rrank = await fetch(SU+'/rest/v1/pontuacoes?bolao_id=eq.'+bolaoId+'&select=apelido,total&order=total.desc',{headers:H2});
    var rankingList = rrank.ok ? await rrank.json() : [];
    if (!rankingList.length) {
      // Fallback: buscar de palpites_fase1
      var rp1 = await fetch(SU+'/rest/v1/palpites_fase1?bolao_id=eq.'+bolaoId+'&select=apelido&order=criado_em.asc',{headers:H2});
      var p1rows = rp1.ok ? await rp1.json() : [];
      rankingList = Array.from(new Set(p1rows.map(function(x){return x.apelido;}))).map(function(a){return {apelido:a};});
    }
    if (!rankingList.length) { alert('Nenhum participante encontrado.'); return; }

    // Gerar resumo de cada participante usando gerarResumo e capturar o HTML
    var todosHtml = [];
    for (var ri = 0; ri < rankingList.length; ri++) {
      var apelido = rankingList[ri].apelido;
      if (btn) btn.textContent = '⏳ ' + (ri+1) + '/' + rankingList.length + ' — ' + apelido;
      var resumoHtml = await gerarResumo(apelido, bolaoId, true); // true = modo silencioso
      if (resumoHtml) todosHtml.push(resumoHtml);
    }

    // Abrir janela de impressão com todos os resumos compilados
    var css = document.querySelector('#resumoCss') ? document.querySelector('#resumoCss').textContent : '';
    var win = window.open('', '_blank');
    win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Palpites Compilados</title>');
    win.document.write('<style>');
    win.document.write('body{font-family:Arial,sans-serif;color:#111;margin:0;padding:0;font-size:11px;}');
    win.document.write('.page{max-width:900px;margin:0 auto;padding:20px;}');
    win.document.write('.jogador{page-break-after:always;}.jogador:last-child{page-break-after:auto;}');
    win.document.write('.topo{background:#003087;color:#fff;padding:16px 20px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center;}');
    win.document.write('.topo-nome{font-size:22px;font-weight:900;letter-spacing:2px;color:#ffdf00;}');
    win.document.write('.topo-sub{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px;}');
    win.document.write('.topo-bolao{text-align:right;font-size:11px;color:rgba(255,255,255,0.8);}');
    win.document.write('.secao{margin-top:16px;}');
    win.document.write('.secao-titulo{background:#003087;color:#ffdf00;font-weight:700;font-size:10px;letter-spacing:2px;padding:6px 10px;text-transform:uppercase;border-radius:4px;margin-bottom:8px;}');
    win.document.write('.grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}');
    win.document.write('.grupo-box{border:1px solid #ddd;border-radius:6px;overflow:hidden;}');
    win.document.write('.grupo-label{background:#003087;color:#ffdf00;font-size:9px;font-weight:700;letter-spacing:1px;padding:4px 8px;text-transform:uppercase;}');
    win.document.write('.grupo-cols{display:grid;grid-template-columns:1fr 1fr;}');
    win.document.write('.col-label{background:#f0f4ff;font-size:8px;font-weight:700;color:#003087;padding:3px 6px;text-align:center;letter-spacing:1px;border-top:1px solid #e0e8ff;}');
    win.document.write('.col-item{padding:3px 6px;font-size:9px;display:flex;align-items:center;gap:3px;border-top:1px solid #eee;}');
    win.document.write('.pos{font-weight:700;color:#003087;min-width:14px;font-size:8px;}');
    win.document.write('table.placares{width:100%;border-collapse:collapse;}');
    win.document.write('table.placares th{background:#f0f4ff;color:#003087;font-size:9px;font-weight:700;padding:4px 6px;text-align:left;letter-spacing:1px;}');
    win.document.write('table.placares td{padding:4px 6px;border-bottom:1px solid #eee;font-size:10px;}');
    win.document.write('.pts-cell{font-weight:700;text-align:center;}.pts3{color:#00a050;}.pts2{color:#2266cc;}.pts1{color:#cc8800;}.pts0{color:#cc0000;}');
    win.document.write('.zebra-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;}');
    win.document.write('.zebra-item{border:1px solid #ddd;border-radius:6px;padding:6px 10px;}');
    win.document.write('.zebra-nome{font-weight:700;font-size:11px;}.zebra-pos{font-size:10px;color:#666;margin-top:2px;}');
    win.document.write('.resumo-total{background:#003087;color:#fff;border-radius:6px;padding:12px 16px;display:grid;gap:8px;margin-top:16px;text-align:center;}');
    win.document.write('.total-item-label{font-size:9px;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase;}');
    win.document.write('.total-item-val{font-size:18px;font-weight:900;color:#ffdf00;margin-top:2px;}');
    win.document.write('.rodada-titulo{font-size:9px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px;padding:3px 6px;background:#f8f8f8;border-left:3px solid #003087;}');
    win.document.write('@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}');
    win.document.write('</style></head><body><div class="page">');
    todosHtml.forEach(function(h, i) {
      win.document.write('<div class="jogador">' + h + '</div>');
    });
    win.document.write('</div></body></html>');
    win.document.close();
    setTimeout(function(){ win.print(); }, 800);
  } catch(e) {
    console.error(e);
    alert('Erro ao gerar PDF: ' + e.message);
  }
  if (btn) { btn.textContent = '📄 EXPORTAR PDF'; btn.disabled = false; }
}
